      h+='<div style="width:26px;height:26px;border-radius:50%;background:'+(isAI?'rgba(124,77,255,.3)':'rgba(22,163,74,.25)')+';display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">'+(isAI?'🤖':'💬')+'</div>';
      h+='<div style="max-width:88%;background:'+(isAI?'rgba(255,255,255,.05)':'rgba(22,163,74,.08)')+';border:1px solid '+(isAI?'rgba(255,255,255,.1)':'rgba(22,163,74,.2)')+';border-radius:12px;padding:10px 14px;font-size:13px;line-height:1.7">'+md(msg.content)+'</div>';
      h+='</div>';
    });
    h+='</div>';

    if(cd.aiThinking){
      h+='<div style="display:flex;gap:8px;align-items:center;padding:8px 0">';
      h+='<div style="width:26px;height:26px;border-radius:50%;background:rgba(124,77,255,.3);display:flex;align-items:center;justify-content:center">🤖</div>';

      h+='</div>';
    } else {
      h+='<div style="display:flex;gap:8px;margin-top:4px">';
      h+='<textarea class="ta" id="coder-input" rows="2" style="flex:1;min-height:46px" placeholder="Answer, ask a question, or say what you want to build..."></textarea>';
      h+='<button class="btn btn-purple" style="align-self:flex-end;min-width:52px" onclick="sendCoderMessage()">▶</button>';
      h+='</div>';

  }
  return h;
}

function startCoderTrack(trackId){
  var cd=getCoderData();
  var track=CODER_TRACKS.find(function(t){return t.id===trackId;});
  if(!track)return;
  // Find first incomplete lesson
  var firstIncomplete=track.levels.find(function(l){return !(cd.progress[l.id]&&cd.progress[l.id].done);});
  cd.activeTrack=trackId;
  cd.activeLesson=(firstIncomplete||track.levels[0]).id;
  cd.session=[];
  cd.phase='lesson';
  saveCoder(cd);
  setSilent('apexTab','code');
  render();
}

function selectCoderLesson(lessonId){
  var cd=getCoderData();
  cd.activeLesson=lessonId;
  cd.session=[];
  saveCoder(cd);
  render();
}

function coderBack(){
  var cd=getCoderData();
  cd.phase='choose';
  cd.activeTrack=null;
  cd.session=[];
  saveCoder(cd);
  render();
}

async function startCoderLesson(){
  var cd=getCoderData();
  var track=CODER_TRACKS.find(function(t){return t.id===cd.activeTrack;});
  var lesson=track&&track.levels.find(function(l){return l.id===cd.activeLesson;});
  if(!track||!lesson)return;

  cd.aiThinking=true;
  saveCoder(cd);
  render();

  logEngine('Coder','Lesson started: '+lesson.title,'Track: '+track.label,'running');

  // Build career-aware sys prompt
  var careerCtx='Jermaine Anderson is a Business Analyst with 11+ years experience (SAP, IFS ERP, Power BI, $200M+ impact). He is job hunting in Winnipeg. He wants to learn to code practically — applied over theoretical. His goal is to become a technical BA and eventually an AI/app developer. He is currently a vibe coder who understands what code does but not always how or why. Tailor every explanation to his BA background — use analogies from requirements gathering, systems analysis, and data work he already knows.';

  try{
    var intro=await callClaude(
      'You are an expert coding tutor. '+careerCtx+' Teach through practical examples. Never just explain theory — always show code AND explain why it works. Use simple analogies from business analysis when introducing new concepts. Keep responses focused and conversational — under 300 words per reply unless showing substantial code.',
      ['Start lesson: '+lesson.title+' (Track: '+track.label+')',
       'Context for Jermaine: '+lesson.context,
       '',
       'Begin with:',
       '1. A 1-sentence practical explanation of what this concept IS (not what it is theoretically)',
       '2. A concrete code example (10-20 lines max) that does something real and useful',
       '3. Explain each line in plain English as if you are explaining a process to a BA',
       '4. One question to check his understanding OR a quick challenge to try',
       '',
       'Career note: briefly mention how this specific skill translates to his job hunt or technical BA work.'
      ].join('\n'),
      1200
    );

    cd.session=[{id:'msg_'+Date.now(),role:'ai',content:intro}];
    cd.aiThinking=false;
    logEngine('Coder','Lesson intro delivered',lesson.title,'done');
  }catch(e){
    cd.session=[{id:'msg_err',role:'ai',content:'Could not start lesson: '+e.message}];
    cd.aiThinking=false;
    logEngine('Coder','Lesson start failed',e.message,'error');
  }
  saveCoder(cd);
  render();
}

async function sendCoderMessage(){
  var input=document.getElementById('coder-input');
  if(!input||!input.value.trim())return;
  var userText=input.value.trim();
  input.value='';

  var cd=getCoderData();
  var track=CODER_TRACKS.find(function(t){return t.id===cd.activeTrack;});
  var lesson=track&&track.levels.find(function(l){return l.id===cd.activeLesson;});

  cd.session.push({id:'msg_'+Date.now(),role:'user',content:userText});
  cd.aiThinking=true;
  saveCoder(cd);
  render();

  var convHistory=cd.session.slice(-6).map(function(m){return m.role.toUpperCase()+': '+m.content;}).join('\n');

  try{
    var r=await callClaude(
      'Expert coding tutor. Student: Jermaine Anderson (11+ years BA, SAP/IFS/Power BI, Winnipeg, job hunting). Teaching: '+(lesson?lesson.title:'general coding')+' in '+(track?track.label:'general')+'. Practical-first. Use BA analogies. Max 300 words unless showing code. Always include a next step or question.',
      'Conversation:\n'+convHistory+'\n\nRespond to his latest message. If he answered a question correctly, confirm it briefly and advance. If he is confused, try a different analogy. If he wants to go deeper, go deeper. Always connect back to practical use.',
      900
    );

    cd.session.push({id:'msg_'+Date.now()+'_ai',role:'ai',content:r});
    cd.aiThinking=false;
    logEngine('Coder','Tutor response sent',lesson?lesson.title:'','done');
  }catch(e){
    cd.session.push({id:'msg_err_'+Date.now(),role:'ai',content:'Error: '+e.message});
    cd.aiThinking=false;
  }
  saveCoder(cd);
  render();
  setTimeout(function(){var v=document.querySelector('.view');if(v)v.scrollTop=v.scrollHeight;},100);
}

function coderAskNext(){
  var input=document.getElementById('coder-input');
  if(input){input.value='I understand — show me what comes next.';sendCoderMessage();}
}

function markCoderLessonDone(){
  var cd=getCoderData();
  if(!cd.activeLesson)return;
  cd.progress[cd.activeLesson]={done:true,ts:new Date().toLocaleDateString()};
  // Find next lesson in track
  var track=CODER_TRACKS.find(function(t){return t.id===cd.activeTrack;});
  if(track){
    var currentIdx=track.levels.findIndex(function(l){return l.id===cd.activeLesson;});
    var next=track.levels[currentIdx+1];
    if(next){
      cd.activeLesson=next.id;
      cd.session=[];
      logEngine('Coder','Lesson complete, advancing','Next: '+next.title,'done');
    } else {
      logEngine('Coder','Track complete!',track.label+' finished','done');
      cd.session.push({id:'msg_complete',role:'ai',content:'## Track Complete! 🎉\n\nYou have finished **'+track.label+'**. Every concept in this track now adds to your value as a technical BA.\n\nWhat next? Start another track, or revisit any lesson to go deeper. Your progress is saved.'});
    }
  }
  saveCoder(cd);
  render();
}

function resetCoderSession(){
  var cd=getCoderData();
  cd.session=[];
  cd.aiThinking=false;
  saveCoder(cd);
  render();
}

function getBizData(){
  return ls('apex_biz',{
    completedMilestones:{},
    activePhase:'p0',
    revenue:{month:0,total:0,clients:0},
    notes:{}
  });
}
function saveBiz(d){sv('apex_biz',d);}

function calcBizProgress(data){
  var total=BIZ_PHASES.reduce(function(s,p){return s+p.milestones.length;},0);
  var done=Object.keys(data.completedMilestones||{}).filter(function(k){return data.completedMilestones[k];}).length;
  return {pct:Math.round((done/total)*100),done:done,total:total};
}

function toggleBizMilestone(mid){
  var biz=getBizData();
  biz.completedMilestones[mid]=!biz.completedMilestones[mid];
  // Auto-advance active phase
  var currentPhaseIdx=BIZ_PHASES.findIndex(function(p){return p.id===biz.activePhase;});
  var currentPhase=BIZ_PHASES[currentPhaseIdx];
  if(currentPhase){
    var allDone=currentPhase.milestones.every(function(m){return biz.completedMilestones[m.id];});
    if(allDone&&currentPhaseIdx<BIZ_PHASES.length-1){
      biz.activePhase=BIZ_PHASES[currentPhaseIdx+1].id;
    }
  }
  saveBiz(biz);
  render();
}

function logBizRevenue(){
  var amt=document.getElementById('rev-amount');var src=document.getElementById('rev-source');
  if(!amt||!amt.value||+amt.value<=0){alert('Enter an amount.');return;}
  var biz=getBizData();
  var revLog=ls('apex_rev_log',[]);
  var entry={amount:+amt.value,source:src?src.value:'',date:new Date().toLocaleDateString()};
  revLog.unshift(entry);
  sv('apex_rev_log',revLog);
  biz.revenue.month=(biz.revenue.month||0)+(+amt.value);
  biz.revenue.total=(biz.revenue.total||0)+(+amt.value);
  biz.revenue.clients=(biz.revenue.clients||0)+(src&&src.value.includes('Coaching')?1:0);
  saveBiz(biz);
  if(amt)amt.value='';
  logEngine('Business','Revenue logged','$'+entry.amount+' — '+entry.source,'done');
  render();
}

  var outEl=document.getElementById('out-'+taskId);

  if(!briefing){alert('Brief this executive with what you need.');return;}

  var roleMaps={
    runBizStrategyAdvisor:{role:'Chief Strategy Officer',focus:'strategic priorities, leverage, what to do and what to stop doing'},
    runBizSalesAdvisor:{role:'Head of Sales',focus:'outreach scripts, discovery call frameworks, proposals, objection handling, closing'},
    runBizMarketingAdvisor:{role:'Head of Marketing',focus:'LinkedIn content, lead generation, email sequences, positioning, messaging'},
    runBizFinanceAdvisor:{role:'Head of Finance',focus:'pricing, margins, cash flow, when to raise prices, package structure'},
    runBizOpsAdvisor:{role:'Chief Operating Officer',focus:'process documentation, automation, VA task lists, client onboarding, delivery systems'},
  };
  var exec=roleMaps[taskId]||{role:'Executive',focus:'business strategy'};

  if(outEl)outEl.innerHTML='<span class="spin"></span> '+exec.role+' is thinking...';

  var biz=getBizData();
  var prog=calcBizProgress(biz);

// ── CANDIDATE SIGNAL READER ──────────────────────────────────────
// Reads the candidate's language patterns to understand their state
// confidence level, urgency, anxiety, and what they need next

function readCandidateSignals(text){
  if(!text) return {confidence:'neutral', urgency:'normal', needsValidation:false, nextNeed:null};
  var lower = text.toLowerCase();
  var signals = {confidence:'neutral', urgency:'normal', needsValidation:false, underestimating:false, nextNeed:null};

  // Confidence signals
  var lowConfidenceWords = ['not sure', 'maybe', 'i think', 'probably', 'might', 'trying to', 'hope', 'if i can'];
  var highConfidenceWords = ['i led', 'i built', 'i delivered', 'i drove', 'i created', 'my approach', 'i know'];
  var lowCount = lowConfidenceWords.filter(function(w){return lower.includes(w);}).length;
  var highCount = highConfidenceWords.filter(function(w){return lower.includes(w);}).length;
  if(lowCount > highCount + 1) signals.confidence = 'low';
  else if(highCount > lowCount) signals.confidence = 'high';

  // Urgency signals
  if(lower.includes('urgent') || lower.includes('need this') || lower.includes('closing soon') ||
     lower.includes('asap') || lower.includes('quickly') || lower.includes('running out')) signals.urgency = 'high';

  // Underestimating signals — when they minimize their achievements
  var minimizers = ['just', 'only', 'basic', 'simple', 'small', 'not that big', 'nothing special'];
  if(minimizers.filter(function(w){return lower.includes(w);}).length >= 2) signals.underestimating = true;

  // What they need next
  if(signals.confidence === 'low' && signals.underestimating) signals.nextNeed = 'reframe';
  else if(signals.urgency === 'high') signals.nextNeed = 'prioritize';
  else if(lower.includes('interview') || lower.includes('called me')) signals.nextNeed = 'prepare';
  else if(lower.includes('offer') || lower.includes('salary')) signals.nextNeed = 'negotiate';

  signals.needsValidation = signals.confidence === 'low' || signals.underestimating;
  return signals;
}

async function sendEnrichmentResponse(){
  var input=el('enrich-input');
  if(!input||!input.value.trim())return;
  var userText=input.value.trim();
  input.value='';

  var session=ls('apex_enrichment_session',[]);
  session.push({id:'msg_'+Date.now(),role:'user',content:userText});
  sv('apex_enrichment_session',session);
  sv('apex_enrichment_thinking',true);
  render();

  var d=getProfileStoryData();
  var answered=session.filter(function(m){return m.role==='user';}).length;
  var convHistory=session.slice(-6).map(function(m){return m.role.toUpperCase()+': '+m.content.slice(0,300);}).join('\n');

  try{
    var sysParts=[
      getIntelligencePersona(),
      'Conducting profile story extraction for Jermaine Anderson.',
      'Extract structured data from his answer, then ask the next question.',
      buildProfile().slice(0,600)
    ];
    var userParts=[
      'Conversation:',
      convHistory,
      '',
      'From his answer extract if present:',
      '- [METRIC] specific number or measurable outcome',
      '- [STORY] a specific situation, project, or episode',
      '- [LEADERSHIP] a decision made or influence without authority',
      '- [INSIGHT] working style, values, or career philosophy',
      '',
      answered>=5?'He has answered '+answered+' questions. If most key areas are covered, offer to wrap up. Otherwise ask the next highest-value question.':'Ask your next highest-value question about his background. One question. Make it different from what he has already answered.'
    ];
    var r=await callClaude(sysParts.join('\n'),userParts.join('\n'),600);

    // Extract and save structured data
    var storyData=getProfileStoryData();
    var metricM=r.split('\n').filter(function(l){return l.indexOf('[METRIC]')>=0;});

    var storyM=r.split('\n').filter(function(l){return l.indexOf('[STORY]')>=0;});

    var leaderM=r.split('\n').filter(function(l){return l.indexOf('[LEADERSHIP]')>=0;});

    var insightM=r.split('\n').filter(function(l){return l.indexOf('[INSIGHT]')>=0;});

    if(metricM&&metricM.length)metricM.forEach(function(m){storyData.metrics['m'+Date.now()+'_'+Math.random().toString(36).slice(2,4)]=m.replace('[METRIC]','').trim();});
    if(storyM&&storyM.length)storyM.forEach(function(m){storyData.stories.push({text:m.replace('[STORY]','').trim(),ts:new Date().toLocaleDateString()});});
    if(leaderM&&leaderM.length)leaderM.forEach(function(m){storyData.leadership.push({text:m.replace('[LEADERSHIP]','').trim(),ts:new Date().toLocaleDateString()});});
    if(insightM&&insightM.length&&!storyData.identity.workStyle){storyData.identity.workStyle=insightM[0].replace('[INSIGHT]','').trim();}
    storyData.depthBonus=calcProfileDepthBonus();
    saveProfileStoryData(storyData);

    // Clean display response
    var cleanR=r.split('\n').filter(function(l){return l.indexOf('[METRIC]')<0&&l.indexOf('[STORY]')<0&&l.indexOf('[LEADERSHIP]')<0&&l.indexOf('[INSIGHT]')<0;}).join('\n').replace(/\n{3,}/g,'\n\n').trim();

    session.push({id:'msg_'+Date.now()+'_ai',role:'ai',content:cleanR});
    sv('apex_enrichment_session',session);
    sv('apex_enrichment_thinking',false);

    if(answered>=5||r.toLowerCase().includes('wrap up')||r.toLowerCase().includes('finish')){
      setTimeout(endEnrichmentSession,2000);
    }
  }catch(e){
    session.push({id:'msg_err_'+Date.now(),role:'ai',content:'Error: '+e.message});
    sv('apex_enrichment_thinking',false);
    sv('apex_enrichment_session',session);
  }
  render();
  setTimeout(function(){var v=document.querySelector('.view');if(v)v.scrollTop=v.scrollHeight;},100);
}

// ── APPLICATION READINESS SCORER ─────────────────────────────────
// Per-job scoring: is this application ready to send?
// Factors: JD stored, docs generated, intel researched, deadline

function calcAppReadiness(app){
  var score=0;
  var notes=[];
  // JD stored (essential)
  if(app.jd&&app.jd.trim().length>100){score+=25;}
  else{notes.push('Add JD for document generation');}
  // Documents generated
  var savedDocs=STATE.savedDocs||[];
  var hasDocs=savedDocs.find(function(d){return d.company===app.company&&d.title===app.title;});
  if(hasDocs){score+=35;}
  else{notes.push('Generate tailored documents');}
  // Company intel researched
  var intel=ls('pro_company_intel',null);
  if(intel&&intel.company===app.company){score+=25;}
  else{notes.push('Run company intelligence research');}
  // Not past deadline
  var d=getDaysLeft(app.closingDate);
  if(d===null){score+=10;notes.push('Set closing date');}
  else if(d>=0){score+=10;}
  else{notes.push('CLOSED');score=Math.min(score,50);}
  return {score,notes,ready:score>=85};
}

        h+='<div style="font-size:10px;color:var(--muted)">Next: '+esc(r.notes[0])+'</div>';
      } else {
        h+='<div style="font-size:10px;color:var(--green)">✓ Ready to apply</div>';
      }
      h+='</div>';
    });
  }
  return h;
}

// APEX DOCS WINDOW MANAGEMENT
// Smart window reuse — never opens a second tab
// Communicates via localStorage events
// ═══════════════════════════════════════════════════════════

var APEX_DOCS_WIN   = null;
var APEX_DOCS_NAME  = 'APEX_Docs_v1';
// Relative URL — works on localhost AND GitHub Pages
var APEX_DOCS_URL   = (function(){
  var base = window.location.href.replace(/[^/]*$/, '');
  return base + 'APEXDocs.html';
})();

function openApexDocs(docPayload){
  // Write to localStorage FIRST — APEXDocs reads this on focus
  var request = Object.assign({}, docPayload, {
    timestamp: Date.now()
  });
  localStorage.setItem('apex_doc_request', JSON.stringify(request));
  localStorage.setItem('apex_doc_pending', JSON.stringify(request));

  // Check if named window is already open
  if(APEX_DOCS_WIN && !APEX_DOCS_WIN.closed){
    // Reuse existing window — bring it to front and send message
    APEX_DOCS_WIN.focus();
    // postMessage as backup to storage event
    try{
      APEX_DOCS_WIN.postMessage(Object.assign({type:'APEX_DOC_REQUEST'},docPayload),'*');
    }catch(e){}
    showPrintToast('📄 Sent to APEX Documents');
    return;
  }

  // Open new window with named target (browser prevents duplicates with same name)
  APEX_DOCS_WIN = window.open(APEX_DOCS_URL, APEX_DOCS_NAME,
    'width=960,height=720,resizable=yes,scrollbars=yes');

  if(!APEX_DOCS_WIN){
    // Popup blocked — fall back to new tab
    APEX_DOCS_WIN = window.open(APEX_DOCS_URL, APEX_DOCS_NAME);
  }

  // Wait for it to load, then send message
  var attempts = 0;
  var sendWhenReady = function(){
    attempts++;
    if(attempts > 30) return; // give up after 9 seconds
    try{
      if(APEX_DOCS_WIN && !APEX_DOCS_WIN.closed){
        APEX_DOCS_WIN.postMessage(Object.assign({type:'APEX_DOC_REQUEST'},docPayload),'*');
      }
    }catch(e){}
    // Keep trying — postMessage succeeds once page has loaded
    setTimeout(sendWhenReady, 300);
  };
  setTimeout(sendWhenReady, 600);

  // Listen for ready signal from APEXDocs
  window.addEventListener('message', function onReady(e){
    if(e.data && e.data.type === 'APEX_DOCS_READY'){
      window.removeEventListener('message', onReady);
      try{
        APEX_DOCS_WIN.postMessage(Object.assign({type:'APEX_DOC_REQUEST'},docPayload),'*');
      }catch(e2){}
    }
  });

  showPrintToast('📄 Opening APEX Documents…');
}

function showPrintToast(msg){
  var existing = document.getElementById('print-toast');
  if(existing) existing.remove();
  var t = document.createElement('div');
  t.id = 'print-toast';
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1B3A5C;color:#fff;border:1px solid rgba(46,109,164,.5);border-radius:10px;padding:10px 18px;font-size:12px;font-weight:700;z-index:9999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},3000);
}

// Reads the user's app behaviour and surfaces it to Amara
function getPatternContext(){
  var apps = STATE.apps || [];
  var notApplied = apps.filter(function(a){return a.status==='Not Applied'&&a.jd&&a.jd.trim().length>50;});
  var applied = apps.filter(function(a){return ['Applied','Follow-Up','Interview','Offer'].includes(a.status);});
  var debriefs = ls('apex_debriefs',[]);
  var lastDaily = ls('apex_last_daily_prep',null);
  var pfScore = calcPortfolioScore ? calcPortfolioScore(getPortfolioData()) : 0;
  var sessions = (getWellnessData().sessions||0);

  var patterns = [];

  // The core pattern: many ready applications, none sent
  if(notApplied.length >= 3 && applied.length === 0){
    patterns.push(notApplied.length+' applications are fully prepared with JDs stored but none have been submitted. The preparation is complete. The action has not been taken.');
  } else if(notApplied.length > applied.length * 2 && notApplied.length >= 2){
    patterns.push(notApplied.length+' ready applications vs '+applied.length+' submitted. Preparation is significantly outpacing action.');
  }

  // High portfolio/prep score but no movement
  if(pfScore >= 60 && applied.length === 0){
    patterns.push('Portfolio score is '+pfScore+'/100 — demonstrably strong — yet no applications have been sent.');
  }

  // Closing deadlines being missed
  var closing = apps.filter(function(a){
    var d = getDaysLeft ? getDaysLeft(a.closingDate) : null;
    return d !== null && d >= 0 && d <= 3 && a.status === 'Not Applied';
  });
  if(closing.length > 0){
    patterns.push(closing.length+' role'+(closing.length>1?'s':'')+' closing within 3 days: '+closing.map(function(a){return a.company;}).join(', ')+'. Still not applied.');
  }

  return {
    notApplied: notApplied.length,
    applied: applied.length,
    pfScore: pfScore,
    debriefs: debriefs.length,
    patterns: patterns,
    patternSummary: patterns.length > 0 ? patterns.join(' ') : 'No strong behavioural patterns detected yet.'
  };
}

async function sendWellnessMessage(){
  var input = el('wellness-input');
  if(!input || !input.value.trim()) return;
  var userText = input.value.trim();
  input.value = '';

  var w = getWellnessData();
  var msgId = 'msg_' + Date.now();
  w.session.push({id:msgId+'_u', role:'user', content:userText});
  w.amaraThinking = true;
  saveWellness(w);
  render();

  var patterns = getPatternContext();
  var recentHistory = w.session.slice(-8).map(function(m){
    return (m.role==='amara'?'DR. AMARA':'JERMAINE') + ': ' + m.content.slice(0,300);
  }).join('\n');

  try{
    var r = await callClaude(
      AMARA_PERSONA,
      'Session history:\n' + recentHistory + '\n\n' +
      'Current app data: ' + patterns.notApplied + ' ready applications not submitted, ' + patterns.applied + ' submitted.\n\n' +
      'Jermaine just said: ' + userText + '\n\n' +
      'Respond as Dr. Amara. If he is avoiding something, name it. If he has made an insight, reinforce it specifically. ' +
      'If there is a clear next action he can take today, surface it — but only as a suggestion after addressing what he said. ' +
      'If you want him to commit to one specific action, end your response with: COMMITMENT: [the specific action]. ' +
      'Keep your response focused — 3-6 sentences is usually right unless depth is needed.',
      700
    );

    // Parse commitment if present
    var commitment = null;
    var cleanR = r;
    var cMatch = r.match(/COMMITMENT:\s*(.+)/);
    if(cMatch){
      commitment = cMatch[1].trim();
      cleanR = r.replace(/COMMITMENT:.*$/,'').trim();
      // Add to action commitments
      w.actionCommitments = w.actionCommitments || [];
      w.actionCommitments.push({text:commitment,done:false,ts:new Date().toLocaleDateString()});
    }

    // Extract insights (sentences starting with "You" or "What I'm noticing")
    var insightPatterns = ['What I notice is', 'What I see is', 'The pattern here', 'You tend to', 'This is the part where'];
    insightPatterns.forEach(function(pat){
      var idx = cleanR.indexOf(pat);
      if(idx >= 0){
        var end = cleanR.indexOf('.', idx);
        if(end > 0){
          var insight = cleanR.slice(idx, end+1);
          if(insight.length > 30 && insight.length < 300){
            w.insights = w.insights || [];
            if(!w.insights.some(function(i){return i.text===insight;})){

              if(w.insights.length > 10) w.insights.pop();
            }
          }
        }
      }
    });

    w.session.push({id:msgId+'_ai', role:'amara', content:cleanR, commitment:commitment});

// -- DATE FORMAT HELPERS --
var MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function fmtDate(iso){
  if(!iso) return '';
  var d=new Date(iso+'T12:00:00');
  if(isNaN(d.getTime())) return iso;
  return MONTHS[d.getMonth()]+' '+d.getDate();
}
function fmtDaysLeft(n){
  if(n===null) return 'No close date';
  if(n<0) return 'Closed '+(Math.abs(n))+'d ago';
  if(n===0) return 'Closes TODAY';
  if(n===1) return '1 day left';
  return n+' days left';
}

var TRACKER_SORT = 'deadline'; // deadline | match | salary | status
var TRACKER_FILTER = 'active'; // active | all

function getTrackerSort(){return ls('trackerSort','deadline');}
function setTrackerSort(v){sv('trackerSort',v);render();}
function getTrackerFilter(){return ls('trackerFilter','active');}
function setTrackerFilter(v){sv('trackerFilter',v);render();}

function parseSalary(s){
  if(!s) return 0;
  var nums=s.replace(/[$,]/g,'').match(/\d+/g);
  if(!nums||!nums.length) return 0;
  var vals=nums.map(Number);
  return vals.reduce(function(a,b){return a+b;},0)/vals.length;
}

function sortApps(apps){
  var sort=getTrackerSort();
  return apps.slice().sort(function(a,b){
    if(sort==='deadline'){
      var da=getDaysLeft(a.closingDate); var db=getDaysLeft(b.closingDate);
      // No date goes to end; closed goes after open
      if(da===null&&db===null) return 0;
      if(da===null) return 1;
      if(db===null) return -1;
      if(da>=0&&db<0) return -1;
      if(da<0&&db>=0) return 1;
      return da-db;
    }
    if(sort==='match') return (b.composite||0)-(a.composite||0);
    if(sort==='salary') return parseSalary(b.salary)-parseSalary(a.salary);
    if(sort==='status'){
      var order=['Interview','Follow-Up','Applied','Not Applied','Offer','Declined','Withdrawn','Closed','Missed'];
      return order.indexOf(a.status)-order.indexOf(b.status);
    }
    return 0;
  });
}

function autoArchiveExpired(){
  var apps=getApps();
  var toArchive=[];
  var toKeep=[];
  var TERMINAL=['Declined','Withdrawn','Closed','Missed'];
  apps.forEach(function(a){
    var daysLeft=getDaysLeft(a.closingDate);
    var pastDeadline=daysLeft!==null&&daysLeft<-7; // grace period of 7 days
    var isTerminal=TERMINAL.indexOf(a.status)>=0;
    var isExpiredNotApplied=pastDeadline&&a.status==='Not Applied';
    if(isExpiredNotApplied||isTerminal){
      a._archivedAt=new Date().toISOString().slice(0,10);
      a._archiveReason=isTerminal?a.status:'expired';
      toArchive.push(a);
    } else {
      toKeep.push(a);
    }
  });
  if(toArchive.length>0){
    var archived=ls('apex_archived_jobs',[]);
    var existingIds=archived.map(function(a){return a.id;});
    toArchive.forEach(function(a){
      if(existingIds.indexOf(a.id)<0) archived.push(a);
    });
    sv('apex_archived_jobs',archived);
    setApps(toKeep);
    smartSync();
  }
  return toArchive.length;
}

function restoreFromArchive(id){
  var archived=ls('apex_archived_jobs',[]);
  var job=archived.find(function(a){return String(a.id)===String(id);});
  if(!job){alert('Job not found in archive.');return;}
  delete job._archivedAt; delete job._archiveReason;
  job.status='Not Applied';
  var apps=getApps();
  apps.push(job);
  setApps(apps);
  var remaining=archived.filter(function(a){return String(a.id)!==String(id);});
  sv('apex_archived_jobs',remaining);
  smartSync();
  render();
}

// -- DEAD LINK DETECTION --
var SIGN_IN_PATTERNS=['login','signin','sign-in','auth','account/login','session','careers/login'];
async function checkJobUrl(url){
  if(!url) return {live:null,reason:'no_url'};
  try{
    // Use a no-cors fetch to check if URL responds
    // We can't read the response body cross-origin but we can detect failures
    var controller=new AbortController();
    var timeoutId=setTimeout(function(){controller.abort();},8000);
    var resp=await fetch(url,{method:'HEAD',signal:controller.signal,redirect:'follow',mode:'no-cors'});
    clearTimeout(timeoutId);
    // no-cors always returns opaque response - if we get here, URL is reachable
    return {live:true,reason:'reachable'};
  } catch(e){
    if(e.name==='AbortError') return {live:false,reason:'timeout'};
    if(e.message&&e.message.includes('Failed to fetch')) return {live:false,reason:'unreachable'};
    // CORS errors = page exists but blocks cross-origin = likely live
    return {live:true,reason:'cors_blocked'};
  }
}

async function filterDeadJobs(jobs){
  if(!jobs||!jobs.length) return jobs;
  var results=[];
  var skippedDead=0;
  for(var i=0;i<jobs.length;i++){
    var j=jobs[i];
    if(!j.url){
      results.push(j); // no URL - include (manually add has no URL)
      continue;
    }
    var urlLower=j.url.toLowerCase();
    // Check for sign-in redirect patterns in the URL itself
    var requiresLogin=SIGN_IN_PATTERNS.some(function(p){return urlLower.includes(p);});
    if(requiresLogin){
      j._requiresLogin=true;
      results.push(j); // keep it - just note it requires login
      continue;
    }
    var check=await checkJobUrl(j.url);
    if(check.live===false){
      skippedDead++;
      j._deadLink=true;
      j._deadReason=check.reason;
      // Don't add to results - skip dead links
      logEngine('Jobs Tracker','Dead link skipped: '+j.url,check.reason,'warn');
    } else {
      results.push(j);
    }
  }
  return {jobs:results, skipped:skippedDead};

// ═══════════════════════════════════════════════════════════
}

// Each company gets its own isolated intel object.
// No contamination between companies. Ever.

function getIntelArchive(){
  return ls('pro_intel_archive', []);
}

function saveIntelArchive(archive){
  sv('pro_intel_archive', archive);
}

// Save or update a company's intel in the archive
function archiveIntel(intel){
  if(!intel||!intel.company) return;
  var archive = getIntelArchive();
  var idx = archive.findIndex(function(e){
    return e.company.trim().toLowerCase() === intel.company.trim().toLowerCase();
  });
  var entry = Object.assign({}, intel, {
    _archivedAt: new Date().toISOString().slice(0,10),
    _version: (idx>=0 ? (archive[idx]._version||0)+1 : 1),
  });
  if(idx >= 0) archive[idx] = entry;
  else archive.unshift(entry);
  // Keep max 20 companies
  if(archive.length > 20) archive = archive.slice(0,20);
  saveIntelArchive(archive);
}

// Get intel for a specific company (archive first, active key fallback)
function getIntelForCompany(company){
  if(!company) return null;
  var archive = getIntelArchive();
  var entry = archive.find(function(e){
    return e.company.trim().toLowerCase() === company.trim().toLowerCase();
  });
  if(entry) return entry;
  // Fallback: check active key
  var active = ls('pro_company_intel', null);
  if(active && active.company && 
     active.company.trim().toLowerCase() === company.trim().toLowerCase()){
    return active;
  }
  return null;
}

// Called when user wants to review a specific company's intel
function openArchivedIntel(company){
  var intel = getIntelForCompany(company);
  if(!intel){ alert('No research found for '+company); return; }
  // Load this company's intel as the active intel
  saveAndArchiveIntel(intel);
  sv('pro_gen_company', company);
  setSilent('genComp', company);
  setSilent('intelReviewCo', company);
  // Stay on Intel tab — switch to Fact Sheet sub-tab to show the intel
  setSilent('view','intel');
  render();
  // After render rebuilds the Intel tab, switch to factsheet
  setTimeout(function(){
    intelTab('factsheet', null);
  }, 80);
}

function deleteArchivedIntel(company){
  if(!confirm('Delete all research for '+company+'? This cannot be undone.')) return;
  var archive = getIntelArchive().filter(function(e){
    return e.company.trim().toLowerCase() !== company.trim().toLowerCase();
  });
  saveIntelArchive(archive);
  // If this was the active company, clear it
  var active = ls('pro_company_intel', null);
  if(active && active.company && 
     active.company.trim().toLowerCase() === company.trim().toLowerCase()){
    localStorage.removeItem('pro_company_intel');
  }
  render();
}

  d.lastRole=s.role||'';
  d.lastContext=s.context||'';

}

async function runWrittenAssessment(){
  var role=(document.getElementById('wt-role')||{value:''}).value.trim();
  var context=(document.getElementById('wt-context')||{value:''}).value.trim();
  var assignment=(document.getElementById('wt-assignment')||{value:''}).value.trim();
  if(!assignment||assignment.length<50){alert('Please paste the full assignment prompt (at least a few sentences).');return;}
  if(!role){alert('Please enter the role or competition number.');return;}

  // Save input
  var d=getWrittenData();
  d.lastRole=role; d.lastContext=context; d.lastAssignment=assignment;
  saveWrittenData(d);

  setSilent('writtenLoading',true);
  setSilent('writtenStep',0);
  setSilent('writtenResult',null);
  render();

  var profile=buildProfile();
  var sys='You are an expert career coach and government procurement professional. '+getIntelligencePersona()+'\n\nThe candidate is:\n'+profile;

  var result={};

  try{
    // Step 1: Draft response
    setSilent('writtenStep',0);
    renderWrittenAssessment();
    var draftPrompt='ROLE: '+role+'\nCONTEXT: '+context+'\n\nASSIGNMENT:\n'+assignment+'\n\n---\n\nWrite a complete, professional response to this written assignment IN THE FIRST PERSON VOICE OF THE CANDIDATE. Requirements:\n\n1. Use ONLY experiences and knowledge the candidate actually has from their profile\n2. Be specific — reference real skills (SAP, Power BI, supply chain, stakeholder management)\n3. Match the tone of a senior government procurement professional\n4. Structure your response to address every required section in the assignment\n5. Do NOT fabricate qualifications or experiences not in the profile\n6. Write in clear, confident prose — no bullet points for the main response (use them only where the assignment structure demands it)\n7. Total length: 600–900 words\n\nBEGIN THE RESPONSE DIRECTLY — no preamble, no "Here is a response" introduction.';
    var draft=await callClaude(sys,draftPrompt,3000);
    result.response=draft;

    // Step 2: Learning plan
    setSilent('writtenStep',1);
    renderWrittenAssessment();
    var learnPrompt='ASSIGNMENT:\n'+assignment+'\n\nDRAFT RESPONSE:\n'+draft+'\n\n---\n\nCreate a personal LEARNING PLAN for the candidate so they can fully understand and speak confidently to every concept in this response during a live interview.\n\nFormat:\n\n## What You Need to Understand\n(3–5 key concepts used in the response, in plain English)\n\n## Concept by Concept Breakdown\n(For each major concept: plain English explanation, why it matters for this role, and one example from the candidate\'s own background that illustrates it)\n\n## How to Explain It Without Notes\n(5–8 "speaking points" — short, natural phrases the candidate can say in their own words)\n\n## Common Mistakes to Avoid\n(What candidates typically get wrong on this topic in interviews)\n\n## Study Plan\n(3 things to read/review before the interview, with a brief note on what to look for in each)';
    var learning=await callClaude(sys,learnPrompt,2500);
    result.learning=learning;

    // Step 3: Panel Q&A
    setSilent('writtenStep',2);
    renderWrittenAssessment();
    var qaPrompt='ROLE: '+role+'\nASSIGNMENT RESPONSE:\n'+draft+'\n\n---\n\nGenerate 8 questions the interview panel will likely ask about this presentation, with strong suggested answers for this candidate.\n\nFor each question:\n**Q: [Panel question]**\n**Why they\'re asking:** [1 sentence]\n**Strong answer:** [2–4 sentences using candidate\'s actual background. Start with a direct statement, then evidence, then outcome.]\n\nInclude: clarifying questions, deep-dive questions on methodology, challenge questions on assumptions, and a question about lessons learned/continuous improvement.';
    var panelQA=await callClaude(sys,qaPrompt,2500);
    result.panelQA=panelQA;

    // Save session
    var session={
      role:role, context:context, assignment:assignment,
      result:result,
      date:fmtDate(new Date().toISOString().slice(0,10))+', '+new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}),
    };
    d=getWrittenData();
    d.sessions=d.sessions||[];
    d.sessions.push(session);
    if(d.sessions.length>10) d.sessions=d.sessions.slice(-10);
    saveWrittenData(d);

    setSilent('writtenResult',result);
    setSilent('writtenResultView','response');

  }catch(e){
    alert('Error: '+e.message);
  }finally{
    setSilent('writtenLoading',false);
    setSilent('writtenStep',-1);
    render();
  }
}

function getPrepHQData(){
  return ls('apex_prep_hq',{ activeJobId:null, sessions:{} });
}
function savePrepHQData(d){ sv('apex_prep_hq',d); }

function detectLevel(title, jd){
  var text=(title+' '+(jd||'')).toLowerCase();
  if(/\bvp\b|vice.?president|deputy.?minister|chief\b|c-suite|ceo|coo|cfo|executive.?director/.test(text)) return 'executive';
  if(/\bsenior\s+director|assistant.?deputy|adm\b|senior.?manager/.test(text)) return 'senior_mgr';
  if(/\bdirector\b|\bmanager\b|\bpm3\b|program.?lead|category.?lead/.test(text)) return 'manager';
  if(/\bsupervisor\b|\bteam.?lead\b|\bpm2\b|\bpm1\b|\blead\b/.test(text)) return 'supervisor';
  return 'frontline';
}

function detectIndustry(title, jd){
  var text=(title+' '+(jd||'')).toLowerCase();
  if(/procure|tender|rfp|rfq|sourcing|supply.?chain|vendor|contract.?mgmt|category/.test(text)) return 'Procurement & Supply Chain';
  if(/health|clinical|nurs|patient|medical|hospital|mental/.test(text)) return 'Healthcare';
  if(/information.?tech|software|developer|it\b|cyber|data.?science|cloud/.test(text)) return 'Technology';
  if(/finance|accounting|audit|budget|fiscal|treasury|cpa/.test(text)) return 'Finance & Accounting';
  if(/human.?resource|hr\b|talent|recruiting|labour.?relation|workforce/.test(text)) return 'Human Resources';
  if(/project.?manage|pmo\b|delivery|implementation/.test(text)) return 'Project Management';
  if(/marketing|communications|brand|digital|social.?media/.test(text)) return 'Marketing & Communications';
  if(/education|teach|curriculum|school|universit|college/.test(text)) return 'Education';
  if(/engineer|infrastructure|construction|facilities/.test(text)) return 'Engineering & Infrastructure';
  if(/policy|research|government|public.?service|public.?sector/.test(text)) return 'Government & Public Policy';
  return 'General / Professional Services';
}

function hexToRgb(hex){

  return r+','+g+','+b;
}

    var app = getApps().find(function(a){return a.id===sel.value;});

    title = app.title; company = app.company; jd = app.jd||'';
  } else {
    title = (el('prep-custom-title')||{value:''}).value.trim();
    company = (el('prep-custom-company')||{value:''}).value.trim();
    jd = (el('prep-custom-jd')||{value:''}).value.trim();
    if(!title||jd.length<30){alert('Please enter a job title and paste the full JD (at least a few sentences).');return;}

  var levelSel = el('prep-level-sel');
  if(levelSel&&levelSel.value){
    level = levelSel.value;
  } else {
    level = detectLevel(title, jd);

  var industry = detectIndustry(title, jd);

  h += '<span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba('+hexToRgb(lvl.color)+',0.2);color:#'+lvl.color+'">'+esc(lvl.label)+'</span>';
  h += '</div>';
  var total = lvl.competencies.length + PREP_STAGES.length + 1;
  var done = Object.keys(gen).length;
  h += '<div style="margin-top:10px">';
  h += '<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:4px"><span>Prep Progress</span><span>'+done+'/'+total+' modules</span></div>';
  h += '<div style="background:rgba(255,255,255,.08);border-radius:3px;height:6px"><div style="background:linear-gradient(90deg,var(--accent),#16a34a);height:6px;border-radius:3px;width:'+Math.round((done/total)*100)+'%"></div></div>';
  h += '</div></div>';

  // SECTION 1: Competencies
  h += renderDashSection('&#127919; Core Competencies for This Level', 'Required for '+esc(lvl.label)+' roles', function(){
    var ch = '';
    lvl.competencies.forEach(function(cid){
      var comp = PREP_COMPETENCY_DEFS[cid]; if(!comp) return;
      var isDone = !!gen['comp_'+cid];
      ch += prepModuleCard(comp.icon+' '+comp.name, comp.short, isDone,
        "setSilent('prepActiveComp','"+cid+"');setSilent('prepView','competency');render()");
    });
    return ch;
  });

  // SECTION 2: Interview Stages
  h += renderDashSection('&#127908; Interview Stage Preparation', 'Tailored playbook for every format', function(){
    var sh = '';
    PREP_STAGES.forEach(function(stage){
      var isDone = !!gen['stage_'+stage.id];
      sh += prepModuleCard(stage.icon+' '+stage.name, stage.desc, isDone,
        "setSilent('prepActiveStage','"+stage.id+"');setSilent('prepView','stage');render()");
    });
    return sh;
  });

  // SECTION 3: Narrative
  h += renderDashSection('&#11088; Made for This Role — Your Narrative', 'The complete story that positions you as the answer', function(){
    var isDone = !!gen['narrative'];
    return prepModuleCard('&#11088; Signature Narrative', 'Your unique value proposition grounded in your actual background — for cover letters, openings, and closings.', isDone,
      "setSilent('prepView','narrative');render()", true);
  });

  return h;
}

function renderDashSection(title, subtitle, contentFn){
  var h = '<div style="margin-bottom:14px">';
  h += '<div style="font-size:13px;font-weight:800;color:#fff;margin-bottom:2px">'+title+'</div>';
  h += '<div style="font-size:10px;color:var(--muted);margin-bottom:8px">'+subtitle+'</div>';
  h += contentFn();
  h += '</div>';
  return h;
}

function prepModuleCard(title, desc, isDone, onclick, full){
  var w = full ? '9.44' : '';
  var h = '<div style="background:var(--s1);border:1px solid var(--b1);border-radius:11px;padding:11px 13px;margin-bottom:7px;cursor:pointer;'+(full?'':'display:inline-flex;width:calc(50% - 4px);margin-right:8px;vertical-align:top;')+'" onclick="'+onclick+'">';
  h += '<div style="display:flex;justify-content:space-between;align-items:flex-start">';
  h += '<div style="flex:1">';
  h += '<div style="font-size:12px;font-weight:700;color:'+( isDone?'#16a34a':'#fff')+';margin-bottom:3px">'+title+'</div>';
  h += '<div style="font-size:10px;color:var(--muted)">'+desc+'</div>';
  h += '</div>';
  h += '<div style="font-size:14px;margin-left:8px;flex-shrink:0">'+(isDone?'<span style="color:#16a34a">&#10003;</span>':'<span style="color:var(--muted)">&#8250;</span>')+'</div>';
  h += '</div></div>';
  return h;
}

// ── AI GENERATION FUNCTIONS ──────────────────────────────────────────────
async function generateCompetencyCourse(cid){
  var key=STATE.prepActiveKey;
  var d=getPrepHQData();
  var sess=(d.sessions||{})[key]; if(!sess) return;
  var comp=PREP_COMPETENCY_DEFS[cid]; if(!comp) return;
  setSilent('prepCompLoading',true); render();
  var profile=buildProfile();
  var sys='You are a senior career coach specializing in government and professional sector preparation. '+getIntelligencePersona()+'\n\nCandidate profile:\n'+profile;
  var prompt='ROLE: '+sess.title+'\nCOMPANY: '+sess.company+'\nLEVEL: '+PREP_LEVELS[sess.level].label+'\nINDUSTRY: '+sess.industry+'\nJOB DESCRIPTION:\n'+( sess.jd||'Not provided')+'\n\n---\n\nCreate a complete CRASH COURSE for the competency: "'+comp.name+'"\n\nStructure your response exactly as follows:\n\n## What This Competency Actually Means at the '+PREP_LEVELS[sess.level].label+' Level\n(2–3 sentences: what the employer is actually testing, not the dictionary definition)\n\n## Why It Matters in '+sess.industry+'\n(Specific to the industry and role — what happens when this competency is absent)\n\n## How YOUR Background Demonstrates This\n(Draw specifically from the candidate\'s real experience. Be concrete — name the situation, the scale, the outcome. Write in first person as if the candidate is reflecting.)\n\n## The STAR Story You Should Have Ready\nSituation: [specific situation from their background]\nTask: [what they needed to accomplish]\nAction: [exactly what they did — be specific about methods, tools, decisions]\nResult: [measurable outcome — numbers, percentages, recognition, impact]\n\n## How a Strong Candidate Sounds vs. an Average Candidate\nAverage: "[example of a weak answer — vague, generic, no evidence]"\nStrong: "[example of a strong answer — specific, evidence-based, outcome-focused]"\n\n## 3 Things to Practice Before the Interview\n(Specific, actionable preparation steps)';
  try{
    var result=await callClaude(sys,prompt,2500);
    sess.generated['comp_'+cid]=result;
    d.sessions[key]=sess;
    savePrepHQData(d);
  }catch(e){alert('Error: '+e.message);}
  setSilent('prepCompLoading',false);
  render();
}
function regenerateCompetency(cid){
  var key=STATE.prepActiveKey;
  var d=getPrepHQData();
  var sess=(d.sessions||{})[key]; if(!sess) return;
  delete sess.generated['comp_'+cid];
  d.sessions[key]=sess;
  savePrepHQData(d);
  generateCompetencyCourse(cid);
}

async function generateStagePrep(sid){
  var key=STATE.prepActiveKey;
  var d=getPrepHQData();
  var sess=(d.sessions||{})[key]; if(!sess) return;
  var stage=PREP_STAGES.find(function(s){return s.id===sid;}); if(!stage) return;
  setSilent('prepStageLoading',true); render();
  var profile=buildProfile();
  var lvl=PREP_LEVELS[sess.level];
  var sys='You are an elite interview coach with deep experience in government and professional sector hiring. '+getIntelligencePersona()+'\n\nCandidate profile:\n'+profile;
  var stageGuides = {
    written: 'Written exercises test your ability to structure thinking, apply methodology, and communicate clearly under time pressure. Focus on: how to read the prompt strategically, how to structure the response, what evaluators are really scoring, common mistakes that tank scores, and how this candidate\'s specific background gives them an edge.',
    phone: 'Phone screens test fit, communication, and baseline competency. Focus on: how to prepare in 30 minutes, what the recruiter is really checking, the 5 most likely questions, how to control the conversation, how to handle salary questions, and how to close with a strong interest statement.',
    video: 'Video interviews add the visual layer. Focus on: camera/lighting/background setup, managing energy on screen (leaning in, pausing), eye contact with the camera not the screen, what to have notes on without looking like you\'re reading, specific questions for this level/industry, and how to read interviewer reactions.',
    inperson1: 'Single interviewer is often the hiring manager. They want to confirm you\'re the person from the application. Focus on: the first 2 minutes (walk-in, handshake, small talk), how to read this interviewer\'s style quickly, questions that reveal what they really care about, how to tell stories conversationally (not like a rehearsed speech), and how to close by asking for the job.',
    panel: 'Panel interviews are won by managing the room, not just answering questions. Focus on: how to address all panelists when answering one person\'s question, reading panel dynamics (who\'s the decision-maker, who\'s skeptical), handling the "challenge" question without getting defensive, using the panel format to show leadership presence, and the first 60 seconds when you enter.',
    multistage: 'Multi-stage processes require consistency with escalating depth. Focus on: maintaining the same core narrative across rounds while going deeper, what to do between rounds (research, follow-up notes), how to show growth from stage to stage, managing nerves across a weeks-long process, and the strategy for final rounds where all candidates are qualified.',
  };
  var prompt='ROLE: '+sess.title+'\nCOMPANY: '+sess.company+'\nLEVEL: '+lvl.label+'\nINDUSTRY: '+sess.industry+'\nJOB DESCRIPTION:\n'+(sess.jd||'Not provided')+'\n\nSTAGE: '+stage.name+'\n\n'+stageGuides[sid]+'\n\n---\n\nCreate a complete PREPARATION PLAYBOOK for the '+stage.name+' stage of this specific application.\n\nInclude:\n1. What they are testing at this stage for a '+lvl.label+' role\n2. This candidate\'s 3 biggest advantages going into this stage\n3. The 6 most likely questions (role-specific, not generic) with strong suggested answers using their actual background\n4. The 2 questions they should dread and how to handle them confidently\n5. What to do in the 24 hours before and the 30 minutes before\n6. How to open and close this specific stage format\n7. One thing most candidates get wrong at this stage that this candidate must avoid';
  try{
    var result=await callClaude(sys,prompt,3000);
    sess.generated['stage_'+sid]=result;
    d.sessions[key]=sess;
    savePrepHQData(d);
  }catch(e){alert('Error: '+e.message);}
  setSilent('prepStageLoading',false);
  render();
}
function regenerateStage(sid){
  var key=STATE.prepActiveKey;
  var d=getPrepHQData();
  var sess=(d.sessions||{})[key]; if(!sess) return;
  delete sess.generated['stage_'+sid];
  d.sessions[key]=sess;
  savePrepHQData(d);
  generateStagePrep(sid);
}

async function generateNarrative(){
  var key=STATE.prepActiveKey;
  var d=getPrepHQData();
  var sess=(d.sessions||{})[key]; if(!sess) return;
  setSilent('prepNarrativeLoading',true); render();
  var profile=buildProfile();
  var lvl=PREP_LEVELS[sess.level];
  var sys='You are a master storyteller and career strategist. '+getIntelligencePersona()+'\n\nCandidate profile:\n'+profile;
  var prompt='ROLE: '+sess.title+'\nCOMPANY: '+sess.company+'\nLEVEL: '+lvl.label+'\nINDUSTRY: '+sess.industry+'\nJOB DESCRIPTION:\n'+(sess.jd||'Not provided')+'\n\n---\n\nCreate the complete "Made for This Role" narrative package for this candidate. This is the story that, when delivered, makes the panel feel they wrote this JD with this person in mind.\n\n## Why This Role Was Made for You (The Thesis)\n(2–3 powerful sentences that connect the candidate\'s specific career arc to the precise problems this role exists to solve)\n\n## Your 3-Point Value Statement\n(Three distinct, evidence-based reasons this employer should choose this candidate over anyone else. Each point: [Claim] + [Evidence from their background] + [Outcome it delivers for the employer])\n\n## Cover Letter Opening Paragraph\n(First-person, 80–100 words, specific to this role — not a template. Makes them keep reading.)\n\n## Interview Opening Statement (Tell Me About Yourself — 90 Seconds)\n(Script the ideal answer. Starts with the thesis, builds through the value statement, lands on why they\'re here today. Conversational, not robotic.)\n\n## The Closing Statement (Why Should We Hire You)\n(60-second closing pitch. Confident, specific, forward-looking — not a summary of what was already said.)\n\n## The 3 Things That Make This Candidate Unforgettable\n(What the panel will remember and talk about after the interview is over — specific differentiators, not generic strengths)';
  try{
    var result=await callClaude(sys,prompt,3000);
    sess.generated['narrative']=result;
    d.sessions[key]=sess;
    savePrepHQData(d);
  }catch(e){alert('Error: '+e.message);}
  setSilent('prepNarrativeLoading',false);
  render();
}
function regenerateNarrative(){
  var key=STATE.prepActiveKey;
  var d=getPrepHQData();
  var sess=(d.sessions||{})[key]; if(!sess) return;
  delete sess.generated['narrative'];
  d.sessions[key]=sess;
  savePrepHQData(d);
  generateNarrative();
}
</script>
