// A. ITERATIVE RESUME SELF-IMPROVEMENT LOOP
// Generate → Score → Rewrite → Rescan (up to 3 cycles)
// ══════════════════════════════════════════
async function iterativeResumeLoop(){
  const apps=getApps();const activeJob=getActiveJob();
  const company=activeJob?activeJob.company:lsj('genCompany','');
  const selApp=apps.find(a=>a.company===company);
  if(!selApp||!selApp.jd){alert('Select a job with a stored JD first.');return;}
  const saved=lsj('genDocs',null);
  if(!saved||!saved.resume){alert('Generate a resume first — then run the improvement loop.');return;}
  const platformKey=lsj('ats_last',{platformKey:'generic'}).platformKey||'generic';
  const platform=ATS_PLATFORMS[platformKey]||ATS_PLATFORMS.generic;
  const out=el('ats-out')||el('jobs-tab-ats');if(!out)return;

  out.innerHTML='<div style="padding:12px 14px;background:rgba(232,168,37,.1);border-radius:12px;border:1px solid rgba(232,168,37,.3);margin-bottom:12px">'
    +'<div style="font-size:12px;font-weight:700;color:var(--gold);margin-bottom:4px">&#9889; Iterative Improvement Running</div>'
    +'<div id="loop-progress" style="font-size:12px;color:var(--muted)">Cycle 1 of 3 — Scanning current resume...</div>'
    +'<div class="chunk-progress" id="loop-bar">'+Array(3).fill('<div class="chunk-dot"></div>').join('')+'</div>'
    +'</div>';

  let currentResume=saved.resume;let bestScore=0;let bestResume=currentResume;let cycles=[];

  try{
  for(let i=0;i<3;i++){
    const prog=el('loop-progress');const bar=el('loop-bar');
    if(prog)prog.textContent='Cycle '+(i+1)+' of 3 — Scanning...';
    if(bar){const dots=bar.querySelectorAll('.chunk-dot');dots.forEach((d,j)=>{d.className='chunk-dot '+(j<i?'done':j===i?'active':'');});}

    // Scan
    const scanResult=await callClaude(
      'Expert ATS analyst for '+platform.name+'. Jermaine: SAP TERP10 certified, IFS Nova lead (live production), $200M+ PepsiCo, 11 years BA/supply chain. Profile:\n'+buildProfile().slice(0,500)+'. Be precise and fast.'+getActiveIntelContext(200),
      'Score this resume against this JD for '+platform.name+'.\nReturn FIRST LINE: ATS MATCH SCORE: XX/100\nThen list: top 5 missing keywords, top 3 formatting issues.\n\nJD:\n'+selApp.jd.slice(0,800)+'\n\nRESUME:\n'+currentResume.slice(0,1500),
      400
    );
    const scoreMatch=scanResult.match(/ATS MATCH SCORE:\s*(\d+)\/100/i);
    const score=scoreMatch?parseInt(scoreMatch[1]):60;
    cycles.push({cycle:i+1,score,issues:scanResult});
    if(score>bestScore){bestScore=score;bestResume=currentResume;}
    if(prog)prog.textContent='Cycle '+(i+1)+' of 3 — Score: '+score+'/100. '+(score>=90?'Excellent — stopping.':'Rewriting to improve...');
    if(score>=90)break; // good enough — stop

    // Rewrite
    const rewriteResult=await callClaude(
      'Expert resume writer optimizing specifically for '+platform.name+'. Apply every fix from the scan.',
      'Rewrite this resume to fix the identified issues and maximize ATS score for '+platform.name+'.\n\nSCAN ISSUES:\n'+scanResult+'\n\nPLATFORM RULES:\n'+platform.rules.slice(0,4).join('\n')+'\n\nJD:\n'+selApp.jd.slice(0,600)+'\n\nCURRENT RESUME:\n'+currentResume.slice(0,1800)+'\n\nReturn ONLY the improved resume text.',
      2000
    );
    currentResume=rewriteResult;
    if(bar){var  dots=bar.querySelectorAll('.chunk-dot');dots.forEach((d,j)=>d.className='chunk-dot '+(j<=i?'done':''));}
  }

  // Save best version
  const docs=lsj('genDocs',{})||{};
  }catch(e){if(out)out.innerHTML=alertHtml('&#10007;','Resume loop error: '+esc(e.message),'var(--red)');return;}
  docs.resume=bestResume;docs.resumeImproved=true;docs.bestATSScore=bestScore;
  svj('genDocs',docs);svj('ats_last',{...lsj('ats_last',{}),score:bestScore,platform:platform.name,platformKey,date:todayStr(),result:cycles.map(c=>'Cycle '+c.cycle+': '+c.score+'/100').join(' → ')});

  out.innerHTML=(out.innerHTML||'')
    +'<div class="card" style="margin-top:12px;border-color:rgba(26,173,94,.4)"><div class="card-head" style="background:rgba(26,173,94,.12)"><div class="card-head-title" style="color:var(--green)">&#10003; Improvement Complete — Best Score: '+bestScore+'/100</div></div><div class="card-body">'
    +'<div style="font-size:12px;color:var(--muted);margin-bottom:8px">'+cycles.map(c=>'Cycle '+c.cycle+': <strong style="color:#fff">'+c.score+'/100</strong>').join(' → ')+'</div>'
    +'<div class="outbox" style="font-size:12px;max-height:280px;overflow-y:auto">'+esc(bestResume)+'</div>'
    +'<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">'
    +'<button class="btn btn-ghost btn-xs" id="loop-cp" style="color:var(--muted)" onclick="copyText(this.dataset.text,\'loop-cp\')" data-text="'+esc(bestResume)+'">Copy Improved Resume</button>'
    +'<button class="btn btn-blue btn-xs" onclick="jobsTab(\'resumepdf\',document.querySelectorAll(\'#scr-jobs .tab-btn\')[4])">Format as PDF &#8594;</button>'
    +'</div></div></div>';
}

async function checkJobAlerts(){
  const next=ls('apex_job_alert_next',null);
  if(!next||new Date(next)>new Date())return;
  const freq=ls('apex_job_alert_freq',7);
  // Run a quick auto-load check
  try{
    const r=await callClaude(
      'Job search specialist for Jermaine Anderson in Winnipeg Manitoba.',
      'Generate 3 new job postings active in Manitoba that match this profile:\n'+PROFILE.slice(0,400)+'\n\nReturn JSON array ONLY:\n[{"title":"","company":"","composite":0,"why":"one sentence","url":""}]',
      400
    );
    const clean=r.replace(/```json|```/g,'').trim();
    const jobs=JSON.parse((clean.match(/\[[\s\S]*\]/)||["[]"])[0]||'[]');
    if(jobs.length&&'Notification' in window&&Notification.permission==='granted'){
      new Notification('APEX — New Job Matches Found',{
        body:jobs.length+' new roles found: '+jobs[0].company+', '+( jobs[1]?jobs[1].company:'')+(jobs.length>2?' +'+( jobs.length-2)+' more':''),
        icon:'',tag:'job-alert'
      });
    }
    // Add to tracker
    const apps=getApps();
    jobs.forEach(j=>{
      var _arch=ls('apex_archived_jobs',[]);
      var _jT=j.title.trim().toLowerCase(),_jC=j.company.trim().toLowerCase();
      var _inAct=apps.find(function(a){return a.title.trim().toLowerCase()===_jT&&a.company.trim().toLowerCase()===_jC;});
      var _inArch=_arch.find(function(a){return a.title.trim().toLowerCase()===_jT&&a.company.trim().toLowerCase()===_jC;});
      var _isRepost=(_inArch&&j.closingDate&&_inArch.closingDate&&Math.abs((new Date(j.closingDate)-new Date(_inArch.closingDate))/(864e5))>7);
      if(!_inAct&&(!_inArch||_isRepost)){
        apps.push({id:'alert_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
          title:j.title,company:j.company,status:'Not Applied',date:'',url:j.url||'',
          composite:j.composite||0,notes:'[Job Alert] '+j.why,jd:''});
      }
    });
    setApps(apps);
  }catch{}
  // Schedule next
  const next2=new Date(Date.now()+freq*24*60*60*1000).toISOString();
  sv('apex_job_alert_next',next2);
}

// D. SMART FOLLOW-UP CRM
// Auto-triggers based on sent email dates
// ══════════════════════════════════════════
function smartFollowUpCRM(){
  const sent=ls('apex_emails_sent',[]);
  const followups=ls('apex_followups',[]);
  const now=Date.now();
  let triggered=0;

  sent.forEach(email=>{
    if(email.replied)return;
    const daysSince=Math.floor((now-new Date(email.sentDate))/86400000);
    const existing=followups.find(f=>f.to===email.to&&f.sentDate===email.sentDate);
    if(!existing&&daysSince>=7){
      followups.push({
        id:'crm_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
        to:email.to,company:email.company||'',type:'Auto Follow-Up',
        sentDate:email.sentDate,followUpDays:daysSince,replied:false,dismissed:false,
        autoGenerated:true
      });
      triggered++;
    }
  });
  if(triggered>0){
    sv('apex_followups',followups);
    if('Notification' in window&&Notification.permission==='granted'){
      new Notification('APEX — Follow-Up Needed',{
        body:triggered+' application'+(triggered>1?'s':'')+' need'+(triggered===1?'s':'')+' a follow-up. Open Email Hub.',tag:'followup-crm'
      });
    }
  }
  return triggered;
}

function setPostingReminder(timeStr){
  const [hour,minpart]=timeStr.split(':');
  const [min,ampm]=[minpart.slice(0,2),minpart.slice(3)];
  let h=parseInt(hour);if(ampm==='PM'&&h!==12)h+=12;if(ampm==='AM'&&h===12)h=0;
  const now=new Date();const target=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,parseInt(min));
  if(target<=now)target.setDate(target.getDate()+1);
  const msUntil=target.getTime()-Date.now();
  setTimeout(()=>{
    if('Notification' in window&&Notification.permission==='granted'){
      new Notification('APEX — Time to Post on LinkedIn',{
        body:'It\'s the optimal posting time. Open APEX LinkedIn Engine → Post.',tag:'li-post-time'
      });
    }
  },msUntil);
  alert('&#10003; Reminder set for '+timeStr+'. Make sure notifications are enabled.');
}

    const pct=apps.length?Math.round((step.value/apps.length)*100):0;
    h+='<div style="margin-bottom:10px">'
      +'<div style="display:flex;justify-content:space-between;margin-bottom:3px">'
      +'<span style="font-size:12px;color:var(--muted)">'+step.label+'</span>'

      +'</div>';

function removeOffer(i){const o=ls('apex_offers',[]);o.splice(i,1);sv('apex_offers',o);renderOfferMatrix();}

async function genOfferComparison(){
  const offers=ls('apex_offers',[]);if(offers.length<1){alert('Add at least one offer first.');return;}
  const out=el('offer-comparison-out');if(!out)return;
  const btn=el('offer-compare-btn');if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Analyzing...';}
  out.innerHTML='';
  try{
    const offerText=offers.map((o,i)=>`OFFER ${i+1}: ${o.company} — ${o.role}\nBase: $${o.salary.toLocaleString()}/yr${o.bonus?'\nBonus: '+o.bonus:''}${o.pension?'\nPension: '+o.pension:''}${o.vacation?' | '+o.vacation+' vacation days':''}${o.remote?' | '+o.remote:''}${o.notes?'\nNotes: '+o.notes:''}`).join('\n\n');
    const r=await callClaude(
      'Senior compensation and career strategist for Jermaine Anderson. Provide a decisive, specific recommendation.',
      'Compare these offers and provide a comprehensive analysis.\n\nCANDIDATE PRIORITIES:\nBase salary target: $70,000-$95,000\nWalk-away: $65,000\nPreference: stability, growth, total comp\n\nOFFERS:\n'+offerText+'\n\n'
      +'## OFFER SCORES\n[Score each offer out of 100 across: salary, total comp, growth, stability, flexibility]\n\n'
      +'## WINNER: [Company Name]\n[2-sentence verdict — which to take and the primary reason]\n\n'
      +'## SIDE-BY-SIDE COMPARISON\n[Table format comparing all offers across key dimensions]\n\n'
      +'## WHAT TO NEGOTIATE ON THE WINNING OFFER\n[3 specific asks to make before signing]\n\n'
      +'## WHAT TO SAY TO DECLINE THE OTHER OFFER(S)\n[Exact professional language to decline gracefully]\n\n'
      +'## TOTAL COMPENSATION BREAKDOWN\n[Annual value of salary + bonus + pension + vacation for each offer]',
      1500
    );
    out.innerHTML=outbox(r)+'<div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-ghost btn-xs" id="offer-cp" style="color:var(--muted)" onclick="copyText(this.dataset.text,\'offer-cp\')" data-text="'+esc(r)+'">Copy Analysis</button></div>';
  }catch(e){out.innerHTML=alertHtml('&#10007;',esc(e.message),'var(--red)');}
  if(btn){btn.disabled=false;btn.innerHTML='&#9889; AI Comparison + Recommendation';}
}

function renderCareerMode(){

  // Current mode banner
  h+='<div style="background:linear-gradient(135deg,'+cfg.color+'22,'+cfg.color+'08);border:1px solid '+cfg.color+'44;border-radius:14px;padding:14px 16px;margin-bottom:14px">'

    +'<div style="font-size:12px;color:var(--muted);line-height:1.5">'+esc(cfg.tagline)+'</div>'
    +(cfg.urgency?'<div style="margin-top:6px;font-size:10px;font-weight:700;color:'+(cfg.urgency==='HIGH'?'var(--red)':cfg.urgency==='MEDIUM'?'var(--gold)':'var(--green)')+'">URGENCY: '+cfg.urgency+'</div>':'')
    +'</div>';

  // Mode selector grid
  h+='<div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Select Your Situation</div>';
  h+='<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">';
  Object.values(CAREER_MODES).forEach(mode=>{
    const active=mode.id===currentMode;
    h+='<div onclick="setCareerMode(\''+mode.id+'\');renderCareerMode()" style="padding:12px 14px;border-radius:12px;border:1.5px solid '+(active?mode.color:'var(--b1)');
    h+=';background:'+(active?mode.color+'15':'var(--card)')+';cursor:pointer;transition:all .15s">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:2px">'
      +'<span style="font-size:18px">'+mode.icon+'</span>'
      +'<div><div style="font-size:13px;font-weight:800;color:'+(active?'#fff':'var(--muted)')+'">'+mode.label+'</div>'
      +'<div style="font-size:11px;color:var(--muted);line-height:1.4">'+esc(mode.tagline)+'</div></div>'
      +(active?'<span style="margin-left:auto;font-size:10px;font-weight:700;background:'+mode.color+';color:#000;padding:2px 8px;border-radius:8px">ACTIVE</span>':'')
      +'</div></div>';
  });
  h+='</div>';

  // Configuration playbook for current mode
  h+='<div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Your '+cfg.label+' Playbook</div>';

  // Gap/dismissal language
  if(cfg.gapLanguage&&cfg.gapLanguage.length){
    cfg.gapLanguage.forEach(gl=>{
      h+='<div class="card" style="border-color:rgba(232,168,37,.3);margin-bottom:10px"><div class="card-head" style="background:rgba(232,168,37,.1)"><div class="card-head-title" style="color:var(--gold)">&#127914; Scripts: "'+esc(gl.q)+'"</div></div><div style="padding:8px 0">';

        h+='<div style="padding:11px 14px;border-bottom:'+(i<gl.scripts.length-1?'1px solid var(--b1)':'none')+'">'

async function genSituationPlan(){
  const cfg=getCareerConfig();
  const btn=el('mode-plan-btn');if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Building your plan...';}
  const out=el('mode-plan-out');if(out)out.innerHTML='';
  const intel=ls('pro_company_intel',null);
  const apps=getApps()||[];
  const applied=apps.filter(a=>a.status!=='Not Applied').length;
  try{
    const r=await callClaude(
      'Expert career strategist for Jermaine Anderson (11+ years BA, SAP certified, IFS Nova lead, Winnipeg, displaced April 2026). Provide concrete 30-day action plan.'+getActiveIntelContext(400)+',',
      'Career situation: '+cfg.label+'\nSituation context: '+cfg.desc+'\n\n'
      +'CANDIDATE PROFILE:\n'+PROFILE.slice(0,800)+'\n\n'
      +'Current status: Day '+daysSince(null)+' of search, '+applied+' applications sent'
      +(intel?' | Last researched: '+intel.company+' for '+intel.role:'')+'\n\n'
      +'Generate a comprehensive action plan:\n\n'
      +'## THIS WEEK (Days 1-7)\n'
      +'[3-5 specific daily actions tailored to the '+cfg.label+' situation]\n\n'
      +'## WEEK 2-3 (Days 8-21)\n'
      +'[Escalation actions, networking moves, follow-up cadence]\n\n'
      +'## WEEK 4 (Days 22-30)\n'
      +'[Assessment, pivot if needed, acceleration]\n\n'
      +'## SITUATION-SPECIFIC MOVES\n'
      +'[3-5 actions that are uniquely important given the '+cfg.label+' context — things other job seekers do not need to do]\n\n'
      +'## DAILY HABITS\n'
      +'[5 daily non-negotiable actions for someone in this exact situation]\n\n'
      +'## WHAT NOT TO DO\n'
      +'[3 mistakes people in the '+cfg.label+' situation commonly make — be specific]',
      2000
    );
    sv('apex_situation_plan',{content:r,mode:cfg.id,date:todayStr()});
    if(out)out.innerHTML=outbox(r)+'<div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-ghost btn-xs" id="plan-cp" style="color:var(--muted)" onclick="copyText(this.dataset.text,\'plan-cp\')" data-text="'+esc(r)+'">Copy Plan</button></div>';
  }catch(e){if(out)out.innerHTML=alertHtml('&#10007;',esc(e.message),'var(--red)');}
  if(btn){btn.disabled=false;btn.innerHTML='&#9889; Regenerate Plan';}
}

function generateNewScenario(){
  const scenarios=[
    'Walk me through your experience with ERP systems — specifically what you own end-to-end.',
    'Explain how you would approach requirements elicitation for a new system with 5 departments involved.',
    'Tell me about a time you used data analytics to drive a significant business decision.',

    'Walk me through the IFS Project Nova implementation from your perspective.',

    'Explain your approach to building a KPI framework for an operations team.',
    'Describe the most technically complex system integration you have managed.',
    'How do you translate complex technical requirements into language executives can act on?',
    'Tell me about a time your analytical work directly saved the company money.',
    'Describe how you would handle a go-live that is at risk with 2 weeks to launch.',
    'Walk me through your process for a vendor evaluation and selection.',
    'How do you build credibility with technical teams when you are not a developer?',

async function genArticulationCoach(){
  const struggle=el('artic-struggle')?el('artic-struggle').value.trim():'';
  if(!struggle){alert('Describe what you find hard to articulate.');return;}
  const btn=el('artic-btn');if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Coaching...';}
  const out=el('artic-out');if(out)out.innerHTML='';
  try{
    const r=await callClaude(
      'Expert communication coach for Jermaine Anderson (11+ years BA, SAP certified, IFS Nova lead, Winnipeg). Specializing in professional language for Business Analysis, ERP, Supply Chain, and Analytics. Use active company research when relevant.'+getActiveIntelContext(300)+'. Help articulate complex professional experiences clearly and powerfully.',

      +'Provide:\n'
      +'## THE PRECISE LANGUAGE\n'
      +'[The exact professional language to use — correct field terminology, active voice, specific]\n\n'
      +'## PLAIN ENGLISH VERSION\n'
      +'[The simpler version for non-technical audiences]\n\n'
      +'## FIELD TERMS TO USE\n'
      +'[3-5 specific professional terms that belong in this explanation and make it credible]\n\n'
      +'## WHAT TO AVOID\n'
      +'[The vague or weak phrasing that undermines the point]\n\n'
      +'## PRACTICE OUT LOUD\n'
      +'[3 variations — short (15 sec), medium (45 sec), full (90 sec) — using the correct language]',

    );
    const hist=ls('apex_articulate_history',[]);

  }catch(e){if(out)out.innerHTML=alertHtml('&#10007;',esc(e.message),'var(--red)');}

async function startPanelSim(){
  const role=el('panel-role')?el('panel-role').value.trim():'Senior BA';
  const selected=Object.keys(PANEL_PERSONAS).filter(k=>el('panel-'+k)&&el('panel-'+k).checked);
  if(selected.length<2){alert('Select at least 2 panelists.');return;}
  const rounds=parseInt(el('panel-rounds')?el('panel-rounds').value:8)||8;
  _panelSession={interviewers:selected,messages:[],currentInterviewer:0,round:1,maxRounds:rounds,active:true,role};
  sv('apex_panel_role',role);
  // Generate opening question
  await advancePanelRound();
  st('ivTab','panel');render();
}

async function advancePanelRound(){
  const session=_panelSession;
  const personaKey=session.interviewers[session.currentInterviewer];
  const persona=PANEL_PERSONAS[personaKey];
  const prevAnswers=session.messages.filter(m=>m.role==='candidate').map(m=>m.content).join('\n\n');
  const btn=el('panel-submit-btn');if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>';}
  try{
    const q=await callClaude(
      'You are '+persona.name+' ('+persona.title+') on a '+session.interviewers.length+'-person interview panel for '+session.role+'. Candidate: Jermaine Anderson, 11+ years BA, SAP TERP10, IFS Nova lead, $200M+ PepsiCo. Winnipeg. Displaced April 2026.'+getActiveIntelContext(300)+'\n\nYour personality: '+persona.style+'\nYour focus areas: '+persona.focus+'\n\nPrevious answers given by candidate:\n'+(prevAnswers||'[No answers yet — this is the opening question]')+'\n\nIMPORTANT: Ask only ONE question. Stay in character. React naturally to what was said. If this is round '+session.round+' of '+session.maxRounds+', calibrate depth accordingly. Do not introduce yourself — just ask your question directly.',
      'Ask your next interview question for round '+session.round+'. Previous panelist questions and candidate answers are in context. Build on what has been said — don\'t repeat covered ground.',
      300
    );
    session.messages.push({role:'interviewer',personaKey,persona:persona.name,content:q.trim()});
    sv('apex_panel_session',session);
  }catch(e){
    session.messages.push({role:'interviewer',personaKey,persona:persona.name,content:'Tell me more about your most relevant experience for this role.'});
  }
  if(btn){btn.disabled=false;btn.innerHTML='&#8594; Send Answer';}
  st('ivTab','panel');render();
}

async function submitPanelAnswer(){
  const ans=el('panel-answer')?el('panel-answer').value.trim():'';
  if(!ans){alert('Type your answer before submitting.');return;}
  const session=_panelSession;
  session.messages.push({role:'candidate',content:ans});
  session.round++;
  // Rotate to next panelist
  session.currentInterviewer=(session.currentInterviewer+1)%session.interviewers.length;
  if(el('panel-answer'))el('panel-answer').value='';
  if(session.round<=session.maxRounds){await advancePanelRound();}
  else{session.messages.push({role:'end',content:''});sv('apex_panel_session',session);st('ivTab','panel');render();}
}

async function endPanelSim(){
  const session=_panelSession;
  const out=el('panel-out');if(out)out.innerHTML=alertHtml('&#128202;','Generating debrief from all panelists...','var(--purple)');
  const transcript=session.messages.filter(m=>m.role!=='end').map(m=>m.role==='interviewer'?m.persona+': '+m.content:'You: '+m.content).join('\n\n');
  try{
    const debrief=await callClaude(
      'Senior interview panel debrief coach. Analyze this interview and provide perspective from each panelist.',
      'Provide a comprehensive debrief for this panel interview for: '+session.role+'\n\nPANELISTS: '+session.interviewers.map(k=>PANEL_PERSONAS[k].name+' ('+PANEL_PERSONAS[k].title+')').join(', ')+'\n\nTRANSCRIPT:\n'+transcript+'\n\n## OVERALL IMPRESSION: X/10\n\n## FROM EACH PANELIST\n'
      +session.interviewers.map(k=>`### ${PANEL_PERSONAS[k].name}'s Assessment\n[How they perceived the candidate based on their focus: ${PANEL_PERSONAS[k].focus}]\n[What landed, what fell flat, what they would vote]`).join('\n\n')
      +'\n\n## STRONGEST ANSWERS\n[Which responses impressed the panel and why]\n\n## MISSED OPPORTUNITIES\n[Where stronger answers would have shifted the outcome]\n\n## HIRING RECOMMENDATION\n[Likely panel vote — hire/no hire/borderline — with specific reasoning per panelist]\n\n## TOP 3 IMPROVEMENTS FOR NEXT TIME',
      2000
    );
    _panelSession.active=false;sv('apex_panel_session',_panelSession);
    if(out)out.innerHTML=outbox(debrief)+'<div style="display:flex;gap:8px;margin-top:10px"><button class="btn btn-ghost btn-xs" id="panel-cp" style="color:var(--muted)" onclick="copyText(this.dataset.text,\'panel-cp\')" data-text="'+esc(debrief)+'">Copy Debrief</button><button class="btn btn-purple btn-xs" onclick="_panelSession={interviewers:[],messages:[],currentInterviewer:0,round:0,maxRounds:8,active:false};st(\'ivTab\',\'panel\');render()">New Panel &#8635;</button></div>';
    st('ivTab','panel');render();
  }catch(e){if(out)out.innerHTML=alertHtml('&#10007;',esc(e.message),'var(--red)');}
}

let _webcamSession={stream:null,intervalId:null,frameCount:0,issues:[],active:false};

function renderWebcamCoach(){

<strong style="color:rgba(255,255,255,.5)">Analysis runs every 30 seconds while camera is active</strong>

}

async function startWebcamCoach(){
  const btn=el('webcam-start-btn');
  const video=el('webcam-preview');
  const feedback=el('webcam-feedback');
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'},audio:false});
    _webcamSession.stream=stream;_webcamSession.active=true;_webcamSession.frameCount=0;_webcamSession.issues=[];
    if(video){video.srcObject=stream;video.style.display='block';}
    if(btn){btn.innerHTML='&#9646;&#9646; Stop Analysis';btn.onclick=stopWebcamCoach;btn.style.background='var(--red)';}
    if(feedback)feedback.innerHTML=alertHtml('&#127909;','Camera active — first analysis in 15 seconds. Look directly at your camera lens, not your screen.','var(--teal)');
    // Analyze every 30 seconds
    await new Promise(r=>setTimeout(r,15000));
    if(_webcamSession.active)await analyzeWebcamFrame('opening');
    _webcamSession.intervalId=setInterval(()=>{if(_webcamSession.active)analyzeWebcamFrame('periodic');},30000);
  }catch(e){
    if(e.name==='NotAllowedError')alert('Camera access denied. Allow camera in browser settings to use this feature.');
    else alert('Camera error: '+e.message);
  }
}

async function analyzeWebcamFrame(type){
  const video=el('webcam-preview');const canvas=el('webcam-canvas');const feedback=el('webcam-feedback');
  if(!video||!canvas||!_webcamSession.active)return;
  try{
    canvas.width=video.videoWidth||640;canvas.height=video.videoHeight||480;
    const ctx=canvas.getContext('2d');ctx.drawImage(video,0,0);
    const dataUrl=canvas.toDataURL('image/jpeg',0.7);
    const base64=dataUrl.split(',')[1];
    _webcamSession.frameCount++;
    // Call Claude with vision
    const key=getApiKey();if(!key)return;
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:400,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},
          {type:'text',text:'You are a video interview coach analyzing this webcam frame from a job interview practice session. Provide brief, specific, actionable feedback on:\n1. EYE CONTACT: Is the person looking at the camera? Rate 1-5.\n2. POSTURE: Upright and engaged? Rate 1-5.\n3. FRAMING: Properly centered, good lighting? Rate 1-5.\n4. PRESENCE: Overall professional presence. Rate 1-5.\n\nFormat: OVERALL: X/20 | [2 sentence specific coaching tip focusing on the most important fix]'}
        ]}]
      })
    });
    if(!r.ok)return;
    const d=await r.json();const text=d.content&&d.content[0]&&d.content[0].text||'';
    _webcamSession.issues.push({frame:_webcamSession.frameCount,feedback:text,time:new Date().toLocaleTimeString()});
    const scoreMatch=text.match(/OVERALL:\s*(\d+)\/20/i);
    const score=scoreMatch?parseInt(scoreMatch[1]):12;
    const scoreC=score>=16?'var(--green)':score>=12?'var(--gold)':'var(--red)';
    if(feedback)feedback.innerHTML='<div style="padding:10px 12px;background:rgba(255,255,255,.05);border-radius:9px;border-left:3px solid '+scoreC+'">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">'
      +'<div style="font-size:11px;font-weight:700;color:var(--muted)">Frame '+_webcamSession.frameCount+' · '+new Date().toLocaleTimeString()+'</div>'
      +'<div style="font-size:16px;font-weight:900;color:'+scoreC+'">'+score+'/20</div>'
      +'</div><div style="font-size:12px;color:var(--muted);line-height:1.6">'+esc(text.replace(/OVERALL:\s*\d+\/20\s*\|?\s*/i,''))+'</div></div>';
  }catch{}
}

function stopWebcamCoach(){
  _webcamSession.active=false;
  if(_webcamSession.intervalId)clearInterval(_webcamSession.intervalId);
  if(_webcamSession.stream)_webcamSession.stream.getTracks().forEach(t=>t.stop());
  const video=el('webcam-preview');if(video){video.srcObject=null;video.style.display='none';}
  const btn=el('webcam-start-btn');if(btn){btn.innerHTML='&#127909; Start Camera Analysis';btn.onclick=startWebcamCoach;btn.style.background='var(--teal)';}
  // Generate session report
  const report=el('webcam-report');
  if(_webcamSession.issues.length&&report){
    const avgScore=Math.round(_webcamSession.issues.reduce((s,f)=>{const m=f.feedback.match(/OVERALL:\s*(\d+)\/20/i);return s+(m?parseInt(m[1]):12);},0)/_webcamSession.issues.length);
    const scoreC=avgScore>=16?'var(--green)':avgScore>=12?'var(--gold)':'var(--red)';
    report.innerHTML='<div class="card"><div class="card-head" style="background:rgba(13,184,160,.12)"><div class="card-head-title" style="color:var(--teal)">&#128202; Session Summary — '+_webcamSession.frameCount+' frames analyzed</div></div><div class="card-body">'
      +'<div style="font-size:32px;font-weight:900;color:'+scoreC+';margin-bottom:8px">'+avgScore+'<span style="font-size:14px;color:var(--muted)">/20 avg</span></div>'
      +'<div style="font-size:12px;color:var(--muted);line-height:1.7">'+_webcamSession.issues.map(f=>
        '<div style="padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05)"><strong style="color:rgba(255,255,255,.4)">'+f.time+'</strong> '+esc(f.feedback.replace(/OVERALL:\s*\d+\/20\s*\|?\s*/i,'').slice(0,120))+'</div>'
      ).join('')+'</div></div></div>';
  }
}

async function scanCardATS(appId){
  const app=STATE.apps.find(a=>a.id===appId);
  if(!app||!app.jd||app.jd.trim().length<50){alert('Add a job description to this role first.');return;}
  const btn=el('card-ats-btn-'+appId);if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span>';}
  try{
    const r=await callClaude(
      'ATS analyst. Fast keyword match. Return ONLY: "MATCH: XX% | [3-word verdict] | [top 2 missing keywords]"',
      'Quick ATS match for '+app.title+' at '+app.company+'.\nProfile: '+PROFILE.slice(0,500)+'\nJD: '+app.jd.slice(0,600)+'\nReturn: MATCH: XX% | [verdict] | Missing: [keyword1, keyword2]',
      150
    );
    const match=r.match(/MATCH:\s*(\d+)%/i);
    const score=match?parseInt(match[1]):65;
    const scoreC=score>=80?'#16a34a':score>=65?'#d97706':'#dc2626';
    // Save to app
    const appIdx=STATE.apps.findIndex(a=>a.id===appId);
    if(appIdx>=0){STATE.apps[appIdx].atsScore=score;STATE.apps[appIdx].atsSummary=r;saveApps();}
    const scoreEl=el('card-ats-score-'+appId);
    if(scoreEl)scoreEl.innerHTML='<span style="font-size:11px;font-weight:700;color:'+scoreC+'">ATS: '+score+'%</span>';
    if(btn){btn.disabled=false;btn.innerHTML='Rescan';}
  }catch(e){if(btn){btn.disabled=false;btn.innerHTML='ATS Scan';}}
}

      +'<a href="'+esc(g.link)+'" target="_blank" rel="noopener noreferrer" style="text-decoration:none"><button class="btn btn-green btn-xs">&#128279; '+esc(g.linkLabel)+'</button></a>'
      +'</div>'
      +'<div style="font-size:11px;color:var(--muted);padding:8px 10px;background:rgba(255,255,255,.04);border-radius:7px"><strong style="color:rgba(255,255,255,.3)">Backend path:</strong> '+esc(g.buildPath)+'</div>'
      +'</div></div>';
  });
  return h;
}

// ── AUTO-LISTEN (DESKTOP) ─────────────────────────────────────────────
async function startAutoListen() {
  try {
    // Request screen + audio capture
    const stream = await navigator.mediaDevices.getDisplayMedia({
      video: { cursor: 'never' },
      audio: {
        echoCancellation: false,
        noiseSuppression: false,
        sampleRate: 44100,
      }
    });

    // Check if audio track was granted
    const audioTracks = stream.getAudioTracks();
    if (!audioTracks.length) {
      stream.getTracks().forEach(t => t.stop());
      alert('No audio captured. When sharing your screen, make sure to check "Share audio" or "Share system audio" in the dialog. Then try again.');
      return;
    }

    LIVE_IV.stream = stream;
    LIVE_IV.mode = 'listening';
    LIVE_IV.autoMode = true;
    LIVE_IV.sessionLog = [];
    LIVE_IV.questionBuffer = '';

    // Handle stream ending (user stops share)
    stream.getVideoTracks()[0].addEventListener('ended', () => {
      if (LIVE_IV.mode !== 'idle') stopLiveIV();
    });

    // Set up speech recognition on the captured audio
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert('Speech recognition not available. Use Chrome or Edge on desktop.');
      stream.getTracks().forEach(t => t.stop());
      return;
    }

    // Create audio context and connect the captured stream
    LIVE_IV.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = LIVE_IV.audioContext.createMediaStreamSource(
      new MediaStream(audioTracks)
    );

    // Create a destination stream for speech recognition
    const dest = LIVE_IV.audioContext.createMediaStreamDestination();
    source.connect(dest);

    // Speech recognition on the captured audio
    const rec = new SpeechRecognition();
    rec.continuous = true;
    rec.interimResults = true;
    rec.lang = 'en-CA';
    LIVE_IV.recognition = rec;

    rec.onresult = (event) => {
      let interim = '';
      let final = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) {
          final += event.results[i][0].transcript + ' ';
        } else {
          interim += event.results[i][0].transcript;
        }
      }
      if (final) {
        LIVE_IV.questionBuffer += final;
        updateLiveTranscript();
        // Reset silence timer — question ends when speaker pauses
        clearTimeout(LIVE_IV.silenceTimer);
        LIVE_IV.silenceTimer = setTimeout(() => {
          if (LIVE_IV.questionBuffer.trim().length > 10 && !LIVE_IV.generating) {
            detectAndAnswer(LIVE_IV.questionBuffer.trim());
            LIVE_IV.questionBuffer = '';
          }
        }, 2000); // 2s silence = question complete
      }
      // Show interim in UI
      const transcriptEl = el('live-transcript');
      if (transcriptEl) {
        transcriptEl.textContent = (LIVE_IV.questionBuffer + interim) || 'Listening...';
      }
    };

    rec.onerror = (e) => {
      if (e.error !== 'no-speech') console.warn('Speech recognition error:', e.error);
    };

    rec.onend = () => {
      if (LIVE_IV.mode === 'listening') {
        try { rec.start(); } catch {}
      }
    };

    // Start recognition on the captured audio destination
    try {
      // Attempt to use the captured stream directly
      const capturedRec = new SpeechRecognition();
      capturedRec.continuous = true;
      capturedRec.interimResults = true;
      capturedRec.lang = 'en-CA';
      LIVE_IV.recognition = capturedRec;
      capturedRec.onresult = rec.onresult;
      capturedRec.onerror = rec.onerror;
      capturedRec.onend = rec.onend;
      capturedRec.start();
    } catch {
      // Fallback: use microphone recognition (picks up room audio)
      rec.start();
      LIVE_IV.recognition = rec;
    }

    st('ivTab', 'stealth');
    render();

  } catch (e) {
    if (e.name === 'NotAllowedError') {
      alert('Screen sharing was cancelled or denied. Click Auto-Listen and share your Zoom/Teams window when prompted.');
    } else {
      alert('Could not start audio capture: ' + e.message + '\n\nUse Chrome or Edge on desktop for this feature.');
    }
  }
}

function updateLiveTranscript() {
  const el2 = el('live-transcript');
  if (el2) el2.textContent = LIVE_IV.questionBuffer || 'Listening for question...';
}

// ── QUESTION DETECTION + ANSWER GENERATION ────────────────────────────
async function detectAndAnswer(text) {
  if (LIVE_IV.generating || LIVE_IV.mode === 'idle') return;
  LIVE_IV.generating = true;
  LIVE_IV.lastQuestion = text;
  LIVE_IV.mode = 'generating';

  const answerEl = el('live-answer');
  if (answerEl) {
    answerEl.innerHTML = '<div style="display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(232,168,37,.1);border-radius:8px"><span class="spin"></span><span style="font-size:12px;color:var(--gold)">Generating answer...</span></div>';
  }

  try {
    const r = await callClaude(
      'You are a real-time interview copilot for Jermaine Anderson. Generate an answer script he can read from naturally during a live interview. Tone: confident, specific, direct. Use first person. Include his real metrics where relevant. Maximum 150 words. Never say "I tried" — only "I did / I led / I built."',
      'LIVE INTERVIEW — interviewer just said:\n"' + text + '"\n\n' +
      'KEY FACTS (use these):\n' +
      '• 11 years BA/Analytics/Supply Chain\n' +
      '• PepsiCo: $200M+ cost savings, 109% productivity, ±$0.20 freight accuracy\n' +
      '• Price Industries: IFS Project Nova (live production), 5 departments, ERP lifecycle\n' +
      '• SAP TERP 10 certified, Power BI, Advanced Excel\n' +
      '• Dismissed without cause April 2026 (do not mention unless asked why you left)\n' +
      '• Gap answer if needed: "The role came to an end. I am now being deliberate about my next chapter — and this role is at the top of that list."\n\n' +
      'Is this a question? If yes, write the answer script.\n' +
      'If it is NOT a question (just talking), respond only with: [NOT A QUESTION]\n\n' +
      'Format your answer as:\n' +
      'OPEN: [first sentence — confident, specific]\n' +
      'BODY: [the STAR story or key point — 2-3 sentences max]\n' +
      'CLOSE: [landing line that ties it back to this role]\n\n' +
      'Under 120 words total.',
      500
    );

    if (r.includes('[NOT A QUESTION]')) {
      LIVE_IV.mode = 'listening';
      LIVE_IV.generating = false;
      if (answerEl) answerEl.innerHTML = '<div style="font-size:11px;color:var(--muted);padding:6px 8px">Not a question — continuing to listen...</div>';
      return;
    }

    // Valid question + answer
    const entry = {
      q: text,
      a: r,
      ts: new Date().toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' }),
      date: todayStr(),
    };
    LIVE_IV.sessionLog.push(entry);

    // Save to persistent log
    const savedLog = ls('apex_iv_log', []);
    savedLog.unshift(entry);
    sv('apex_iv_log', savedLog.slice(0, 200));

    // Display answer script
    if (answerEl) {
      const lines = r.split('\n').filter(l => l.trim());
      answerEl.innerHTML = '<div style="background:rgba(232,168,37,.1);border-radius:10px;border-left:3px solid var(--gold);padding:12px 14px">'
        + lines.map(line => {
          if (line.startsWith('OPEN:')) {
            return '<div style="font-size:14px;font-weight:800;color:#fff;margin-bottom:6px">' + esc(line.replace('OPEN:', '').trim()) + '</div>';
          } else if (line.startsWith('BODY:')) {
            return '<div style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:6px">' + esc(line.replace('BODY:', '').trim()) + '</div>';
          } else if (line.startsWith('CLOSE:')) {
            return '<div style="font-size:13px;font-weight:600;color:var(--gold)">' + esc(line.replace('CLOSE:', '').trim()) + '</div>';
          }
          return '<div style="font-size:13px;color:var(--muted);line-height:1.7">' + esc(line) + '</div>';
        }).join('')
        + '<div style="display:flex;gap:6px;margin-top:10px">'
        + '<button class="btn btn-ghost btn-xs" id="live-ans-cp" style="color:var(--muted)" onclick="copyText(this.dataset.text,\'live-ans-cp\')" data-text="' + esc(r) + '">Copy</button>'
        + '<button class="btn btn-gold btn-xs" onclick="LIVE_IV.mode=\'listening\';LIVE_IV.generating=false;el(\'live-answer\').innerHTML=\'\';updateLiveTranscript()">Next &#8594;</button>'
        + '</div></div>';
    }

    LIVE_IV.mode = 'listening';
    smartSync();

  } catch (e) {
    if (answerEl) answerEl.innerHTML = alertHtml('&#10007;', esc(e.message), 'var(--red)');
    LIVE_IV.mode = 'listening';
  }
  LIVE_IV.generating = false;
}

// ── MANUAL MODE ───────────────────────────────────────────────────────
async function runManualIV() {
  const q = el('manual-iv-q') ? el('manual-iv-q').value.trim() : '';
  if (!q) { alert('Type the question first.'); return; }
  const ctx = el('manual-iv-ctx') ? el('manual-iv-ctx').value.trim() : '';
  const btn = el('manual-iv-btn');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Generating...'; }
  const out = el('manual-iv-out');
  if (out) out.innerHTML = '';

  try {
    const r = await callClaude(
      'Real-time interview copilot for Jermaine Anderson. Confident, specific, under 150 words. Real metrics only.',
      'Interview question: "' + q + '"' + (ctx ? '\nContext: ' + ctx : '') + '\n\n' +
      'Jermaine\'s facts:\n• $200M+ cost savings, PepsiCo national\n• IFS Project Nova — live production, 5 depts\n• SAP certified, Power BI, Advanced Excel\n• Gap answer if needed: "The role came to an end. I am now deliberate about my next chapter — this is at the top of that list."\n\n' +
      'OPEN: [first sentence]\nBODY: [STAR story 2-3 sentences]\nCLOSE: [landing line]\n\nUnder 120 words.',
      400
    );

    const entry = {
      q,
      a: r,
      ts: new Date().toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' }),
      date: todayStr(),
    };
    LIVE_IV.sessionLog.push(entry);
    const savedLog = ls('apex_iv_log', []);
    savedLog.unshift(entry);
    sv('apex_iv_log', savedLog.slice(0, 200));

    if (out) {
      out.innerHTML = '<div style="background:rgba(232,168,37,.12);border-radius:12px;border-left:4px solid var(--gold);padding:14px">'
        + '<div style="font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;margin-bottom:8px">Answer Script</div>'
        + '<div style="font-size:14px;color:#fff;line-height:1.8;white-space:pre-line">' + esc(r) + '</div>'
        + '<div style="display:flex;gap:7px;margin-top:12px;flex-wrap:wrap">'
        + '<button class="btn btn-ghost btn-xs" id="miv-cp" style="color:var(--muted)" onclick="copyText(this.dataset.text,\'miv-cp\')" data-text="' + esc(r) + '">Copy Script</button>'
        + '<button class="btn btn-gold btn-xs" onclick="el(\'manual-iv-q\').value=\'\';el(\'manual-iv-out\').innerHTML=\'\';el(\'manual-iv-q\').focus()">Next Question &#8594;</button>'
        + '</div></div>';
    }
    if (el('manual-iv-q')) el('manual-iv-q').value = '';
    smartSync();
  } catch (e) {
    if (out) out.innerHTML = alertHtml('&#10007;', esc(e.message), 'var(--red)');
  }
  if (btn) { btn.disabled = false; btn.innerHTML = '&#9889; Get Answer Script'; }
}

// ── SESSION CONTROLS ──────────────────────────────────────────────────
function pauseLiveIV() {
  LIVE_IV.mode = 'paused';
  if (LIVE_IV.recognition) try { LIVE_IV.recognition.stop(); } catch {}
  st('ivTab', 'stealth'); render();
}

function resumeLiveIV() {
  LIVE_IV.mode = 'listening';
  if (LIVE_IV.recognition) try { LIVE_IV.recognition.start(); } catch {}
  st('ivTab', 'stealth'); render();
}

function stopLiveIV() {
  // Stop all streams
  if (LIVE_IV.stream) {
    LIVE_IV.stream.getTracks().forEach(t => t.stop());
    LIVE_IV.stream = null;
  }
  if (LIVE_IV.recognition) {
    try { LIVE_IV.recognition.stop(); } catch {}
    LIVE_IV.recognition = null;
  }
  if (LIVE_IV.audioContext) {
    try { LIVE_IV.audioContext.close(); } catch {}
    LIVE_IV.audioContext = null;
  }
  clearTimeout(LIVE_IV.silenceTimer);
  LIVE_IV.mode = 'idle';
  LIVE_IV.generating = false;
  LIVE_IV.questionBuffer = '';
  st('ivTab', 'stealth');
  render();
}

// ── LOG MANAGEMENT ────────────────────────────────────────────────────
function deleteLogEntry(idx) {

function exportLogToQABank() {
  const log = ls('apex_iv_log', []);
  if (!log.length) { alert('No Q&A in your log yet.'); return; }

  // Add to QA_BANK as a new section
  const captured = log.filter(e => e.q && e.a).map(e => ({
    q: e.q,
    a: e.a,
  }));

  if (!captured.length) { alert('No complete Q&A pairs to export.'); return; }

  // Save as captured Q&A bank
  const existing = ls('apex_captured_qa', []);
  captured.forEach(entry => {
    if (!existing.find(e => e.q === entry.q)) {
      existing.unshift(entry);
    }
  });
  sv('apex_captured_qa', existing.slice(0, 500));

  alert('✓ ' + captured.length + ' Q&A pairs added to your captured bank. They will appear in the Q&A tab under "From Your Interviews."');
  smartSync();
}

// ── KEYWORD TRIGGER MAP ───────────────────────────────────────────────
function matchKeyword(input) {
  const lower = input.toLowerCase().trim();
  if (!lower) return null;
  const match = PHONE_SCREENS.find(screen =>
    screen.tags.some(tag => lower.includes(tag))
  );
  return match || null;
}

// ── CARD ACTIVATION ───────────────────────────────────────────────────
function activatePhoneCard(id) {
  const card = PHONE_SCREENS.find(s => s.id === id);
  if (!card) return;
  PHONE_IV.activeCard = card;
  logPhoneQA(card.q, card.a);  // auto-log when card is opened
  st('ivTab', 'phone');
  render();
  // Scroll to answer
  setTimeout(() => {
    const el2 = el('phone-active-answer');
    if (el2) el2.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 100);
}

// ── KEYWORD SEARCH ────────────────────────────────────────────────────
function phoneKeywordSearch(value, submit) {
  const result = el('phone-keyword-result');
  if (!result) return;
  if (!value || !value.trim()) { result.innerHTML = ''; return; }

  const match = matchKeyword(value);
  if (match) {
    result.innerHTML = `<div style="padding:12px 14px;background:${esc(match.color)}22;border-radius:12px;border-left:4px solid ${esc(match.color)}">
      <div style="font-size:11px;font-weight:800;color:${esc(match.color)};margin-bottom:6px">${esc(match.icon)} ${esc(match.short)}</div>
      <div style="font-size:15px;color:#fff;line-height:1.8;white-space:pre-line">${esc(match.a)}</div>
      <div style="display:flex;gap:6px;margin-top:10px">
        <button class="btn btn-ghost btn-xs" id="kw-cp" style="color:var(--muted)" onclick="copyText(this.dataset.text,'kw-cp')" data-text="${esc(match.a)}">Copy</button>
        <button class="btn btn-ghost btn-xs" style="color:var(--green)" onclick="logPhoneQA('${esc(match.q)}','${esc(match.a)}');el('phone-keyword').value='';el('phone-keyword-result').innerHTML=''">✓ Log &amp; Clear</button>
      </div>
    </div>`;
    if (submit) {
      activatePhoneCard(match.id);
      if (el('phone-keyword')) el('phone-keyword').value = '';
    }
  } else if (value.length > 3) {
    result.innerHTML = `<div style="font-size:12px;color:var(--muted);padding:8px 0">No quick match — tap a card above or type more specifically</div>`;
  }
}

function startPhoneIV() {
  const company = el('phone-company') ? el('phone-company').value.trim() : '';
  const role = el('phone-role') ? el('phone-role').value.trim() : '';
  if (!company) { alert('Enter the company name first.'); return; }

  PHONE_IV.active = true;
  PHONE_IV.company = company;
  PHONE_IV.role = role || 'Role';
  PHONE_IV.startTime = Date.now();
  PHONE_IV.activeCard = null;
  PHONE_IV.callLog = [];
  PHONE_IV.postCallNotes = '';

  // Auto-set first card to "Tell me about yourself"
  PHONE_IV.activeCard = PHONE_SCREENS[0];

  // Start timer
  PHONE_IV.timerInterval = setInterval(() => {
    const timerEl = el('phone-timer');
    if (!timerEl || !PHONE_IV.startTime) return;
    const elapsed = Math.floor((Date.now() - PHONE_IV.startTime) / 1000);
    const mins = Math.floor(elapsed / 60);
    const secs = elapsed % 60;
    timerEl.textContent = String(mins).padStart(2,'0') + ':' + String(secs).padStart(2,'0');
    timerEl.style.color = mins >= 25 ? 'var(--red)' : mins >= 15 ? 'var(--gold)' : 'var(--green)';
  }, 1000);

  // Keep screen awake if supported
  if ('wakeLock' in navigator) {
    navigator.wakeLock.request('screen').catch(() => {});
  }

  st('ivTab', 'phone');
  render();
}

function logPhoneQA(q, a) {
  if (!q || !a) return;
  const ts = new Date().toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' });
  if (!PHONE_IV.callLog.find(e => e.q === q)) {
    PHONE_IV.callLog.push({ q, a, ts });
  }
  // Also save to main interview log
  const ivLog = ls('apex_iv_log', []);
  if (!ivLog.find(e => e.q === q)) {
    ivLog.unshift({ q, a, ts, date: todayStr(), source: 'phone_screen' });
    sv('apex_iv_log', ivLog.slice(0, 200));
  }
}

function endPhoneIV() {
  clearInterval(PHONE_IV.timerInterval);
  const duration = PHONE_IV.startTime
    ? Math.floor((Date.now() - PHONE_IV.startTime) / 60000) + ' min'
    : '';

  // Save call log
  const callRecord = {
    company: PHONE_IV.company,
    role: PHONE_IV.role,
    date: todayStr(),
    duration,
    qaCount: PHONE_IV.callLog.length,
    notes: PHONE_IV.postCallNotes || (el('phone-live-notes') ? el('phone-live-notes').value : ''),
    log: PHONE_IV.callLog,
  };

  const saved = ls('apex_phone_logs', []);
  saved.unshift(callRecord);
  sv('apex_phone_logs', saved.slice(0, 50));

  // Export Q&A to captured bank
  if (PHONE_IV.callLog.length) {
    const captured = ls('apex_captured_qa', []);
    PHONE_IV.callLog.forEach(entry => {
      if (!captured.find(e => e.q === entry.q)) {
        captured.unshift({ q: entry.q, a: entry.a, source: 'phone_screen', company: PHONE_IV.company });
      }
    });
    sv('apex_captured_qa', captured.slice(0, 500));
  }

  PHONE_IV.active = false;
  PHONE_IV.startTime = null;
  PHONE_IV.activeCard = null;

  smartSync();
  st('ivTab', 'phone');
  render();

  // Post-call prompt
  setTimeout(() => {
    alert(`✓ Call logged — ${duration} · ${callRecord.qaCount} Q&A captured.\n\nAll Q&A added to your Interview Log and Q&A Bank.\n\nNext: Go to Email Hub → Follow-Up Tracker to set your follow-up reminder.`);
  }, 300);
}

// ── ringCanvas() ── Draw a progress ring on a canvas element
function ringCanvas(id,score,size,color){
  var canvas=document.getElementById(id);
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var cx=size/2,cy=size/2,r=size/2-4;
  ctx.clearRect(0,0,size,size);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=4;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,(Math.PI*2*(score/100))-Math.PI/2);
  ctx.strokeStyle=color||'var(--gold)';ctx.lineWidth=4;ctx.lineCap='round';ctx.stroke();
  ctx.fillStyle=color||'#e8a838';ctx.font='bold '+(size/4)+'px sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(score,cx,cy);
}

// PDF / FORMATTED DOCUMENT GENERATOR
// Opens a styled print window - user taps Print → Save as PDF
// Works on iOS (Share → Print → Pinch to zoom → Share PDF)
// Works on desktop (Ctrl+P → Save as PDF)
// ═══════════════════════════════════════════════════════════

function buildResumeHTML(docs){
  var p=loadPro();
  var raw=docs.resume||'';

  // ── STEP 1: STRIP MARKDOWN ARTIFACTS ─────────────────────────────
  // Normalise the text so the parser works regardless of what Claude output
  var lines=raw.split('\n').map(function(line){
    // Strip leading #/## markdown headers
    line=line.replace(/^#{1,3}\s*/,'');
    // Strip ** bold wrapping around whole line
    line=line.replace(/^\*\*(.+)\*\*$/, '$1');
    // Strip trailing ** if line starts with *text**
    line=line.replace(/^\*([^*]+)\*\*$/,'$1');
    // Convert markdown bullets - / * to bullet char
    line=line.replace(/^[\-\*]\s+/,'• ');
    // Strip horizontal rules
    if(/^-{2,}$/.test(line.trim())||/^\*{2,}$/.test(line.trim()))return '';
    // Strip markdown table separator rows |---|---|
    if(/^\|[-|\s]+\|$/.test(line.trim()))return '';
    // Convert markdown table data rows | A | B | C | → A | B | C
    if(/^\|.+\|$/.test(line.trim())){
      line=line.trim().replace(/^\|/,'').replace(/\|$/,'').trim();
    }
    return line;
  });
  var text=lines.join('\n');

  // ── STEP 2: STRIP NAME / CONTACT HEADER (rendered separately) ────
  var KNOWN=/^(PROFESSIONAL SUMMARY|SUMMARY|CORE COMPETENCIES|COMPETENCIES|PROFESSIONAL EXPERIENCE|EXPERIENCE|EDUCATION|CERTIFICATIONS|TECHNICAL SKILLS|SKILLS|EMPLOYMENT EQUITY|ADDITIONAL)/i;
  var isHeader=function(t){
    return t.length>2&&t.length<80&&t===t.toUpperCase()&&/^[A-Z]/.test(t)&&!/^[•\-\*]/.test(t);
  };

  // ── STEP 3: PARSE INTO SECTIONS ───────────────────────────────────
  var sections=[];
  var cur=null;
  text.split('\n').forEach(function(line){
    var t=line.trim();
    if(!t){if(cur)cur.lines.push('');return;}
    // Skip name and contact lines
    if(t.toUpperCase()===p.name.toUpperCase())return;
    if(p.email&&t.includes(p.email))return;
    if(p.phone&&t.includes(p.phone))return;
    if(p.address&&t.includes(p.address.split(',')[0]))return;
    // Section header detection
    if(isHeader(t)||KNOWN.test(t)){
      cur={header:t,lines:[]};sections.push(cur);
    } else {
      if(!cur){cur={header:'',lines:[]};sections.push(cur);}
      cur.lines.push(t);
    }
  });

  // ── STEP 4: RENDER ────────────────────────────────────────────────
  var NAVY='#1a2744', GOLD='#c8971f', GREY='#555';
  function rule(){return '<div style="border-bottom:1.5px solid '+GOLD+';margin:2px 0 7px"></div>';}
  function sHead(title){
    return '<h2 style="font-size:10.5pt;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:'+NAVY+';margin:14px 0 2px">'+esc(title)+'</h2>'+rule();
  }
  function boldNums(s){
    return esc(s).replace(/(\$\d[\d,.]+[MBK+%]*|\d+[\d,.]*\s*%|±\$[\d.]+|\b\d{3}%|\b109%|\b106\.3%|\bIFS Project Nova\b|\bPower BI\b|SAP TERP 10)/g,
      function(m){return '<strong>'+m+'</strong>';});
  }

  var html='';

  sections.forEach(function(sec){
    var h=sec.header.toUpperCase();
    var nonEmpty=sec.lines.filter(function(l){return l.trim();});
    if(!nonEmpty.length&&!h)return;

    if(h.includes('SUMMARY')){
      html+=sHead(sec.header||'Professional Summary');
      html+='<p style="font-size:10.5pt;line-height:1.6;color:#1a1a1a;margin-bottom:4px">'+boldNums(nonEmpty.join(' '))+'</p>';

    } else if(h.includes('COMPETENC')){
      html+=sHead(sec.header||'Core Competencies');
      // Each line is "Skill A | Skill B | Skill C" — render as 3-col grid
      var allItems=[];
      nonEmpty.forEach(function(l){
        l.split('|').forEach(function(item){
          var t=item.trim().replace(/^[\[\]]/g,'');
          if(t&&t.length>1&&!t.match(/^-+$/))allItems.push(t);
        });
      });
      if(allItems.length){
        var perCol=Math.ceil(allItems.length/3);
        var cols=[[],[],[]];
        allItems.forEach(function(item,i){cols[Math.min(2,Math.floor(i/perCol))].push(item);});
        var maxR=Math.max(cols[0].length,cols[1].length,cols[2].length);
        html+='<table style="width:100%;border-collapse:collapse;margin:3px 0 4px">';
        for(var r=0;r<maxR;r++){
          html+='<tr>';
          cols.forEach(function(col){
            var item=col[r]||'';
            html+='<td style="width:33%;padding:2px 4px 2px 0;font-size:10.5pt;color:#1a1a1a;vertical-align:top">'+(item?'<span style="color:'+GOLD+'">•</span> '+esc(item):'')+'</td>';
          });
          html+='</tr>';
        }
        html+='</table>';
      }

    } else if(h.includes('EXPERIENCE')){
      html+=sHead(sec.header||'Professional Experience');
      var i=0;
      while(i<nonEmpty.length){
        var l=nonEmpty[i].trim();
        // Role line: contains | with a year somewhere
        var isRole=l.includes('|')&&/\d{4}/.test(l)&&!/^•/.test(l);
        if(isRole){
          var parts=l.split('|').map(function(x){return x.trim();});
          var title=parts[0]||'';
          var company=parts[1]||'';
          var loc=parts.length===4?parts[2]:'';
          var dates=parts[parts.length-1]||'';
          html+='<div style="display:flex;justify-content:space-between;align-items:baseline;margin-top:9px">';
          html+='<div style="font-weight:700;font-size:10.5pt;color:'+NAVY+'">'+esc(title)+'</div>';
          html+='<div style="font-size:10pt;color:'+GREY+';white-space:nowrap;margin-left:8px;font-style:italic">'+esc(dates)+'</div>';
          html+='</div>';
          if(company){
            var compLine=company+(loc?' \u2022 '+loc:'');
            html+='<div style="font-size:10pt;color:'+GREY+';font-style:italic;margin-bottom:3px">'+esc(compLine)+'</div>';
          }
          i++;
        } else if(l.startsWith('•')||l.startsWith('-')||l.startsWith('*')){
          html+='<ul style="margin:2px 0 2px 14px;padding:0">';
          while(i<nonEmpty.length&&(nonEmpty[i].startsWith('•')||nonEmpty[i].startsWith('-')||nonEmpty[i].startsWith('*')||nonEmpty[i].trim()==='')){
            var bl=nonEmpty[i].trim();
            if(bl)html+='<li style="font-size:10.5pt;line-height:1.5;margin-bottom:2px;color:#1a1a1a">'+boldNums(bl.replace(/^[•\-\*]\s*/,''))+'</li>';
            i++;
          }
          html+='</ul>';
        } else {
          i++;
        }
      }

    } else if(h.includes('EDUCATION')||h.includes('CERTIF')){
      html+=sHead(sec.header||'Education & Certifications');
      nonEmpty.forEach(function(l){
        if(!l.trim())return;
        var yearM=l.match(/(\d{4})\s*$/);
        var year=yearM?yearM[1]:'';
        var text=l.replace(/\|\s*GPA[^|]*/i,'').replace(/\|?\s*\d{4}\s*$/,'').replace(/\|\s*$/,'').trim();
        html+='<div style="display:flex;justify-content:space-between;font-size:10.5pt;color:#1a1a1a;margin-bottom:3px">';
        html+='<div>'+esc(text)+'</div>';
        if(year)html+='<div style="color:'+GREY+';white-space:nowrap;margin-left:8px;font-style:italic">'+esc(year)+'</div>';
        html+='</div>';
      });

    } else if(h.includes('TECHNICAL')||h.includes('SKILLS')){
      html+=sHead(sec.header||'Technical Skills');
      nonEmpty.forEach(function(l){
        var m=l.match(/^([^:]+):\s*(.+)$/);
        if(m){
          html+='<div style="display:flex;gap:0;font-size:10.5pt;margin-bottom:3px">';
          html+='<div style="width:28%;font-weight:700;color:'+NAVY+';padding-right:8px">'+esc(m[1].trim())+'</div>';
          html+='<div style="flex:1;color:#1a1a1a">'+esc(m[2].trim())+'</div>';
          html+='</div>';
        } else if(l.trim()){
          html+='<div style="font-size:10.5pt;color:#1a1a1a;margin-bottom:2px">'+esc(l)+'</div>';
        }
      });

    } else if(h.includes('EQUITY')){
      html+='<div style="margin-top:12px;font-size:10pt;color:'+GREY+'"><strong style="color:'+NAVY+'">Employment Equity:</strong> '+boldNums(nonEmpty.join(' '))+'</div>';

    } else if(h){
      html+=sHead(sec.header);
      html+='<div style="font-size:10.5pt;color:#1a1a1a">'+nonEmpty.map(function(l){return esc(l);}).join('<br>')+'</div>';
    }
  });

  return html;
}

function openFormattedPDF(docsArg, docType){
  var docs=docsArg||(STATE.genDocs)||null;
  if(!docs){alert('No documents found. Generate documents first.');return;}
  var p=loadPro();
  var content=docs[docType]||'';
  if(!content){alert('No '+docType+' content found.');return;}

  var isEmail=docType==='email';
  var isIP=docType==='ip';

  // Build formatted HTML
  var bodyContent='';
  if(isResume){
    bodyContent=buildResumeHTML(docs);
  } else {
    // For all other docs: render with markdown-like formatting
    var lines=content.split('\n');
    var inList=false;
    lines.forEach(function(line){
      var t=line.trim();
      if(!t){if(inList){bodyContent+='</ul>';inList=false;}bodyContent+='<br>';return;}
      if(t.startsWith('## ')){
        if(inList){bodyContent+='</ul>';inList=false;}
        bodyContent+='<h2>'+esc(t.slice(3))+'</h2>';
      } else if(t.startsWith('# ')){
        if(inList){bodyContent+='</ul>';inList=false;}
        bodyContent+='<h1>'+esc(t.slice(2))+'</h1>';
      } else if(t.startsWith('**')&&t.endsWith('**')){
        if(inList){bodyContent+='</ul>';inList=false;}
        bodyContent+='<h3>'+esc(t.slice(2,-2))+'</h3>';
      } else if(t.startsWith('• ')||t.startsWith('- ')||t.startsWith('* ')){
        if(!inList){bodyContent+='<ul>';inList=true;}
        bodyContent+='<li>'+esc(t.slice(2))+'</li>';
      } else if(t.match(/^\d+\. /)){
        if(!inList){bodyContent+='<ol>';inList=true;}
        bodyContent+='<li>'+esc(t.replace(/^\d+\. /,''))+'</li>';
      } else {
        if(inList){bodyContent+='</ul>';inList=false;}
        bodyContent+='<p>'+esc(t)+'</p>';
      }
    });
    if(inList)bodyContent+='</ul>';
  }

  var printHTML='<!DOCTYPE html><html><head><meta charset="UTF-8">'+

    '<style>'+
    '* { margin:0; padding:0; box-sizing:border-box; }'+

    'h3 { font-size:10.5pt; font-weight:700; color:#1a1a1a; margin:8px 0 2px; }'+
    '.role-line { display:flex; justify-content:space-between; margin:6px 0 3px; }'+
    '.role-title { font-weight:700; font-size:10.5pt; }'+
    '.role-company { font-size:10pt; color:#333; }'+
    '.role-dates { font-size:10pt; color:#555; font-style:italic; }'+
    'ul { padding-left:16px; margin:3px 0 6px; }'+
    'li { font-size:10.5pt; line-height:1.45; margin-bottom:2px; }'+
    'p { font-size:10.5pt; line-height:1.5; margin-bottom:4px; }'+
    '.body-line { font-size:10.5pt; }'+

    '.print-btn { position:fixed; bottom:24px; right:24px; background:#7c4dff; color:#fff; border:none; border-radius:8px; padding:12px 20px; font-size:14px; font-weight:700; cursor:pointer; box-shadow:0 4px 16px rgba(124,77,255,.4); z-index:999; }'+

async function solveAptitude(){
  var q=document.getElementById('apt-question');
  var t=document.getElementById('apt-type');
  var btn=document.getElementById('apt-btn');
  var out=document.getElementById('apt-out');
  if(!q||!q.value.trim()){alert('Paste the question first.');return;}
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Solving...';}
  if(out)out.innerHTML='';
  var qtype=t?t.value:'auto';
  var qtypeMap={
    math:'Expert at numerical reasoning, math, and quantitative aptitude tests. Show ALL working — steps clearly numbered.',
    verbal:'Expert at verbal reasoning, reading comprehension, and English language aptitude tests.',
    logical:'Expert at logical reasoning, pattern recognition, and abstract thinking tests.',
    spatial:'Expert at spatial reasoning and abstract pattern tests.',
    situational:'Expert in situational judgement tests for professional roles. Evaluate each option against professional norms for Business Analysis roles in regulated environments (Crown corporations, government). Recommend the best answer and explain why.',
    personality:'Expert in occupational personality questionnaires. No judgment — just explain what each response signals to an employer and which aligns best with a senior BA role at a Crown corporation.',
    auto:'Expert aptitude test solver. Detect the question type automatically and apply the correct methodology.'
  };
  var sys=qtypeMap[qtype]||qtypeMap.auto;
  var intel=ls('pro_company_intel',null);
  var compCtx=intel?' The candidate is applying for BA roles at '+intel.company+'. Use this context for situational questions.':'';
  try{
    var r=await callClaude(
      sys+compCtx,
      'APTITUDE QUESTION:\n\n'+q.value.trim()+'\n\n'+
      'Respond with:\n'+
      '## ANSWER\n[The correct answer, clearly stated]\n\n'+
      '## REASONING\n[Step-by-step explanation — show working for math, explain logic for verbal]\n\n'+
      '## SPEED TIP\n[The fastest way to solve this type of question next time — 1-2 sentences]'
    );
    if(out){
      out.innerHTML='<div class="card" style="border-color:rgba(124,77,255,.3)">'+
        '<div class="card-head" style="background:rgba(124,77,255,.15)"><div class="card-head-title" style="color:var(--purple)">&#129504; Answer</div></div>'+
        '<div style="padding:14px 16px;font-size:13px;line-height:1.8">'+md(r)+'</div>'+
        '<div style="padding:0 16px 14px"><button class="btn btn-ghost btn-xs" id="apt-cp" onclick="psyCopyById(&quot;apt-answer-text&quot;,&quot;apt-cp&quot;)">Copy Answer</button>'+
        '<div id="apt-answer-text" style="display:none">'+esc(r)+'</div></div>'+
        '</div>';
    }
  }catch(e){
    if(out)out.innerHTML=alertHtml('&#10007;','Error: '+esc(e.message),'var(--red)');
  }
  if(btn){btn.disabled=false;btn.innerHTML='&#9889; Get Answer + Explanation';}
}

function psyCopyById(contentId, btnId){
  var el2=document.getElementById(contentId);
  var btn=document.getElementById(btnId);
  var text=el2?el2.innerText||el2.textContent:'';
  if(!text){alert('Nothing to copy.');return;}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){
      if(btn){btn.textContent='✓ Copied';setTimeout(function(){btn.textContent='Copy Answer';},2000);}
    });
  } else {
    var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    if(btn){btn.textContent='✓ Copied';setTimeout(function(){btn.textContent='Copy Answer';},2000);}
  }
}

// ENGINE ACTIVITY LOG SYSTEM
// Tracks all AI engine activity across the app
// ═══════════════════════════════════════════════════════════════════
var ENGINE_LOG = [];
var ENGINE_LOG_MAX = 50;

function logEngine(engineName, action, detail, status){
  // status: 'running' | 'done' | 'error' | 'info'
  var entry = {
    id: Date.now()+'_'+Math.random().toString(36).slice(2,5),
    engine: engineName,
    action: action,
    detail: detail||'',
    status: status||'info',
    ts: new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit',second:'2-digit'})
  };
  ENGINE_LOG.unshift(entry);
  if(ENGINE_LOG.length > ENGINE_LOG_MAX) ENGINE_LOG.pop();
  updateActivityIndicator();
  // Cross-engine portfolio contribution
  if(status==='done' && detail) checkPortfolioGem(engineName, action, detail);
}

function updateActivityIndicator(){
  var indicator = document.getElementById('engine-activity-dot');
  if(!indicator) return;
  var running = ENGINE_LOG.filter(function(e){return e.status==='running';});
  if(running.length > 0){
    indicator.style.background = '#7c4dff';
    indicator.style.animation = 'pulse 1s infinite';
    indicator.title = running.length + ' engine(s) running';
  } else {
    indicator.style.background = '#16a34a';
    indicator.style.animation = 'none';
    indicator.title = 'All engines idle';
  }
}

function checkPortfolioGem(engineName, action, detail){
  // Scan engine output for portfolio-worthy content
  var portfolio = ls('apex_portfolio', {items:[], score:0, lastScan:null});
  var detailLow = detail.toLowerCase();
  var gemFound = false;
  var gemNote = '';

  // Intelligence research gems
  if(engineName === 'Intel Research'){
    if(detailLow.includes('stakeholder') || detailLow.includes('psychology')){
      gemNote = 'Research contains stakeholder psychology — consider a case study showing cross-functional stakeholder management';
      gemFound = true;
    }
  }
  // Document generation gems
  if(engineName === 'Document Generation'){
    if(detailLow.includes('$200m') || detailLow.includes('200 million')){
      gemNote = 'Strong cost savings metric detected — this warrants a dedicated portfolio case study with the full story';
      gemFound = true;
    }
    if(detailLow.includes('ifs') || detailLow.includes('sap') || detailLow.includes('erp')){
      gemNote = 'ERP implementation content generated — document this as a technical portfolio piece';
      gemFound = true;
    }
  }
  // SWOT gems
  if(engineName === 'SWOT Analysis'){
    gemNote = 'SWOT analysis completed — your Strengths section identifies portfolio evidence you may not have fully documented';
    gemFound = true;
  }
  // Skills gems
  if(engineName === 'Skills'){
    if(detailLow.includes('power bi') || detailLow.includes('dashboard')){
      gemNote = 'Analytics skills detected — screenshots or descriptions of dashboards you built are powerful portfolio items';
      gemFound = true;
    }
  }

  if(gemFound && gemNote){
    // Add to portfolio suggestions
    var existing = portfolio.suggestions || [];
    var alreadyExists = existing.some(function(s){return s.note === gemNote;});
    if(!alreadyExists){
      existing.unshift({
        id: 'gem_'+Date.now(),
        source: engineName,
        note: gemNote,
        ts: new Date().toLocaleDateString(),
        dismissed: false
      });
      if(existing.length > 20) existing.pop();
      portfolio.suggestions = existing;
      sv('apex_portfolio', portfolio);
      // Show notification dot on portfolio nav
      var pfDot = document.getElementById('pf-notif-dot');
      if(pfDot) pfDot.style.display = 'block';
    }
  }
}

var PORTFOLIO_BUCKETS = [
  {id:'erp',        label:'ERP & Systems Implementation',    icon:'⚙',  weight:20},
  {id:'analytics',  label:'Analytics & Business Intelligence',icon:'📊', weight:18},
  {id:'process',    label:'Process Improvement & Automation', icon:'🔄', weight:16},

function getPortfolioData(){
  return ls('apex_portfolio',{items:[],session:[],phase:'intro',gemCount:0});
}
function savePortfolio(d){ sv('apex_portfolio',d); }

function calcPortfolioScore(data){
  if(!data) data=getPortfolioData()||{}; data.items=data.items||[]; data.approved=data.approved||[];
  var items=data.items||[];
  var total=PORTFOLIO_BUCKETS.reduce(function(s,b){return s+b.weight;},0);
  var earned=0;
  PORTFOLIO_BUCKETS.forEach(function(b){
    var n=items.filter(function(i){return i.bucket===b.id&&i.approved;}).length;
    earned+=b.weight*Math.min(n/2,1);
  });
  return Math.round((earned/total)*100);
}

  var skills=STATE.skills||[];
  var highSkills=skills.filter(function(s){return s.current>=75;}).map(function(s){return s.name+'('+s.current+')';}).join(', ');

  logEngine('Portfolio','AI portfolio session started','Analysing full background for portfolio extraction','running');

  try{
    var intro=await callClaude(
            ['You are an expert career portfolio builder for Jermaine Anderson conducting an interactive portfolio session.',
        'Full background:',buildProfile().slice(0,1500),

        intel?'Target: '+intel.company+' — '+intel.role:'',

       '1. Tell him what you already know and what you are going to auto-populate WITHOUT asking him',

       '',
       'Format:',
       '## What I already have',
       '[List 3-4 specific things you are auto-populating from his profile]',
       '',
       '## What I need from you',
       '[2-3 sentences on what you need him to tell you]',
       '',
       '---',
       '',
       '[Your first direct question about IFS Project Nova]',
       '',
       'Keep under 200 words. Be direct and confident.'
      ].join('\n'),
      1000
    );

    // Auto-populate known items from profile
    var autoItems = [
      {id:'pf_auto_1', bucket:'erp', title:'IFS Project Nova — Requirements Lead', evidence:'Led requirements gathering for 12-module IFS ERP go-live at Price Industries. Cross-functional sessions with IT, Operations, Finance, and Executive stakeholders. Live production delivery.', impact:'High — system live in production', approved:true, auto:true},
      {id:'pf_auto_2', bucket:'analytics', title:'PepsiCo National Freight Cost Model', evidence:'Built ±$0.20 accuracy freight cost calculator achieving 90% Canadian and 72% US network coverage. Used by national logistics and finance teams for annual budget planning.', impact:'$200M+ in documented cost savings influenced', approved:true, auto:true},
      {id:'pf_auto_3', bucket:'process', title:'Manual-to-Automated Reporting', evidence:'Reduced reporting process from 5-10 minutes to under 1 minute through automation. Sustained 109% productivity rating over 7 years at PepsiCo.', impact:'High — sustained operational efficiency', approved:true, auto:true},
    ];

      if(!pf.items.find(function(i){return i.id===ai.id;})) pf.items.push(ai);
    });

async function sendPortfolioResponse(){
  var input=document.getElementById('pf-input');
  if(!input||!input.value.trim())return;
  var userText=input.value.trim();
  input.value='';

  var pf=getPortfolioData();
  var msgId='msg_'+Date.now();
  pf.session.push({id:msgId+'_u',role:'user',content:userText});
  pf.aiThinking=true;
  savePortfolio(pf);
  render();

  var intel=ls('pro_company_intel',null);
  var items=pf.items||[];
  var approvedCount=items.filter(function(i){return i.approved;}).length;
  var bucketsDone=PORTFOLIO_BUCKETS.filter(function(b){return items.filter(function(i){return i.bucket===b.id&&i.approved;}).length>=1;}).map(function(b){return b.id;});
  var bucketsToDo=PORTFOLIO_BUCKETS.filter(function(b){return bucketsDone.indexOf(b.id)<0;}).map(function(b){return b.label;});
  var convHistory=pf.session.slice(-6).map(function(m){return m.role.toUpperCase()+': '+(m.entryPreview?'[Entry: '+m.entryPreview.title+']':m.content);}).join('\n');

  var sysParts=[
    'You are building a professional portfolio for Jermaine Anderson through guided conversation.',
    'Full background: '+buildProfile().slice(0,1200),
    intel?'Target: '+intel.company+' — '+intel.role:'',
    intel&&intel.psychology?'Stakeholder psychology: '+intel.psychology.slice(0,400):'',
    'Portfolio so far: '+approvedCount+' approved items',
    'Buckets still needed: '+bucketsToDo.join(', ')
  ];
  var userParts=[
    'Conversation so far:',
    convHistory,
    '',
    'Based on the user answer extract a portfolio entry. Format EXACTLY:',
    '---ENTRY---',
    'TITLE: [concise achievement title]',
    'BUCKET: [one of: erp|analytics|process|stakeholder|supplychain|leadership|product]',
    'EVIDENCE: [2-3 sentences: situation + their specific action + measurable result]',
    'IMPACT: [Low/Medium/High + one reason]',
    '---END---',
    '',
    'Then ask your NEXT question about a missing bucket: '+bucketsToDo.slice(0,3).join(', '),
    'If their answer had no extractable evidence, say so briefly and rephrase the question.',
    bucketsDone.length>=5?'Most buckets are covered — offer to wrap up instead.':''
  ];

  try{
    var r=await callClaude(
      sysParts.filter(Boolean).join('\n'),
      userParts.filter(Boolean).join('\n'),
      1000
    );

    var entryMatch=r.match(/---ENTRY---([\s\S]*?)---END---/);
    var entryPreview=null;
    var cleanContent=r.replace(/---ENTRY---[\s\S]*?---END---/,'').trim();

    if(entryMatch){
      var et=entryMatch[1];
      var tM=et.match(/TITLE:\s*(.+)/);var bM=et.match(/BUCKET:\s*(.+)/);
      var eM=et.match(/EVIDENCE:[\s\S]*?([\s\S]+?)(?=IMPACT:|$)/);var iM=et.match(/IMPACT:\s*(.+)/);
      if(tM&&bM&&eM){
        entryPreview={id:'pf_'+Date.now(),title:tM[1].trim(),
          bucket:(bM[1].trim()||'leadership').toLowerCase(),
          evidence:eM[1].trim(),impact:iM?iM[1].trim():'',decided:false,approved:false};
      }
    }

    var aiMsg={id:msgId,role:'ai',content:cleanContent};
    if(entryPreview)aiMsg.entryPreview=entryPreview;
    pf.session.push(aiMsg);
    pf.aiThinking=false;
    if(bucketsDone.length>=5)pf.phase='wrapping';
    logEngine('Portfolio','Response processed','Entry: '+(entryPreview?entryPreview.title:'none'),'done');
  }catch(e){
    pf.session.push({id:msgId+'_err',role:'ai',content:'Error: '+e.message});
    pf.aiThinking=false;
    logEngine('Portfolio','Response failed',e.message,'error');
  }
  savePortfolio(pf);
  render();
  setTimeout(function(){var pane=document.querySelector('.view');if(pane)pane.scrollTop=pane.scrollHeight;},100);
}

async function sendPortfolioResponse_auto(text){
  var input=document.getElementById('pf-input');
  if(input)input.value=text;
  await sendPortfolioResponse();
}

function approvePortfolioEntry(msgId){
  var pf=getPortfolioData();
  var msg=pf.session.find(function(m){return m.id===msgId;});
  if(!msg||!msg.entryPreview)return;
  msg.entryPreview.decided=true;msg.entryPreview.approved=true;
  var item=Object.assign({},msg.entryPreview,{approved:true,ts:new Date().toLocaleDateString()});
  pf.items=(pf.items||[]).filter(function(i){return i.id!==item.id;});
  pf.items.push(item);
  pf.score=calcPortfolioScore(pf);
  savePortfolio(pf);
  logEngine('Portfolio','Item approved: '+msg.entryPreview.title,'','done');
  render();
}
function skipPortfolioEntry(msgId){
  var pf=getPortfolioData();
  var msg=pf.session.find(function(m){return m.id===msgId;});
  if(msg&&msg.entryPreview){msg.entryPreview.decided=true;msg.entryPreview.approved=false;}
  savePortfolio(pf);render();
}
async function refinePortfolioEntry(msgId){
  var pf=getPortfolioData();
  var msg=pf.session.find(function(m){return m.id===msgId;});
  if(!msg||!msg.entryPreview)return;
  var feedback=prompt('What needs to change? (e.g. "Wrong metric — it was 340 users" or "Change bucket to analytics")');
  if(!feedback)return;
  pf.aiThinking=true;savePortfolio(pf);render();
  try{
    var r=await callClaude(
      'Portfolio entry editor for Jermaine Anderson. Update based on user feedback. Be precise.',
      'Current entry:\nTITLE: '+msg.entryPreview.title+'\nBUCKET: '+msg.entryPreview.bucket+'\nEVIDENCE: '+msg.entryPreview.evidence+'\n\nUser feedback: '+feedback+'\n\nReturn ONLY corrected entry:\n---ENTRY---\nTITLE:\nBUCKET:\nEVIDENCE:\nIMPACT:\n---END---',
      400
    );
    var em=r.match(/---ENTRY---([\s\S]*?)---END---/);
    if(em){
      var t=em[1];
      var tM=t.match(/TITLE:\s*(.+)/);var bM=t.match(/BUCKET:\s*(.+)/);
      var eM=t.match(/EVIDENCE:\s*([\s\S]+?)(?=IMPACT:|$)/);var iM=t.match(/IMPACT:\s*(.+)/);
      if(tM)msg.entryPreview.title=tM[1].trim();
      if(bM)msg.entryPreview.bucket=bM[1].trim().toLowerCase();
      if(eM)msg.entryPreview.evidence=eM[1].trim();
      if(iM)msg.entryPreview.impact=iM[1].trim();
    }
    pf.aiThinking=false;savePortfolio(pf);
  }catch(e){pf.aiThinking=false;savePortfolio(pf);}
  render();
}

function saveCoder(d){ sv('apex_coder', d); }

function calcCoderScore(data){
  var prog=data.progress||{};
  var total=CODER_TRACKS.reduce(function(s,t){return s+t.levels.length;},0);
  var done=Object.values(prog).filter(function(p){return p.done;}).length;
  return Math.round((done/total)*100);
}

function renderCoder(){
  var cd=getCoderData();
  var score=calcCoderScore(cd);
  var prog=cd.progress||{};
  var h='';

  // Header
  var sColor=score>=80?'#16a34a':score>=50?'#d97706':score>=25?'#2563eb':'#7c4dff';

function renderCoderSession(cd, prog){
  cd=cd||getCoderData()||{};cd.activeTrack=cd.activeTrack||null;cd.progress=cd.progress||{};cd.session=cd.session||[];cd.phase=cd.phase||'choose';

  var session=cd.session||[];
  var h='';

  // Track header
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">';

    var active=l.id===cd.activeLesson;
    h+='<button class="btn btn-xs" style="flex-shrink:0;background:'+(active?track.color:done?'rgba(22,163,74,.2)':'rgba(255,255,255,.06)')+';color:'+(active?'#000':done?'var(--green)':'var(--muted)')+'" data-lid="'+l.id+'" onclick="selectCoderLesson(this.dataset.lid)">'+esc(l.title.split(' ')[0])+'...</button>';
  });
  h+='</div>';

  // Lesson context banner
  if(lesson){
    var bColor=track.color||'#7c4dff';
    h+='<div style="background:rgba(124,77,255,.08);border-left:3px solid '+bColor+';border-radius:0 10px 10px 0;padding:10px 14px;margin-bottom:10px">';
    h+='<div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:3px">'+esc(lesson.title)+'</div>';
    h+='<div style="font-size:12px;color:var(--muted);line-height:1.6">'+esc(lesson.context)+'</div>';

      h+='<div style="font-size:11px;color:var(--green);margin-top:5px">✓ Completed '+prog[lesson.id].ts+'</div>';
    }
    h+='</div>';
  }

  // Conversation
  if(session.length===0 && !cd.aiThinking){
    h+='<button class="btn btn-full" style="background:'+track.color+';color:#000;font-weight:700;min-height:52px;font-size:14px" onclick="startCoderLesson()">🧑‍💻 Start This Lesson with AI Tutor</button>';
  } else {
