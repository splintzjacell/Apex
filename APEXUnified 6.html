<!DOCTYPE html>
<html lang="en" data-theme="strategic">
<head>
<meta charset="UTF-8">
<meta name="apex-version" content="1777930814">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PROJECT APEX — Jermaine Anderson</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════
   PROJECT APEX — DUAL THEME DESIGN SYSTEM
   Theme A: Strategic Command  (data-theme="strategic")
   Theme B: Premium Consumer   (data-theme="premium")
   Jermaine Anderson — Project Flow Inc.
   ══════════════════════════════════════════════════════ */

/* ── SHARED STRUCTURE ──────────────────────────────── */
:root {
  --ff-display-s: 'Bebas Neue', sans-serif;
  --ff-body-s:    'Libre Baskerville', Georgia, serif;
  --ff-mono-s:    'DM Mono', monospace;
  --ff-display-p: 'Plus Jakarta Sans', system-ui, sans-serif;
  --ff-body-p:    'Plus Jakarta Sans', system-ui, sans-serif;
  --ff-mono-p:    'Plus Jakarta Sans', system-ui, sans-serif;

  /* Status colours — shared across both themes */
  --green:  #22c97a;  --greenl: rgba(34,201,122,.16);
  --red:    #f04747;  --redl:   rgba(240,71,71,.16);
  --blue:   #4d9cf8;  --bluel:  rgba(77,156,248,.16);
  --purple: #9b72f5;  --purplel:rgba(155,114,245,.16);
  --teal:   #26d9cf;  --teall:  rgba(38,217,207,.16);
  --orange: #f5835a;
}

/* ══════════════════════════════════════════════════════
   THEME A — STRATEGIC COMMAND
   Obsidian · Ember · Precision
   ══════════════════════════════════════════════════════ */
[data-theme="strategic"] {
  --bg:   #0c0a09;
  --s1:   #131110;
  --s2:   #1a1816;
  --s3:   #221f1c;
  --s4:   #2a2623;
  --b1:   rgba(242,237,232,.10);
  --b2:   rgba(242,237,232,.18);
  --b3:   rgba(242,237,232,.26);
  --accent:       #c17f3b;
  --accent-bright:#d4914a;
  --accent-dim:   rgba(193,127,59,.14);
  --accent-glow:  rgba(193,127,59,.08);
  --ember:        #c17f3b;
  --ember-bright: #d4914a;
  --ember-dim:    rgba(193,127,59,.14);
  --ember-glow:   rgba(193,127,59,.08);
  --gold:         #c17f3b;
  --goldl:        rgba(193,127,59,.14);
  --white:  #f2ede8;
  --txt:    #e8e0d6;
  --steel:  #8c9db5;
  --muted:  rgba(242,237,232,.58);
  --faint:  rgba(242,237,232,.10);
  --card:   #131110;
  --li:     #4d9cf8;

  --ff-display: var(--ff-display-s);
  --ff-body:    var(--ff-body-s);
  --ff-mono:    var(--ff-mono-s);
  --radius-card: 2px;
  --radius-btn:  2px;
  --radius-inp:  2px;
  --radius-xs:   2px;
  --card-border: 1px solid var(--b1);
  --card-accent-border: 2px solid var(--accent);
  --card-bg:  var(--s1);
  --card-head: var(--s2);
  --nav-bg:   var(--bg);
  --topbar-bg: var(--bg);
  --modal-bg-color: rgba(12,10,9,.90);
  --btn-text-transform: uppercase;
  --btn-letter-spacing: .6px;
  --tab-font-size: 10px;
  --lbl-transform: uppercase;
  --lbl-spacing: .8px;
}

/* ══════════════════════════════════════════════════════
   THEME B — PREMIUM CONSUMER
   Deep Navy · Violet Glow · Glassmorphism
   ══════════════════════════════════════════════════════ */
[data-theme="premium"] {
  --bg:   #0f1021;
  --s1:   #161830;
  --s2:   #1e2140;
  --s3:   #262a52;
  --s4:   #2e3460;
  --b1:   rgba(255,255,255,.08);
  --b2:   rgba(255,255,255,.14);
  --b3:   rgba(255,255,255,.22);
  --accent:       #a78bfa;
  --accent-bright:#c4b5fd;
  --accent-dim:   rgba(167,139,250,.18);
  --accent-glow:  rgba(167,139,250,.12);
  --ember:        #a78bfa;
  --ember-bright: #c4b5fd;
  --ember-dim:    rgba(167,139,250,.18);
  --ember-glow:   rgba(167,139,250,.10);
  --gold:         #a78bfa;
  --goldl:        rgba(167,139,250,.16);
  --white:  #f0f0ff;
  --txt:    #e2e4f0;
  --steel:  #9ca3c8;
  --muted:  rgba(226,228,240,.62);
  --faint:  rgba(226,228,240,.12);
  --card:   rgba(22,24,48,.85);
  --li:     #4d9cf8;

  --ff-display: var(--ff-display-p);
  --ff-body:    var(--ff-body-p);
  --ff-mono:    var(--ff-mono-p);
  --radius-card: 18px;
  --radius-btn:  12px;
  --radius-inp:  12px;
  --radius-xs:   8px;
  --card-border: 1px solid rgba(255,255,255,.10);
  --card-accent-border: 1px solid rgba(167,139,250,.35);
  --card-bg:  rgba(22,24,48,.75);
  --card-head: rgba(30,33,64,.80);
  --nav-bg:   rgba(15,16,33,.95);
  --topbar-bg: rgba(15,16,33,.95);
  --modal-bg-color: rgba(8,9,22,.92);
  --btn-text-transform: none;
  --btn-letter-spacing: .01em;
  --tab-font-size: 11px;
  --lbl-transform: none;
  --lbl-spacing: .02em;
}

/* ── RESET ──────────────────────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
}

/* ── BASE ───────────────────────────────────────────── */
html, body {
  height: 100%;
  background: #0f1021;
  background: var(--bg);
  color: #e2e4f0;
  color: var(--txt);
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  font-family: var(--ff-body);
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
}
[data-theme="strategic"] body,
[data-theme="strategic"] html {
  font-family: 'Libre Baskerville', Georgia, serif;
  font-family: var(--ff-body);
}

/* ── LAYOUT ─────────────────────────────────────────── */
#app {
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #0f1021;
  background: var(--bg);
}
[data-theme="strategic"] #app { background: #0c0a09; background: var(--bg); }

.view { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.cnt  { padding: 16px 16px 100px; max-width: 640px; margin: 0 auto; }
.pcnt { padding: 14px 16px 100px; max-width: 640px; margin: 0 auto; }

/* ── TYPOGRAPHY ─────────────────────────────────────── */
.mono  { font-family: var(--ff-mono); }
.bebas { font-family: 'Bebas Neue', sans-serif; letter-spacing: .03em; }
.syne  { font-family: var(--ff-display); letter-spacing: .04em; }

/* ── TOP BAR ────────────────────────────────────────── */
.topbar {
  background: var(--topbar-bg);
  border-bottom: 1px solid var(--b1);
  padding: 12px 18px 10px;
  padding-top: calc(12px + env(safe-area-inset-top, 0px));
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
[data-theme="premium"] .topbar {
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.t-brand {
  font-family: var(--ff-display);
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 2px;
}
[data-theme="strategic"] .t-brand { letter-spacing: 3px; font-weight: 400; }
[data-theme="premium"]   .t-brand { letter-spacing: .5px; font-size: 15px; }
.t-sub { font-family: var(--ff-mono); font-size: 10px; color: var(--muted); margin-top: 2px; }

/* ── BACK BAR ───────────────────────────────────────── */
.backbar {
  background: var(--topbar-bg);
  border-bottom: 1px solid var(--b1);
  padding: 10px 16px;
  padding-top: calc(10px + env(safe-area-inset-top, 0px));
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
[data-theme="premium"] .backbar {
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
.back-btn {
  border: 1px solid var(--b2);
  background: transparent;
  color: var(--muted);
  padding: 6px 14px;
  border-radius: var(--radius-btn);
  font-size: 12px;
  font-family: var(--ff-mono);
  cursor: pointer;
  min-height: 34px;
  transition: all .15s;
}
.back-btn:hover { color: var(--accent); border-color: var(--accent); }

/* ── BOTTOM NAV ─────────────────────────────────────── */
.nav {
  background: var(--nav-bg);
  border-top: 1px solid var(--b1);
  display: flex; flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
[data-theme="premium"] .nav {
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
}
.nb {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px;
  padding: 10px 4px 8px;
  border: none; background: transparent;
  color: var(--muted);
  font-family: var(--ff-mono);
  font-size: 9px; font-weight: 500;
  letter-spacing: .5px; text-transform: uppercase;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  min-height: 52px;
  transition: all .2s;
}
[data-theme="premium"] .nb {
  font-size: 10px; letter-spacing: .01em; text-transform: none; font-weight: 600;
  border-bottom: none; border-top: 2px solid transparent;
}
.nb.on {
  color: var(--accent);
  border-bottom-color: var(--accent);
  background: var(--accent-glow);
}
[data-theme="premium"] .nb.on {
  border-bottom: none;
  border-top-color: var(--accent);
  background: var(--accent-dim);
}
.ni { font-size: 20px; line-height: 1; }

/* ── TABS ───────────────────────────────────────────── */
.tabs {
  display: flex; gap: 2px; overflow-x: auto;
  scrollbar-width: none;
  margin-bottom: 14px;
  border-bottom: 1px solid var(--b1);
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  border: none; background: transparent;
  color: var(--muted);
  font-family: var(--ff-mono);
  font-size: var(--tab-font-size, 10px);
  letter-spacing: var(--btn-letter-spacing, .6px);
  text-transform: var(--btn-text-transform, uppercase);
  padding: 9px 13px; cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px; transition: all .15s;
}
.tab.on { color: var(--accent); border-bottom-color: var(--accent); }
[data-theme="premium"] .tab.on {
  background: var(--accent-dim);
  border-radius: var(--radius-xs) var(--radius-xs) 0 0;
}

/* ── CARDS ──────────────────────────────────────────── */
.card {
  background: var(--card-bg);
  border: var(--card-border);
  border-left: var(--card-accent-border);
  border-radius: var(--radius-card);
  margin-bottom: 10px;
  overflow: hidden;
}
[data-theme="premium"] .card {
  border-left: var(--card-border);
  box-shadow: 0 4px 24px rgba(0,0,0,.28), 0 0 0 1px rgba(255,255,255,.06);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.card-head, .ch {
  padding: 11px 15px;
  background: var(--card-head);
  border-bottom: 1px solid var(--b1);
  display: flex; align-items: center; justify-content: space-between;
}
.card-head-title, .ch-l {
  font-family: var(--ff-mono);
  font-size: 11px; font-weight: 600;
  color: var(--accent);
  text-transform: var(--btn-text-transform, uppercase);
  letter-spacing: var(--lbl-spacing, .8px);
  display: flex; align-items: center; gap: 8px;
}
[data-theme="premium"] .card-head-title,
[data-theme="premium"] .ch-l { font-size: 13px; font-weight: 700; letter-spacing: .01em; }
.card-body, .cb { padding: 13px 15px; }

/* ── ENGINE CARDS (home) ────────────────────────────── */
.engine-card {
  background: var(--card-bg);
  border: var(--card-border);
  border-top: 2px solid var(--accent);
  border-radius: var(--radius-card);
  padding: 14px 13px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
[data-theme="premium"] .engine-card {
  border-top: none;
  box-shadow: 0 8px 32px rgba(0,0,0,.32), 0 0 0 1px rgba(255,255,255,.07);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
[data-theme="premium"] .engine-card:hover {
  box-shadow: 0 12px 40px rgba(0,0,0,.4), 0 0 0 1px rgba(167,139,250,.3);
  transform: translateY(-2px);
}
.engine-card:active { background: var(--s2); opacity: .9; }

.engine-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px; line-height: 1;
  color: var(--accent); letter-spacing: .02em;
}
[data-theme="premium"] .engine-num {
  font-family: var(--ff-display);
  font-size: 32px; font-weight: 800; letter-spacing: -.5px;
}
.engine-name {
  font-family: var(--ff-display);
  font-size: 13px; color: var(--white); letter-spacing: .05em;
  margin: 4px 0 2px;
}
[data-theme="premium"] .engine-name { font-size: 14px; font-weight: 700; letter-spacing: -.01em; }
.engine-sub { font-family: var(--ff-mono); font-size: 9px; color: var(--muted); line-height: 1.5; }
[data-theme="premium"] .engine-sub { font-size: 10px; letter-spacing: 0; }

/* ── PREMIUM ENGINE BADGE ICONS ─────────────────────── */
.eng-icon {
  width: 38px; height: 38px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  margin-bottom: 8px;
  flex-shrink: 0;
}
[data-theme="strategic"] .eng-icon { display: none; }

/* ── ALERT ──────────────────────────────────────────── */
.alert {
  padding: 11px 14px;
  border-radius: var(--radius-card);
  border-left: 2px solid var(--accent);
  background: var(--accent-dim);
  margin-bottom: 12px;
  display: flex; gap: 10px; align-items: flex-start;
  line-height: 1.6; font-size: 13px;
}
[data-theme="premium"] .alert {
  border-left: none;
  border: 1px solid rgba(167,139,250,.25);
  backdrop-filter: blur(8px);
}
.alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

/* ── BUTTONS ────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
  border: 1px solid var(--b2);
  border-radius: var(--radius-btn);
  font-family: var(--ff-mono);
  font-weight: 600; font-size: 11px;
  letter-spacing: var(--btn-letter-spacing, .6px);
  text-transform: var(--btn-text-transform, uppercase);
  cursor: pointer; min-height: 44px; padding: 0 18px;
  color: var(--txt); background: transparent;
  transition: all .2s;
}
[data-theme="premium"] .btn { font-size: 13px; min-height: 46px; padding: 0 20px; }
.btn:disabled { opacity: .3; cursor: not-allowed; }
.btn-full, .btn.full { width: 100%; }
.btn-sm, .sm { min-height: 36px; padding: 0 12px; font-size: 11px; }
.btn-xs, .xs { min-height: 30px; padding: 0 10px; font-size: 11px; border-radius: var(--radius-xs); }
[data-theme="premium"] .btn-sm { min-height: 40px; }
[data-theme="premium"] .btn-xs { min-height: 32px; }

.btn-gold, .bg-gold {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
  font-weight: 700;
}
[data-theme="premium"] .btn-gold,
[data-theme="premium"] .bg-gold {
  background: linear-gradient(135deg, #a78bfa, #818cf8);
  border: none;
  box-shadow: 0 4px 16px rgba(167,139,250,.4);
  color: #fff;
}
.btn-gold:hover:not(:disabled) { background: var(--accent-bright); }
[data-theme="premium"] .btn-gold:hover:not(:disabled) {
  background: linear-gradient(135deg, #c4b5fd, #a5b4fc);
  box-shadow: 0 6px 20px rgba(167,139,250,.55);
}

.btn-green,.bg-green { background: var(--green); color: #fff; border-color: var(--green); }
.btn-blue,.bg-blue   { background: var(--blue);  color: #fff; border-color: var(--blue); }
.btn-red,.bg-red     { background: var(--red);   color: #fff; border-color: var(--red); }
.btn-purple,.bg-purple { background: var(--purple); color:#fff; border-color:var(--purple); }
.btn-teal,.bg-teal   { background: var(--teal);  color: #fff; border-color: var(--teal); }
.btn-ghost,.bg-ghost { background: transparent; color: var(--muted); border-color: var(--b2); }
.btn-ghost:hover     { color: var(--txt); border-color: var(--b3); }
.bg-li               { background: var(--blue); color: #fff; border-color: var(--blue); }

/* ── FORM ELEMENTS ──────────────────────────────────── */
.lbl {
  font-family: var(--ff-mono);
  font-size: 10px; font-weight: 600; color: var(--muted);
  text-transform: var(--lbl-transform, uppercase);
  letter-spacing: var(--lbl-spacing, .8px);
  display: block; margin-bottom: 6px;
}
.inp, .sel, .ta {
  width: 100%; padding: 11px 14px;
  border: 1px solid var(--b2);
  border-radius: var(--radius-inp);
  font-size: 14px;
  font-family: var(--ff-body);
  background: var(--s2);
  color: var(--txt);
  outline: none; -webkit-appearance: none;
  transition: border-color .15s, box-shadow .15s;
}
[data-theme="premium"] .inp,
[data-theme="premium"] .sel,
[data-theme="premium"] .ta {
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(8px);
  font-size: 15px;
}
.inp:focus, .sel:focus, .ta:focus {
  border-color: var(--accent);
}
[data-theme="premium"] .inp:focus,
[data-theme="premium"] .sel:focus,
[data-theme="premium"] .ta:focus {
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.ta { resize: vertical; line-height: 1.6; min-height: 100px; }
.sel option { background: var(--s2); }
.fr, .frow { margin-bottom: 12px; }
.fg2, .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── PROGRESS TRACK ─────────────────────────────────── */
.ptrack {
  height: 4px; background: var(--b2);
  border-radius: 99px; overflow: hidden; margin: 6px 0;
}
[data-theme="strategic"] .ptrack { border-radius: 0; height: 3px; }
.pfill {
  height: 100%;
  background: var(--accent);
  transition: width .5s ease;
}
[data-theme="premium"] .pfill {
  background: linear-gradient(90deg, #a78bfa, #818cf8);
}

/* ── STATUS SELECTOR ────────────────────────────────── */
.status-sel {
  border: 1px solid var(--b2);
  border-radius: var(--radius-xs);
  font-size: 11px;
  font-family: var(--ff-mono);
  background: var(--s2);
  color: var(--txt);
  padding: 5px 8px; cursor: pointer;
}

/* ── SPINNER ────────────────────────────────────────── */
.spin {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid var(--b2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── OUTBOX (AI output) ─────────────────────────────── */
.outbox {
  background: var(--s2);
  border: 1px solid var(--b1);
  border-left: 2px solid var(--accent);
  border-radius: var(--radius-card);
  padding: 13px 15px;
  font-size: 13px; line-height: 1.8; color: var(--txt);
}
[data-theme="premium"] .outbox {
  border-left: none;
  backdrop-filter: blur(8px);
  background: rgba(255,255,255,.05);
}
.outbox strong { color: var(--white); font-weight: 700; }

/* ── CHUNK PROGRESS ─────────────────────────────────── */
.chunk-progress { display: flex; gap: 5px; margin: 10px 0; align-items: center; }
.chunk-dot {
  width: 8px; height: 8px;
  border: 1px solid var(--b2);
  border-radius: 99px;
  transition: all .3s;
}
[data-theme="strategic"] .chunk-dot { border-radius: 0; }
.chunk-dot.done { background: var(--accent); border-color: var(--accent); }
.chunk-dot.active {
  background: var(--s3);
  border-color: var(--accent);
  box-shadow: 0 0 6px var(--accent);
}

/* ── SCORE BADGE ────────────────────────────────────── */
.score-badge {
  font-family: var(--ff-display);
  font-size: 32px; color: var(--accent);
  letter-spacing: .03em; line-height: 1;
}
[data-theme="premium"] .score-badge { font-weight: 800; font-size: 34px; }

/* ── VOICE BARS ─────────────────────────────────────── */
.voice-bar {
  width: 4px; border-radius: 99px;
  height: 4px; transition: height .08s;
}
[data-theme="strategic"] .voice-bar { border-radius: 0; }

/* ── MODAL ──────────────────────────────────────────── */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: var(--modal-bg-color);
  z-index: 100;
  align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--s2);
  border: 1px solid var(--b2);
  border-left: 3px solid var(--accent);

function md(text){
  if(!text)return '';
  var t=String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  t=t.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
  t=t.replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
  t=t.replace(/^### ([^\n]+)/gm,'<div style="font-size:13px;font-weight:800;color:var(--gold);margin:10px 0 4px">$1</div>');
  t=t.replace(/^## ([^\n]+)/gm,'<div style="font-size:14px;font-weight:800;color:#fff;margin:12px 0 5px">$1</div>');
  t=t.replace(/^# ([^\n]+)/gm,'<div style="font-size:16px;font-weight:900;color:var(--gold);margin:14px 0 6px">$1</div>');

}

async function callClaude(sys,user){
  const key=getApiKey();
  if(!key){
    return new Promise(resolve=>{
      pendingCb=()=>callClaude(sys,user).then(resolve);
      openApiModal();
    });
  }
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{"Content-Type":"application/json","x-api-key":key,
      "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:2500,
      system:sys,messages:[{role:"user",content:user}]})
  });
  if(!r.ok){
    let msg=`HTTP ${r.status}`;
    try{const d=await r.json();msg=(d.error&&d.error.message)||msg;
      if(r.status===401)msg='Invalid API key — check Settings.';
      if(r.status===429)msg='Rate limited — wait 30 seconds and retry.';}catch{}
    throw new Error(msg);
  }
  const d=await r.json();
  if(!d.content||!d.content.length)throw new Error('Empty API response.');
  return d.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
}

function ring(v,size=64,color){
  const c=color||(v>=80?'#16a34a':v>=60?'#d97706':v>=40?'#2563eb':'#dc2626');
  const r=size/2-6,circ=2*Math.PI*r,dash=(v/100)*circ;
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="5"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${c}" stroke-width="5"
        stroke-dasharray="${dash} ${circ-dash}" stroke-linecap="round"/>
    </svg>
    <div class="ring-inner">
      <span class="ring-v" style="font-size:${size>50?16:12}px;color:${c}">${v}</span>
      <span class="ring-l">score</span>
    </div>
  </div>`;
}

function prog(v,max=100,color){
  const pct=Math.round((v/max)*100);
  const c=color||(pct>=80?'#16a34a':pct>=60?'#d97706':'#2563eb');
  return `<div class="prog"><div class="prog-fill" style="width:${pct}%;background:${c}"></div></div>`;
}

function tag(text,color){return `<span class="tag" style="background:${color}22;color:${color}">${text}</span>`;}

function sep(){return '<div class="sep"></div>';}

function btn(text,cls,onclick,disabled=false){
  return `<button class="btn ${cls}" onclick="${onclick}" ${disabled?'disabled':''}>${text}</button>`;
}

function outbox(text){return `<div class="outbox">${escHtml(text)}</div>`;}

function escHtml(t){return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function copyText(text,key){

}

function daysSince(dateStr){
  try{const d=dateStr?new Date(dateStr):new Date();return Math.max(0,Math.floor((d-new Date('2026-04-21'))/86400000));}
  catch{return 0;}
}
function todayDay(){return daysSince();}
function fmtDate(d){return new Date(d||Date.now()).toLocaleDateString('en-CA');}

// SCORE CALCULATIONS
// ═══════════════════════════════════════════════════════════
function avgSkill(){
  return Math.round(STATE.skills.reduce((a,s)=>a+s.current,0)/STATE.skills.length);
}
function ivReadiness(){
  return parseInt(loadApex('iv_overallReadiness',0))||0;
}
function journeyScore(){
  const sk=avgSkill();
  const iv=ivReadiness();
  const apps=STATE.apps.filter(a=>a.status!=='Not Applied').length;
  const appS=Math.min(100,apps*12);
  const prac=STATE.iHistory.length;
  const pracS=Math.min(100,prac*10);
  const exp=STATE.liPosts.length*3+Object.values(STATE.volActive).filter(Boolean).length*10;
  const expS=Math.min(100,exp);
  return Math.round(sk*0.25+iv*0.25+appS*0.20+pracS*0.20+expS*0.10);
}

  return bar+'<div class="cnt" style="padding-top:6px">'+body+'</div>';
}

function getIVScore(stageId){
  const stage=IV_STAGES.find(s=>s.id===stageId);if(!stage)return 0;
  const vals=stage.metrics.map((_,mi)=>STATE.ivMetrics[stageId+'_'+mi]||0);
  return Math.round(vals.reduce((a,v)=>a+v,0)/vals.length);
}

async function runForgePractice(){
  if(!STATE.pracAns.trim()||!STATE.pracQ)return;
  STATE.ivLoad=true;STATE.pracFb='';render();
  const stage=IV_STAGES.find(s=>s.id===STATE.pracStage);
  try{
    const r=await callClaude(
      `Expert interview coach for Jermaine Anderson. Honest, specific, encouraging. 11+ years, $200M+ PepsiCo, IFS Project Nova lead, SAP certified.`,
      `Stage: ${(stage&&stage.label)}\nRole: ${STATE.pracRole||'Senior BA'}\nQuestion: ${STATE.pracQ}\nAnswer: ${STATE.pracAns}\n\n1. SCORE: X/10 — one sentence\n2. WHAT WORKED: 2 specific things\n3. IMPROVE: 2 specific things with how\n4. STRONGER VERSION: rewrite in STAR with real metrics (max 120 words)\n5. COACHING TIP: one line`
    );
    STATE.pracFb=r;
    const sc=r.match(/(\d+)\/10/);
    const entry={id:Date.now(),stage:STATE.pracStage,q:STATE.pracQ,answer:STATE.pracAns,feedback:r,score:sc?parseInt(sc[1]):null,date:new Date().toLocaleDateString(),role:STATE.pracRole};
    const hist=[entry,...STATE.iHistory.slice(0,19)];
    st('iHistory',hist);saveApex('iHistory',hist);
  }catch(e){STATE.pracFb='Error: '+e.message;}
  STATE.ivLoad=false;render();
}

function getLogEntries(){
  if(!STATE.logEntries){
    const day0={id:'day_zero',type:'milestone',date:'2026-04-21',day:0,title:'Day 0 — The Crossroads',body:DAY_ZERO_NARRATIVE,pinned:true};

    STATE.logEntries=[day0,day5];
    save('logEntries',STATE.logEntries);
  }
  return STATE.logEntries;
}

function syncLog(){
  const entries=getLogEntries();
  const existingIds=new Set(entries.map(e=>e.id));
  const newEntries=[];
  // Sync from apps
  STATE.apps.filter(a=>a.status&&a.status!=='Not Applied'&&a.date).forEach(app=>{
    const id=`app_${app.id}`;
    if(!existingIds.has(id)){
      newEntries.push({id,type:app.status==='Interview'?'job_result':app.status==='Offer'?'offer':'job_applied',
        date:app.date,day:daysSince(app.date),title:`${app.status}: ${app.title} — ${app.company}`,
        body:`Application ${app.status.toLowerCase()} for ${app.title} at ${app.company}. Salary: ${app.salary||'Undisclosed'}.`,pinned:false});
    }
  });
  // Sync practice sessions
  STATE.iHistory.slice(0,5).forEach((h,i)=>{
    const id=`prac_${h.id||i}`;
    if(!existingIds.has(id)){
      newEntries.push({id,type:'interview_practice',date:h.date,day:daysSince(h.date),
        title:`Interview Practice: ${(h.q&&h.q.slice(0,50)||'')}…`,
        body:`Stage: ${h.stage||'General'}. Score: ${h.score||'?'}\/10.`,pinned:false});
    }
  });
  if(newEntries.length){
    const updated=[...entries,...newEntries].sort((a,b)=>a.day-b.day);
    STATE.logEntries=updated;save('logEntries',updated);
  }
  return newEntries.length;
}

  r.push(THREE_STORIES.length===3?'✓ 3 core stories':'✗ Stories missing');
  r.push(LI_WEEKS.length===4?'✓ 4 LinkedIn weeks':'✗ LinkedIn weeks missing');
  r.push(typeof callClaude==='function'?'✓ API function present':'✗ API function missing');
  r.push(daysSince('2026-04-21')===0?'✓ Day 0 calc correct':'✗ Day calc wrong');
  const pass=r.filter(x=>x.startsWith('✓')).length;
  console.log(`\n=== APEX HTML INTERNAL TESTS ===\n${r.join('\n')}\n\n${pass}/${r.length} passed ${pass===r.length?'✅ ALL PASS':'⚠ CHECK FAILURES'}`);
}

// ── CORE RESEARCH FUNCTION ────────────────────────────────────────────
async function runIntelResearch(){
  const company=getDropdownValue('intel-company-sel','intel-company');
  const role=getDropdownValue('intel-role-sel','intel-role');
  if(!company||!role){alert('Select or type a company name and target role to research.');return;}
  const url=el('intel-url')?el('intel-url').value.trim():'';
  const namesRaw=el('intel-names')?el('intel-names').value.trim():'';
  const context=el('intel-context')?el('intel-context').value.trim():'';
  const names=namesRaw?namesRaw.split('\n').map(s=>s.trim()).filter(Boolean):[];
  const btn=el('intel-research-btn');if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Researching '+company+' — this takes 60-90 seconds...';}
  const out=el('intel-research-out');if(out)out.innerHTML='';
  const p=loadPro();const profile=buildProfile();

  function status(msg){if(out)out.innerHTML=alertHtml('&#128269;',msg,'var(--gold)');}

  try{
    // ── PHASE 1: Company Research with web search ──────────────────
    status('Phase 1/4 — Researching '+company+' online...');
    const companyResearch=await callClaudeWithSearch(
      'You are a business intelligence researcher. Search for comprehensive information about this organization and return detailed findings. Be factual and specific.',
      'Research '+company+' comprehensively for a job candidate targeting the role of '+role+'.'+(url?'\nWebsite: '+url:'')+(context?'\nContext: '+context:'')+'\n\nSearch for and compile:\n1. MISSION & VISION: exact statements if available\n2. CORE VALUES: what they publicly commit to\n3. RECENT INITIATIVES: major projects, transformations, announcements in the last 2-3 years\n4. BUSINESS CHALLENGES: what problems they are publicly trying to solve\n5. CULTURE & REPUTATION: glassdoor themes, news coverage, employer brand\n6. SIZE & STRUCTURE: employees, locations, revenue/budget if public\n7. LEADERSHIP: CEO, relevant department heads, their backgrounds\n8. STRATEGIC PRIORITIES: what they are investing in or shifting toward\n9. HOW '+role.toUpperCase()+' FITS: where this role sits in their mandate\n10. WHAT THEY LOOK FOR: any public statements about ideal employees or culture fit\n\nBe specific — cite real initiatives, real names, real announcements.',
      4000
    );

    // ── PHASE 2: Positioning Analysis ─────────────────────────────
    status('Phase 2/4 — Mapping your background to their priorities...');
    const positioning=await callClaudeWithSearch(
      'Strategic career positioning analyst. Generate precise, evidence-based analysis.',
      'Analyze how this candidate is positioned for '+role+' at '+company+'.\n\nCOMPANY RESEARCH:\n'+companyResearch+'\n\nCANDIDATE PROFILE:\n'+profile+'\n\nGenerate:\n## POSITIONING SCORE: X/10\n[one sentence verdict]\n\n## DIRECT ALIGNMENTS\n[Where candidate\'s specific background directly matches company priorities — use real examples from both sides]\n\n## STRATEGIC FIT\n[How candidate\'s specific achievements serve the company\'s stated mission and current initiatives]\n\n## NARRATIVE TO USE\n[The 3-sentence story that connects candidate\'s background to this company\'s specific needs — use in cover letter opening and interview]\n\n## GAPS AND HOW TO BRIDGE\n[Honest gaps + specific language to bridge each in interview]\n\n## NEGOTIATION LEVERAGE\n[What about candidate\'s background gives them leverage in salary discussion specifically with this employer]\n\n## RED FLAGS\n[Any potential concerns to prepare for based on company culture or role requirements]',
      3000
    );

    // ── PHASE 3: Org Chart ─────────────────────────────────────────
    status('Phase 3/4 — Mapping the organization...');
    const orgChart=await callClaudeWithSearch(
      'Organizational analyst. Build realistic org charts based on research and industry patterns.',
      'Build an organizational map for '+role+' at '+company+'.\n\nCOMPANY RESEARCH:\n'+companyResearch+'\n\nGenerate:\n## ORG CHART — '+role.toUpperCase()+' POSITION\n[ASCII/text org chart showing:\n- 2 levels above this role (VP, Director)\n- Peer roles at the same level\n- Any direct reports if senior role\n- Format: use indentation and arrows]\n\n## KEY DECISION MAKERS FOR THIS HIRE\n[Who likely approves this role — HR, direct manager, VP? Based on company structure]\n\n## CROSS-FUNCTIONAL STAKEHOLDERS\n[Other departments this role interacts with and why — operations, IT, finance, legal, etc.]\n\n## LIKELY INTERVIEW PANEL\n[Who is likely in the room based on company structure and role level]\n\n## STAKEHOLDER MAP BY INFLUENCE\n[Power/interest grid: High influence + high interest, High influence + low interest, etc.]\n\n## INTERNAL CHAMPIONS\n[Which functions would benefit most from this role succeeding — likely your advocates]',
      3000
    );

// ── API WITH WEB SEARCH ────────────────────────────────────────────────
async function callClaudeWithSearch(sys,user,maxTokens){
  const key=getApiKey();
  if(!key){return new Promise(resolve=>{pendingAICb=resolve;el('api-modal').classList.add('open');});}
  // Try with web_search first, fall back to standard if not available
  async function tryFetch(useSearch){
    var body={
      model:'claude-sonnet-4-6',
      max_tokens:maxTokens||3000,
      system:sys,
      messages:[{role:'user',content:user}]
    };
    if(useSearch)body.tools=[{"type":"web_search_20250305","name":"web_search"}];
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify(body)
    });
    return r;
  }
  var r;
  try{
    r=await tryFetch(true);
    // If web_search not available on this key, retry without
    if(r.status===400){
      var errBody=await r.json();
      var errMsg=(errBody&&errBody.error&&errBody.error.message)||'';
      if(errMsg.includes('web_search')||errMsg.includes('tool')){
        r=await tryFetch(false);
      } else {
        throw new Error(errMsg||'HTTP 400');
      }
    }
  }catch(e){
    r=await tryFetch(false);
  }
  if(!r.ok){
    var msg='HTTP '+r.status;
    try{var d2=await r.json();msg=(d2.error&&d2.error.message)||msg;
      if(r.status===401)msg='Invalid API key — check Settings.';
      if(r.status===429)msg='Rate limit — wait 30 seconds and try again.';}catch(e2){}
    throw new Error(msg);
  }
  var d=await r.json();
  // Extract text from all content block types
  var texts=(d.content||[])
    .filter(function(b){return b.type==='text';})
    .map(function(b){return b.text;})
    .join('\n')
    .trim();
  if(texts)return texts;
  // Try tool_result blocks (web search results embedded)
  var toolTexts=(d.content||[])
    .filter(function(b){return b.type==='tool_result';})
    .flatMap(function(b){return b.content||[];})
    .filter(function(b){return b.type==='text';})
    .map(function(b){return b.text;})
    .join('\n')
    .trim();
  return toolTexts||'Research completed.';
}

async function genEmailFromProfile(){
  const p=loadPro();const company=getDropdownValue('em-company-sel','em-company');const type=el('em-type')?el('em-type').value:'Job Application';
  const profile=buildEnrichedProfile();
  const ta=el('em-body');if(ta)ta.value='Generating...';
  try{
    const r=await callClaude(
      'Professional email writer. Confident, direct, specific. Never sounds desperate.',
      'Write a '+type+' email'+(company?' for '+company:'')+'\n\nSender profile:\n'+profile.slice(0,1200)+'\n\nFormat:\nSUBJECT: [compelling subject line]\n\n[Body — 3 paragraphs max, 200 words]\n\nSignature:\n[Full name]\n[Phone] | [Email]'
    );
    const lines=r.split('\n');const subjectLine=lines.find(l=>l.startsWith('SUBJECT:'));
    if(subjectLine&&el('em-subject'))el('em-subject').value=subjectLine.replace('SUBJECT:','').trim();
    const body=r.replace(/^SUBJECT:.*\n/,'').trim();
    if(ta)ta.value=body;
  }catch(e){if(ta)ta.value='Generation failed: '+e.message;}
}

async function sendEmail(){
  const to=getDropdownValue('em-to-sel','em-to');
  const subject=el('em-subject')?el('em-subject').value.trim():'';
  const body=el('em-body')?el('em-body').value.trim():'';
  if(!to||!subject||!body){alert('Fill in recipient, subject, and message.');return;}
  if(!isEmailConfigured()){alert('Configure EmailJS first.');return;}
  const btn=el('send-btn');if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Sending...';}
  const out=el('send-out');if(out)out.innerHTML='';
  const p=loadPro();const setup=getEmailSetup();
  const followUpDays=parseInt(el('em-followup-days')?el('em-followup-days').value:7)||0;
  const company=getDropdownValue('em-company-sel','em-company');
  const type=el('em-type')?el('em-type').value:'Job Application';
  try{
    // Init EmailJS
    if(window.emailjs)emailjs.init(setup.publicKey);
    await emailjs.send(setup.serviceId,setup.templateId,{
      to_email:to,cc_email:el('em-cc')?el('em-cc').value.trim():'',
      subject,message:body,from_name:p?p.name:'Applicant',reply_to:p?p.email:to
    });
    // Log sent email
    const sent=ls('pro_emails_sent',[]);
    const emailRecord={id:'em_'+Date.now(),to,subject,body,type,company,sentDate:todayStr(),sentTime:new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'}),replied:false,repliedDate:null};
    sent.unshift(emailRecord);sv('pro_emails_sent',sent.slice(0,100));
    // Schedule follow-up
    if(followUpDays>0){
      const followups=ls('pro_followups',[]);
      followups.unshift({id:'fu_'+Date.now(),to,company,type,subject,sentDate:todayStr(),followUpDays,replied:false,dismissed:false});
      sv('pro_followups',followups.slice(0,100));
    }
    if(out)out.innerHTML=alertHtml('&#10003;','Email sent to '+to+'. '+(followUpDays>0?'Follow-up reminder set for '+followUpDays+' days.':''),'var(--green)');
    // Schedule browser notification
    if(followUpDays>0)scheduleFollowUpNotification(company||to,followUpDays);
    // Clear fields
    if(el('em-to'))el('em-to').value='';if(el('em-body'))el('em-body').value='';
  }catch(e){
    if(out)out.innerHTML=alertHtml('&#10007;','Send failed: '+esc(e.message)+'<br><br>EmailJS may not be configured correctly — check your Service ID, Template ID, and Public Key at emailjs.com.','var(--red)');
  }
  if(btn){btn.disabled=false;btn.innerHTML='&#9993; Send Email Now';}
}

// ── SENT LOG ──────────────────────────────────────────────────────────
function renderEmailSent(){
  const sent=ls('pro_emails_sent',[]);
  let h=alertHtml('&#128229;',sent.length+' email'+(sent.length!==1?'s':'')+' sent through APEX. Mark replied when you hear back.','var(--muted)');
  if(!sent.length){el('email-tab-sent').innerHTML=h+'<div style="text-align:center;padding:28px;color:var(--muted);font-size:13px">No emails sent yet.</div>';return;}
  sent.slice(0,30).forEach((e,i)=>{
    const daysAgo=Math.floor((Date.now()-new Date(e.sentDate))/86400000);
    const c=e.replied?'var(--green)':daysAgo>=14?'var(--red)':daysAgo>=7?'var(--gold)':'var(--muted)';
    h+='<div class="card" style="margin-bottom:9px"><div style="padding:12px 14px"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:6px">'
      +'<div><div style="font-size:13px;font-weight:700;color:#fff">'+esc(e.subject)+'</div>'
      +'<div style="font-size:11px;color:var(--muted)">'+esc(e.to)+(e.company?' &middot; '+esc(e.company):'')+' &middot; '+e.sentDate+'</div>'
      +'<div style="font-size:10px;font-weight:700;color:'+c+';margin-top:2px">'+(e.replied?'&#10003; Replied':daysAgo+'d ago — '+(daysAgo>=14?'STALE':daysAgo>=7?'Follow up needed':'Recent'))+'</div></div>'
      +'<div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">'
      +(e.replied?'<span style="font-size:10px;color:var(--green)">Replied</span>':'<button class="btn btn-ghost btn-xs" style="color:var(--green);min-height:28px" onclick="markReplied('+i+')">&#10003; Mark Replied</button>')
      +'</div></div>'
      +'<div style="display:flex;gap:7px;flex-wrap:wrap">'
      +'<button class="btn btn-ghost btn-xs" id="em-body-cp-'+i+'" style="color:var(--muted)" onclick="copyText(this.dataset.text,\'em-body-cp-'+i+'\')" data-text="'+esc(e.body)+'">Copy</button>'
      +(e.replied?'':'<button class="btn btn-gold btn-xs" onclick="genFollowUpFor(\''+esc(e.to)+'\',\''+esc(e.company)+'\','+Math.floor((Date.now()-new Date(e.sentDate))/86400000)+')">&#9889; Generate Follow-Up</button>')
      +'</div></div></div>';
  });
  el('email-tab-sent').innerHTML=h;
}

function markReplied(i){const s=ls('pro_emails_sent',[]);if(s[i]){s[i].replied=true;s[i].repliedDate=todayStr();}sv('pro_emails_sent',s);renderEmailSent();}

async function genFollowUpFor(to,company,days){
  const profile=buildEnrichedProfile();
  const p=loadPro();
  try{
    const r=await callClaude(
      'Professional follow-up email writer. Brief, confident, never desperate. Under 100 words.',
      'Write a follow-up email.\nOriginal recipient: '+to+(company?'\nCompany: '+company:'')+'\nDays since original: '+days+'\nSender: '+( p?p.name:'')+(p&&p.email?' | '+p.email:'')+'\n\nSUBJECT: [follow-up subject]\n\n[2 paragraph body — reference original email, one credential, request for update]\n\nSignature: '+( p?p.name+'\n'+(p.phone||'')+(p.email?' | '+p.email:''):'')
    );
    // Pre-fill compose
    const lines=r.split('\n');const sub=lines.find(l=>l.startsWith('SUBJECT:'));
    if(el('em-to'))el('em-to').value=to;
    if(el('em-subject')&&sub)el('em-subject').value=sub.replace('SUBJECT:','').trim();
    if(el('em-body'))el('em-body').value=r.replace(/^SUBJECT:.*\n/,'').trim();
    if(el('em-company'))el('em-company').value=company;
    emailTab('send',document.querySelector('.email-tab-btn')||{});
  }catch(e){alert('Generation failed: '+e.message);}
}

// ── FOLLOW-UP TRACKER ─────────────────────────────────────────────────
function renderFollowUpTracker(){
  const followups=ls('pro_followups',[]);
  const now=Date.now();
  const due=followups.filter(f=>{
    if(f.replied||f.dismissed)return false;
    const days=Math.floor((now-new Date(f.sentDate))/86400000);
    return days>=f.followUpDays;
  });
  const upcoming=followups.filter(f=>{
    if(f.replied||f.dismissed)return false;
    const days=Math.floor((now-new Date(f.sentDate))/86400000);
    return days<f.followUpDays;
  });
  let h='';
  if(due.length){
    h+='<div style="font-size:11px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">&#128680; '+due.length+' Follow-Up'+(due.length!==1?'s':'')+' Due Now</div>';
    due.forEach((f,i)=>{
      const days=Math.floor((now-new Date(f.sentDate))/86400000);
      h+='<div class="card" style="border-color:rgba(224,60,60,.4);margin-bottom:9px"><div style="padding:13px 14px">'
        +'<div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:3px">'+esc(f.company||f.to)+'</div>'
        +'<div style="font-size:11px;color:var(--muted)">'+f.type+' sent '+f.sentDate+' ('+days+' days ago)</div>'
        +'<div style="display:flex;gap:7px;margin-top:10px;flex-wrap:wrap">'
        +'<button class="btn btn-red btn-xs" id="fu-gen-'+i+'" onclick="fuGenBtn('+i+')">&#9889; Generate Follow-Up</button>'
        +'<button class="btn btn-ghost btn-xs" style="color:var(--green)" onclick="markFollowUpDone('+i+',\'replied\')">&#10003; They Replied</button>'
        +'<button class="btn btn-ghost btn-xs" style="color:var(--muted)" onclick="markFollowUpDone('+i+',\'dismissed\')">Dismiss</button>'
        +'</div></div></div>';
    });
  }
  if(upcoming.length){
    h+='<div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:'+(due.length?'16px':'0')+' 0 10px">Upcoming Follow-Ups</div>';
    upcoming.forEach((f,i)=>{
      const daysSince=Math.floor((now-new Date(f.sentDate))/86400000);
      const daysLeft=f.followUpDays-daysSince;
      h+='<div style="padding:10px 14px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid var(--b1);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">'
        +'<div><div style="font-size:13px;font-weight:700;color:#fff">'+esc(f.company||f.to)+'</div>'
        +'<div style="font-size:11px;color:var(--muted)">'+f.type+' &middot; Sent '+f.sentDate+'</div></div>'
        +'<div style="text-align:right;flex-shrink:0"><div style="font-size:18px;font-weight:900;color:var(--gold)">'+daysLeft+'d</div>'
        +'<div style="font-size:10px;color:var(--muted)">until follow-up</div></div></div>';
    });
  }
  if(!due.length&&!upcoming.length){
    h=alertHtml('&#10003;','No follow-ups needed right now. Every sent email with a follow-up schedule appears here automatically.','var(--green)');
  }
  el('email-tab-followup').innerHTML=h;
}

function markFollowUpDone(i,status){
  const f=ls('pro_followups',[]);
  const due=f.filter(x=>!x.replied&&!x.dismissed);
  if(due[i]){const idx=f.indexOf(due[i]);f[idx][status]=true;}
  sv('pro_followups',f);renderFollowUpTracker();
}

async function requestNotifications(){
  if(!('Notification' in window)){alert('Your browser does not support notifications. Open APEX from Safari on iPhone.');return;}
  if(Notification.permission==='granted'){alert('✓ Notifications already enabled.');updateNotifBtn();return;}
  const perm=await Notification.requestPermission();
  if(perm==='granted'){

function scheduleFollowUpNotification(company,days){
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  const ms=days*24*60*60*1000;
  const existing=ls('pro_notif_timers',[]);
  existing.push({company,days,scheduledFor:new Date(Date.now()+ms).toISOString(),fired:false});
  sv('pro_notif_timers',existing);

}

function checkScheduledNotifications(){
  const timers=ls('pro_notif_timers',[]);if(!timers.length)return;
  const now=Date.now();let changed=false;
  timers.forEach(t=>{
    if(!t.fired&&new Date(t.scheduledFor)<=now){
      if(Notification.permission==='granted'){
        new Notification('APEX — Follow-Up Due',{
          body:'Time to follow up on your application to '+t.company+'. Open APEX to generate your follow-up email.',
          icon:'',tag:'followup-'+t.company
        });
      }
      t.fired=true;changed=true;
    }
  });
  if(changed)sv('pro_notif_timers',timers);
  // Check every 2 hours while app is open
  setTimeout(checkScheduledNotifications,2*60*60*1000);
}

const DEVICE={
  type:'mobile',      // 'mobile' | 'tablet' | 'desktop'
  isDesktop:false,
  isMobile:true,
  isTablet:false,
  touchTimeout:45000, // ms timeout per API call
  desktopTimeout:75000,
  callTimeout:45000,  // set based on detected device
};

function detectDevice(){
  const ua=navigator.userAgent;
  const w=window.innerWidth;
  const isIOS=/iPhone|iPad|iPod/i.test(ua);
  const isAndroid=/Android/i.test(ua);
  const isPhone=isIOS||isAndroid||w<768;
  const isTab=!isPhone&&(w>=768&&w<1200||/iPad/i.test(ua));
  const isDesk=!isPhone&&!isTab;
  DEVICE.type=isDesk?'desktop':isTab?'tablet':'mobile';
  DEVICE.isDesktop=isDesk;
  DEVICE.isMobile=isPhone;
  DEVICE.isTablet=isTab;
  DEVICE.callTimeout=isDesk?DEVICE.desktopTimeout:DEVICE.touchTimeout;
  document.body.classList.remove('is-desktop','is-tablet','is-mobile');
  document.body.classList.add('is-'+DEVICE.type);
  sv('apex_device_last',DEVICE.type);
  return DEVICE.type;
}

// CLOUD SYNC — GitHub Gist
// ══════════════════════════════════════════
const SYNC_KEYS=['apex_v3','jagent_v6','apex_log_v1','apex_company_intel','apex_active_job',
  'apex_emails_sent','apex_followups','apex_personal_qa','li_draft_library','apex_gen_company',
  'apex_gen_title','custom_jobs','apex_research_sessions'];
// Keys that NEVER sync (security-sensitive)
const NO_SYNC=['apex_api_key','apex_email_setup','pro_email_setup'];

function getGistConfig(){return ls('apex_gist_config',null);}
function hasGistSync(){const c=getGistConfig();return c&&c.pat&&c.gistId;}
function showSyncIndicator(msg,color){
  const el=document.getElementById('sync-indicator');
  if(!el)return;
  el.textContent=(msg||'&#8645; Syncing...');
  el.style.background=color?color+'22':'rgba(26,173,94,.2)';
  el.style.color=color||'var(--green)';
  el.classList.add('visible');
  setTimeout(()=>el.classList.remove('visible'),3000);
}

async function syncToCloud(force){
  if(!hasGistSync())return;
  const cfg=getGistConfig();
  const now=Date.now();
  const lastSync=ls('apex_last_sync',0);
  if(!force&&now-lastSync<30000)return; // debounce 30s
  const payload={};
  SYNC_KEYS.forEach(k=>{
    try{const v=localStorage.getItem(k);if(v!==null)payload[k]=v;}catch{}
  });
  payload['_meta']={syncedAt:now,device:DEVICE.type,version:'apex_unified_2026'};
  try{
    const r=await fetch(`https://api.github.com/gists/${cfg.gistId}`,{
      method:'PATCH',
      headers:{'Authorization':'token '+cfg.pat,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},
      body:JSON.stringify({files:{'apex_data.json':{content:JSON.stringify(payload)}}})
    });
    if(r.ok){sv('apex_last_sync',now);showSyncIndicator('&#10003; Synced to cloud','#1aad5e');}
    else showSyncIndicator('&#9888; Sync failed','#d97706');
  }catch(e){showSyncIndicator('&#9888; Offline','#d97706');}
}

async function syncFromCloud(showFeedback){
  if(!hasGistSync())return false;
  const cfg=getGistConfig();
  try{
    const r=await fetch(`https://api.github.com/gists/${cfg.gistId}`,{
      headers:{'Authorization':'token '+cfg.pat,'Accept':'application/vnd.github.v3+json'}
    });
    if(!r.ok)return false;
    const data=await r.json();
    const fileContent=data.files&&data.files['apex_data.json']&&data.files['apex_data.json'].content;
    if(!fileContent)return false;
    const payload=JSON.parse(fileContent);
    const remoteMeta=payload['_meta']||{};
    const localSync=ls('apex_last_sync',0);
    const remoteSyncedAt=remoteMeta.syncedAt||0;
    if(remoteSyncedAt>localSync){
      // Remote is newer — merge in
      let updated=0;
      SYNC_KEYS.forEach(k=>{
        if(payload[k]!==undefined&&!NO_SYNC.includes(k)){
          // Compare timestamps if possible
          try{
            const local=localStorage.getItem(k);
            const remote=payload[k];
            if(remote!==local){localStorage.setItem(k,remote);updated++;}
          }catch{}
        }
      });
      sv('apex_last_sync',remoteSyncedAt);
      if(showFeedback&&updated>0)showSyncIndicator('&#8645; Loaded '+updated+' updates from cloud','#3b6ff0');
      return updated>0;
    }
    return false;
  }catch(e){return false;}
}

async function createGistAndSave(pat){
  try{
    const r=await fetch('https://api.github.com/gists',{
      method:'POST',
      headers:{'Authorization':'token '+pat,'Content-Type':'application/json'},
      body:JSON.stringify({
        description:'APEX Career Intelligence — Sync Data',
        public:false,
        files:{'apex_data.json':{content:JSON.stringify({_meta:{created:Date.now()}})}}
      })
    });
    if(!r.ok)throw new Error('GitHub API error: '+r.status);
    const data=await r.json();
    return data.id;
  }catch(e){throw e;}
}

async function saveGistConfig(){
  const pat=(document.getElementById('gist-pat')||{value:''}).value.trim();
  if(!pat||!pat.startsWith('ghp_')){alert('Enter a valid GitHub token (starts with ghp_).');return;}
  const btn=document.getElementById('gist-save-btn');if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Setting up...';}

async function forceSyncNow(){

// JOB-SPECIFIC DATA ISOLATION
// Base profile never mutated — each job gets own enriched context
// ══════════════════════════════════════════
function getJobEnrichedKey(jobId){return 'apex_job_enriched_'+String(jobId).replace(/[^a-z0-9]/gi,'_');}

function getJobEnrichedData(jobId){
  if(!jobId)return null;
  return ls(getJobEnrichedKey(jobId),null);
}

function initJobEnrichedData(jobId,jobInfo){
  const key=getJobEnrichedKey(jobId);
  const existing=ls(key,null);
  if(existing)return existing;
  // Create fresh enriched context for this job — base snapshot is immutable reference
  const data={
    jobId,
    company:jobInfo.company,
    title:jobInfo.title,
    salary:jobInfo.salary||'',
    url:jobInfo.url||'',
    createdAt:todayStr(),
    // Research overlay — starts empty, filled by research engine
    research:{
      chunks:{},    // chunk_id → result text
      score:0,      // 0-100 research completeness
      status:'not_started', // not_started | in_progress | complete | interrupted
      startedAt:null,
      lastChunkAt:null,
      completedChunks:[],
      totalChunks:8,
    },
    // Generated documents for this specific job
    docs:{},
    // Enrichment log — tracks what updated this job's context
    enrichmentLog:[],
  };
  sv(key,data);
  return data;
}

function updateJobResearch(jobId,chunkId,chunkResult){
  const key=getJobEnrichedKey(jobId);
  const data=ls(key,null);if(!data)return;
  if(!data.research.chunks)data.research.chunks={};
  data.research.chunks[chunkId]=chunkResult;
  if(!data.research.completedChunks.includes(chunkId))
    data.research.completedChunks.push(chunkId);
  data.research.score=Math.round((data.research.completedChunks.length/data.research.totalChunks)*100);
  data.research.lastChunkAt=new Date().toISOString();
  data.research.status=data.research.completedChunks.length>=data.research.totalChunks?'complete':'in_progress';
  sv(key,data);
  smartSync(); // cloud sync after each chunk
  return data;
}

function buildJobEnrichedProfile(jobId){
  // Returns PROFILE + any research overlay for this specific job
  // Never mutates PROFILE
  const base=PROFILE;
  if(!jobId)return base;
  const enriched=getJobEnrichedData(jobId);
  if(!enriched||!enriched.research)return base;
  const chunks=enriched.research.chunks||{};
  const chunkTexts=Object.values(chunks).filter(Boolean).join('\n\n');
  if(!chunkTexts)return base;
  return base+'\n\n'
    +'══ JOB-SPECIFIC INTELLIGENCE ══\n'
    +'COMPANY: '+enriched.company+'\nROLE: '+enriched.title+'\nRESEARCH SCORE: '+enriched.research.score+'/100\n\n'
    +chunkTexts.slice(0,3000);
}

    culture:`Research ${company} — focus on WHAT IT IS LIKE TO WORK THERE:\n\n1. EMPLOYER REPUTATION: what they are known for as an employer (awards, rankings)\n2. WORK ENVIRONMENT: remote/hybrid/in-office policy\n3. HIRING PHILOSOPHY: what they look for in candidates based on job posting language\n4. DIVERSITY & INCLUSION: any public commitments or programs\n5. CAREER DEVELOPMENT: internal mobility, training, advancement\n6. GLASSDOOR THEMES: if known, what employees say (both positive and concerns)${prev}`,
    leadership:`Research leadership at ${company} relevant to ${role}:\n\n1. CEO / PRESIDENT: name, background, how long in role, known priorities\n2. LIKELY HIRING MANAGER level (VP or Director of relevant function): typical background for this org\n3. HR / TALENT ACQUISITION: what is known about their hiring process\n4. ANY NAMED LEADERS relevant to this role's function\n${namesStr?'5. SPECIFICALLY PROFILE: '+namesStr:''}\n\nFor each leader: career trajectory, what they care about, their communication style${prev}`,

async function runResumableResearch(jobId,company,role,url,namesRaw,context,onProgress){
  // Initialize or resume job-specific data
  const apps=getApps();
  const app=apps.find(a=>a.id===jobId)||{id:jobId,company,title:role,salary:'',url:url||''};
  const enriched=initJobEnrichedData(jobId,app);
  const completedChunks=enriched.research.completedChunks||[];
  const existingChunks=enriched.research.chunks||{};
  const isResume=completedChunks.length>0;
  const names=namesRaw?namesRaw.split('\n').map(s=>s.trim()).filter(Boolean):[];
  const namesStr=names.length?names.join(', '):'';

  // Mark as in-progress
  const key=getJobEnrichedKey(jobId);
  const eData=ls(key,null)||enriched;
  eData.research.status='in_progress';
  eData.research.startedAt=eData.research.startedAt||new Date().toISOString();
  sv(key,eData);

  const chunksToRun=RESEARCH_CHUNKS.filter(c=>!completedChunks.includes(c.id));
  let successCount=0;
  let interrupted=false;

  for(let i=0;i<chunksToRun.length;i++){
    const chunk=chunksToRun[i];
    const chunkNum=completedChunks.length+i+1;
    const totalDone=completedChunks.length+i;

    // Progress callback
    if(onProgress)onProgress({
      chunk:chunk.id,
      label:chunk.label,
      chunkNum,
      totalChunks:8,
      completedChunks:[...completedChunks,...chunksToRun.slice(0,i).map(c=>c.id)],
      score:Math.round((totalDone/8)*100),
      status:'running',
    });

    // Build profile from what we have so far
    const partialProfile=PROFILE;
    const prevChunkTexts={};
    [...completedChunks,...chunksToRun.slice(0,i).map(c=>c.id)].forEach(cid=>{
      if(existingChunks[cid])prevChunkTexts[cid]=existingChunks[cid];
    });

    const prompt=getChunkPrompt(chunk.id,company,role,context,namesStr,partialProfile,prevChunkTexts);
    const tokenLimit=DEVICE.isMobile?Math.round(chunk.tokens*0.75):chunk.tokens;
    const timeout=DEVICE.callTimeout;

    try{
      const result=await callClaudeWithTimeout(
        'You are a business intelligence analyst and career positioning expert for Jermaine Anderson. Focus specifically on '+chunk.label+' for '+company+'. Be specific and actionable. Use your knowledge — this organization is well known.',
        prompt,
        tokenLimit,
        timeout
      );
      // Save immediately after each successful chunk
      updateJobResearch(jobId,chunk.id,result);
      existingChunks[chunk.id]=result;
      successCount++;

      // Also update the legacy intel storage for backward compat
      updateLegacyIntel(jobId,company,role,chunk.id,result,existingChunks);

    }catch(e){
      if(e.name==='AbortError'||e.message.includes('timeout')||e.message.includes('timed out')){
        // Interrupted — save state and stop gracefully
        const eData2=ls(key,null)||{};
        eData2.research=eData2.research||{};
        eData2.research.status='interrupted';
        eData2.research.interruptedAt=new Date().toISOString();
        eData2.research.interruptedChunk=chunk.id;
        sv(key,eData2);
        interrupted=true;
        if(onProgress)onProgress({
          status:'interrupted',
          chunk:chunk.id,
          label:chunk.label,
          score:Math.round(((completedChunks.length+i)/8)*100),
          completedChunks:[...completedChunks,...chunksToRun.slice(0,i).map(c=>c.id)],
          error:e.message,
        });
        break;
      }else{
        // Non-timeout error — log and continue to next chunk
        console.warn('Chunk '+chunk.id+' failed:',e.message);
        if(onProgress)onProgress({
          status:'chunk_failed',chunk:chunk.id,error:e.message,
          score:Math.round(((completedChunks.length+i)/8)*100),
        });
      }
    }
  }

  if(!interrupted){
    const eData3=ls(key,null)||{};
    if(eData3.research){
      eData3.research.status=eData3.research.completedChunks&&eData3.research.completedChunks.length>=8?'complete':'partial';
      sv(key,eData3);
    }
    if(onProgress)onProgress({
      status:'complete',
      score:Math.round(((completedChunks.length+successCount)/8)*100),
      completedChunks:[...completedChunks,...chunksToRun.slice(0,successCount).map(c=>c.id)],
    });
  }

  smartSync();
  return{interrupted,successCount,score:Math.round(((completedChunks.length+successCount)/8)*100)};
}

function updateLegacyIntel(jobId,company,role,chunkId,result,allChunks){
  // Keep the old intel keys working for backward compat with existing renders
  const existing=ls('apex_company_intel',null)||{company,role,researchDate:todayStr()};
  const chunkMap={
    identity:'companyResearch',
    strategy:'companyResearch',
    culture:'companyResearch',
    leadership:'companyResearch',
    position:'positioning',
    orgchart:'orgChart',
    psychology:'psychology',
    negotiate:'positioning',
  };
  const legacyKey=chunkMap[chunkId];
  if(legacyKey){
    existing[legacyKey]=(existing[legacyKey]?existing[legacyKey]+'\n\n':'')+result;
    existing.researchDate=todayStr();
    existing.jobId=jobId;
  }
  sv('apex_company_intel',existing);
  sv('pro_company_intel',existing);
}

async function callClaudeWithTimeout(sys,user,maxTokens,timeoutMs){
  const key=getApiKey();
  if(!key)throw new Error('No API key');
  const controller=new AbortController();
  const tid=setTimeout(()=>controller.abort(),timeoutMs||DEVICE.callTimeout);
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',signal:controller.signal,
      headers:{'Content-Type':'application/json','x-api-key':key,
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTokens||800,
        system:sys,messages:[{role:'user',content:user}]})
    });
    clearTimeout(tid);
    if(!r.ok){
      const d=await r.json().catch(()=>({}));
      const msg=(d.error&&d.error.message)||'HTTP '+r.status;
      const e=new Error(msg);
      throw e;
    }
    const d=await r.json();
    clearTimeout(tid);
    return d.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
  }catch(e){
    clearTimeout(tid);
    throw e;
  }
}

function buildChunkProgressBar(completedChunks,status){
  return '<div class="chunk-progress">'+RESEARCH_CHUNKS.map(c=>{
    const done=completedChunks.includes(c.id);

    const cls=done?'done':isActive?'active':'';
    return '<div class="chunk-dot '+cls+'" title="'+c.label+'"></div>';
  }).join('')+'</div>';
}

    }

      out.innerHTML=alertHtml('&#10003;','Research complete — '+result.score+'/100. All tabs updated. All documents now use this intelligence.','var(--green)');

    strengths:['Common in logistics, healthcare, manufacturing, staffing'],

function detectLikelyATS(company,jd,industry){
  const combined=(company+' '+(jd||'')+' '+(industry||'')).toLowerCase();
  for(const[key,platform]of Object.entries(ATS_PLATFORMS)){
    if(key==='generic')continue;
    if(platform.signals.some(s=>combined.includes(s)))return{key,platform};
  }
  return{key:'generic',platform:ATS_PLATFORMS.generic};
}

async function runATSScan(){
  const apps=getApps();const activeJob=getActiveJob();
  const company=activeJob?activeJob.company:lsj('genCompany','');
  const selApp=apps.find(a=>a.company===company);
  const platformKey=el('ats-platform-sel')?el('ats-platform-sel').value:'generic';
  const platform=ATS_PLATFORMS[platformKey]||ATS_PLATFORMS.generic;
  const resumeSrc=el('ats-resume-src')?el('ats-resume-src').value:'saved';
  const jdSrc=el('ats-jd-src')?el('ats-jd-src').value:'stored';
  const saved=lsj('genDocs',null);
  let resume=resumeSrc==='manual'?(el('ats-resume-text')?el('ats-resume-text').value.trim():''):(saved?saved.resume:'');
  let jd=jdSrc==='manual'?(el('ats-jd-text')?el('ats-jd-text').value.trim():''):(selApp?selApp.jd:'');
  if(!resume){alert('No resume. Generate one first or paste manually.');return;}
  if(!jd){alert('No job description. Add it in Tracker or paste manually.');return;}
  const btn=el('ats-scan-btn');if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> Scanning for '+platform.name+'...';}
  const out=el('ats-out');if(out)out.innerHTML='';
  try{
    const r=await callClaude(
      'Expert ATS analyst specializing in '+platform.name+'. Be specific and actionable.',
      'Analyze this resume against this job description for '+platform.name+' ATS.\n\n'
      +'PLATFORM-SPECIFIC RULES FOR '+platform.name.toUpperCase()+':\n'
      +platform.rules.join('\n')+'\n\n'
      +'JOB DESCRIPTION:\n'+jd+'\n\n'
      +'RESUME:\n'+resume+'\n\n'
      +'Provide:\n'
      +'1. ATS MATCH SCORE: X/100 (first line exactly as: ATS MATCH SCORE: XX/100)\n'
      +'2. '+platform.name.toUpperCase()+' FORMATTING ISSUES: specific elements that will break this platform\n'
      +'3. KEYWORDS PRESENT: matching terms found in both\n'
      +'4. MISSING HIGH-PRIORITY KEYWORDS: exact terms from JD not in resume — ranked by importance\n'
      +'5. PLATFORM-SPECIFIC FIXES: exactly what to change for '+platform.name+'\n'
      +'6. QUICK WINS: 3 specific changes that most improve this score for '+platform.name,
      2000
    );
    const scoreMatch=r.match(/ATS MATCH SCORE:\s*(\d+)\/100/i);
    const score=scoreMatch?parseInt(scoreMatch[1]):65;
    svj('ats_last',{score,result:r,company,platform:platform.name,platformKey,date:todayStr()});
    svj('ats_last_jd',jd);svj('ats_last_resume',resume);
    if(out)out.innerHTML='<div style="font-size:11px;color:var(--green);margin-bottom:6px">&#10003; Scan complete</div>';
    setTimeout(()=>renderATSScanner(),400);
  }catch(e){if(out)out.innerHTML=alertHtml('&#10007;',esc(e.message),'var(--red)');}
  if(btn){btn.disabled=false;btn.innerHTML='&#127919; Run Platform-Specific ATS Scan';}
}

function toggleVoiceRecording(){
  if(_voiceSession.isRecording){stopVoiceRecording();}
  else{startVoiceRecording();}
}

function startVoiceRecording(){
  const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    alert('Voice recognition not supported. Use Safari on iPhone or Chrome on desktop.');return;
  }
  _voiceSession={transcript:'',words:[],fillerCount:0,wordCount:0,
    startTime:Date.now(),pauses:[],isRecording:true,sessionHistory:[]};

  const rec=new SpeechRecognition();
  rec.continuous=true;rec.interimResults=true;rec.lang='en-CA';
  _voiceSession.recognition=rec;

  const btn=el('voice-rec-btn');const stopBtn=el('voice-stop-btn');
  const status=el('voice-status');const liveText=el('voice-live-text');
  const statsDiv=el('voice-realtime-stats');
  if(btn){btn.innerHTML='&#9679; Recording...';btn.style.background='var(--red)';}
  if(stopBtn)stopBtn.style.display='inline-flex';
  if(status)status.textContent='Listening... speak your answer';
  if(statsDiv)statsDiv.style.display='flex';
  animateVoiceBars();

  rec.onresult=(event)=>{
    let interim='';let final='';
    for(let i=event.resultIndex;i<event.results.length;i++){
      if(event.results[i].isFinal){final+=event.results[i][0].transcript+' ';}
      else{interim+=event.results[i][0].transcript;}
    }
    if(final){_voiceSession.transcript+=final;updateVoiceStats();}
    if(liveText)liveText.innerHTML=highlightFillers(_voiceSession.transcript)+
      '<span style="color:rgba(255,255,255,.3)">'+esc(interim)+'</span>';
  };
  rec.onerror=(e)=>{if(e.error!=='no-speech')status.textContent='Error: '+e.error;};
  rec.onend=()=>{if(_voiceSession.isRecording)rec.start();};  // keep alive
  rec.start();
}

function highlightFillers(text){
  let result=esc(text);
  FILLER_WORDS.forEach(fw=>{
    const re=new RegExp('\\b'+fw.replace(/\s+/g,'\\s+')+'\\b','gi');
    result=result.replace(re,'<mark style="background:rgba(224,60,60,.3);color:var(--red);border-radius:3px">$&</mark>');
  });
  WEAK_PHRASES.forEach(wp=>{
    const re=new RegExp(wp.replace(/\s+/g,'\\s+'),'gi');
    result=result.replace(re,'<mark style="background:rgba(217,119,6,.2);color:var(--gold);border-radius:3px">$&</mark>');
  });
  return result;
}

function updateVoiceStats(){
  const words=_voiceSession.transcript.trim().split(/\s+/).filter(Boolean);
  const wc=words.length;
  const elapsed=Math.round((Date.now()-_voiceSession.startTime)/1000);
  const pace=elapsed>5?Math.round(wc/(elapsed/60)):0;
  let fillers=0;
  FILLER_WORDS.forEach(fw=>{
    const re=new RegExp('\\b'+fw.replace(/\s+/g,'\\s+')+'\\b','gi');
    const m=_voiceSession.transcript.match(re);if(m)fillers+=m.length;
  });
  _voiceSession.wordCount=wc;_voiceSession.fillerCount=fillers;
  const sw=el('stat-words');const sf=el('stat-fillers');const sp=el('stat-pace');const st=el('stat-time');
  if(sw)sw.textContent=wc;
  if(sf){sf.textContent=fillers;sf.style.color=fillers>5?'var(--red)':fillers>2?'var(--gold)':'var(--green)';}
  if(sp){sp.textContent=pace||'—';sp.style.color=pace>=130&&pace<=160?'var(--green)':pace>0?'var(--gold)':'var(--muted)';}
  if(st)st.textContent=elapsed+'s';
}

let _barAnim;
function animateVoiceBars(){
  const bars=document.querySelectorAll('#iv-tab-voice .voice-bar');
  if(!bars.length)return;
  _barAnim=setInterval(()=>{
    if(!_voiceSession.isRecording){clearInterval(_barAnim);bars.forEach(b=>b.style.height='4px');return;}
    bars.forEach(b=>{b.style.height=Math.random()*32+4+'px';b.style.background='rgba(124,58,237,'+(0.3+Math.random()*0.7)+')';});
  },80);
}

function stopVoiceRecording(){
  _voiceSession.isRecording=false;
  if(_voiceSession.recognition)_voiceSession.recognition.stop();
  clearInterval(_barAnim);
  const btn=el('voice-rec-btn');const stopBtn=el('voice-stop-btn');
  if(btn){btn.innerHTML='&#9679; Record';btn.style.background='var(--purple)';}
  if(stopBtn)stopBtn.style.display='none';
}

async function stopAndAnalyzeVoice(){
  stopVoiceRecording();
  if(!_voiceSession.transcript.trim()){alert('No speech detected. Try again.');return;}
  const out=el('voice-analysis-out');if(out)out.innerHTML=alertHtml('&#128202;','Analyzing your response...','var(--purple)');
  const question=el('voice-q')?el('voice-q').value.trim():'Interview question';
  const elapsed=Math.round((Date.now()-_voiceSession.startTime)/1000);
  const pace=elapsed>5?Math.round(_voiceSession.wordCount/(elapsed/60)):0;

  // Score calculation
  const fillerPct=_voiceSession.wordCount?(_voiceSession.fillerCount/_voiceSession.wordCount)*100:0;
  const fillerScore=fillerPct<2?25:fillerPct<5?20:fillerPct<10?12:5;
  const paceScore=pace>=130&&pace<=160?25:pace>=100&&pace<170?18:pace>0?10:5;
  const lengthScore=elapsed>=75&&elapsed<=130?25:elapsed>=45&&elapsed<=150?18:elapsed>0?10:5;

  // Check for power phrases vs weak phrases
  let powerCount=0,weakCount=0;
  POWER_PHRASES.forEach(p=>{if(_voiceSession.transcript.toLowerCase().includes(p))powerCount++;});
  WEAK_PHRASES.forEach(p=>{if(_voiceSession.transcript.toLowerCase().includes(p))weakCount++;});
  const confidenceScore=Math.min(25,Math.max(0,12+powerCount*3-weakCount*4));
  const overallScore=fillerScore+paceScore+lengthScore+confidenceScore;

  try{
    const analysis=await callClaude(

  lines.forEach(line=>{

let _biometricEnabled=false;

async function setupBiometricLock(){
  if(!window.PublicKeyCredential){
    alert('Biometric authentication not available on this device or browser.');return;
  }
  try{
    const available=await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if(!available){alert('No Face ID or Touch ID found on this device.');return;}
    // Register credential
    const challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
    const userId=new Uint8Array(16);crypto.getRandomValues(userId);
    const credential=await navigator.credentials.create({publicKey:{
      challenge,rp:{name:'APEX Career Intelligence',id:location.hostname},
      user:{id:userId,name:'apex_user',displayName:'Jermaine Anderson'},
      pubKeyCredParams:[{alg:-7,type:'public-key'},{alg:-257,type:'public-key'}],
      authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},
      timeout:60000,
    }});
    if(credential){
      sv('apex_biometric_enabled',true);
      sv('apex_biometric_cred_id',btoa(String.fromCharCode(...new Uint8Array(credential.rawId))));
      _biometricEnabled=true;
      alert('✓ Face ID / Touch ID enabled. APEX will require authentication on next open.');
    }
  }catch(e){
    if(e.name==='NotAllowedError')alert('Biometric setup cancelled.');
    else alert('Setup failed: '+e.message);
  }
}

async function verifyBiometric(){
  if(!ls('apex_biometric_enabled',false))return true; // not enabled
  try{
    const challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
    await navigator.credentials.get({publicKey:{
      challenge,timeout:60000,userVerification:'required',
      rpId:location.hostname,
    }});
    return true;
  }catch(e){return false;}
}

async function checkBiometricGate(){
  const enabled=ls('apex_biometric_enabled',false);

  const lastAuth=ls('apex_last_auth',0);

// A. ITERATIVE RESUME SELF-IMPROVEMENT LOOP
// Generate → Score → Rewrite → Rescan (up to 3 cycles)
// ══════════════════════════════════════════
async function iterativeResumeLoop(){
  const apps=getApps();const activeJob=getActiveJob();
  const company=activeJob?activeJob.company:lsj('genCompany','');
  const selApp=apps.find(a=>a.company===company);
  if(!selApp||!selApp.jd){alert('Select a job with a stored JD first.');return;}
  const saved=lsj('genDocs',null);
  if(!saved||!saved.resume){alert('Generate a resume first — then run the improvement loop.');return;}
  const platformKey=lsj('ats_last',{platformKey:'generic'}).platformKey||'generic';
  const platform=ATS_PLATFORMS[platformKey]||ATS_PLATFORMS.generic;
  const out=el('ats-out')||el('jobs-tab-ats');if(!out)return;

  out.innerHTML='<div style="padding:12px 14px;background:rgba(232,168,37,.1);border-radius:12px;border:1px solid rgba(232,168,37,.3);margin-bottom:12px">'
    +'<div style="font-size:12px;font-weight:700;color:var(--gold);margin-bottom:4px">&#9889; Iterative Improvement Running</div>'
    +'<div id="loop-progress" style="font-size:12px;color:var(--muted)">Cycle 1 of 3 — Scanning current resume...</div>'
    +'<div class="chunk-progress" id="loop-bar">'+Array(3).fill('<div class="chunk-dot"></div>').join('')+'</div>'
    +'</div>';

  let currentResume=saved.resume;let bestScore=0;let bestResume=currentResume;let cycles=[];

  for(let i=0;i<3;i++){
    const prog=el('loop-progress');const bar=el('loop-bar');
    if(prog)prog.textContent='Cycle '+(i+1)+' of 3 — Scanning...';
    if(bar){const dots=bar.querySelectorAll('.chunk-dot');dots.forEach((d,j)=>{d.className='chunk-dot '+(j<i?'done':j===i?'active':'');});}

    // Scan
    const scanResult=await callClaude(
      'Expert ATS analyst for '+platform.name+'. Be precise and fast.',
      'Score this resume against this JD for '+platform.name+'.\nReturn FIRST LINE: ATS MATCH SCORE: XX/100\nThen list: top 5 missing keywords, top 3 formatting issues.\n\nJD:\n'+selApp.jd.slice(0,800)+'\n\nRESUME:\n'+currentResume.slice(0,1500),
      400
    );
    const scoreMatch=scanResult.match(/ATS MATCH SCORE:\s*(\d+)\/100/i);
    const score=scoreMatch?parseInt(scoreMatch[1]):60;
    cycles.push({cycle:i+1,score,issues:scanResult});
    if(score>bestScore){bestScore=score;bestResume=currentResume;}
    if(prog)prog.textContent='Cycle '+(i+1)+' of 3 — Score: '+score+'/100. '+(score>=90?'Excellent — stopping.':'Rewriting to improve...');
    if(score>=90)break; // good enough — stop

    // Rewrite
    const rewriteResult=await callClaude(
      'Expert resume writer optimizing specifically for '+platform.name+'. Apply every fix from the scan.',
      'Rewrite this resume to fix the identified issues and maximize ATS score for '+platform.name+'.\n\nSCAN ISSUES:\n'+scanResult+'\n\nPLATFORM RULES:\n'+platform.rules.slice(0,4).join('\n')+'\n\nJD:\n'+selApp.jd.slice(0,600)+'\n\nCURRENT RESUME:\n'+currentResume.slice(0,1800)+'\n\nReturn ONLY the improved resume text.',
      2000
    );
    currentResume=rewriteResult;
    if(bar){const dots=bar.querySelectorAll('.chunk-dot');dots.forEach((d,j)=>d.className='chunk-dot '+(j<=i?'done':''));}
  }

  // Save best version
  const docs=lsj('genDocs',{})||{};
  docs.resume=bestResume;docs.resumeImproved=true;docs.bestATSScore=bestScore;
  svj('genDocs',docs);svj('ats_last',{...lsj('ats_last',{}),score:bestScore,platform:platform.name,platformKey,date:todayStr(),result:cycles.map(c=>'Cycle '+c.cycle+': '+c.score+'/100').join(' → ')});

  out.innerHTML=(out.innerHTML||'')
    +'<div class="card" style="margin-top:12px;border-color:rgba(26,173,94,.4)"><div class="card-head" style="background:rgba(26,173,94,.12)"><div class="card-head-title" style="color:var(--green)">&#10003; Improvement Complete — Best Score: '+bestScore+'/100</div></div><div class="card-body">'
    +'<div style="font-size:12px;color:var(--muted);margin-bottom:8px">'+cycles.map(c=>'Cycle '+c.cycle+': <strong style="color:#fff">'+c.score+'/100</strong>').join(' → ')+'</div>'
    +'<div class="outbox" style="font-size:12px;max-height:280px;overflow-y:auto">'+esc(bestResume)+'</div>'
    +'<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">'
    +'<button class="btn btn-ghost btn-xs" id="loop-cp" style="color:var(--muted)" onclick="copyText(this.dataset.text,\'loop-cp\')" data-text="'+esc(bestResume)+'">Copy Improved Resume</button>'
    +'<button class="btn btn-blue btn-xs" onclick="jobsTab(\'resumepdf\',document.querySelectorAll(\'#scr-jobs .tab-btn\')[4])">Format as PDF &#8594;</button>'
    +'</div></div></div>';
}

// D. SMART FOLLOW-UP CRM
// Auto-triggers based on sent email dates
// ══════════════════════════════════════════
function smartFollowUpCRM(){
  const sent=ls('apex_emails_sent',[]);
  const followups=ls('apex_followups',[]);
  const now=Date.now();
  let triggered=0;

  sent.forEach(email=>{
    if(email.replied)return;
    const daysSince=Math.floor((now-new Date(email.sentDate))/86400000);
    const existing=followups.find(f=>f.to===email.to&&f.sentDate===email.sentDate);
    if(!existing&&daysSince>=7){
      followups.push({
        id:'crm_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
        to:email.to,company:email.company||'',type:'Auto Follow-Up',
        sentDate:email.sentDate,followUpDays:daysSince,replied:false,dismissed:false,
        autoGenerated:true
      });
      triggered++;
    }
  });
  if(triggered>0){
    sv('apex_followups',followups);
    if('Notification' in window&&Notification.permission==='granted'){
      new Notification('APEX — Follow-Up Needed',{
        body:triggered+' application'+(triggered>1?'s':'')+' need'+(triggered===1?'s':'')+' a follow-up. Open Email Hub.',tag:'followup-crm'
      });
    }
  }
  return triggered;
}

function setPostingReminder(timeStr){
  const [hour,minpart]=timeStr.split(':');
  const [min,ampm]=[minpart.slice(0,2),minpart.slice(3)];
  let h=parseInt(hour);if(ampm==='PM'&&h!==12)h+=12;if(ampm==='AM'&&h===12)h=0;
  const now=new Date();const target=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,parseInt(min));
  if(target<=now)target.setDate(target.getDate()+1);
  const msUntil=target.getTime()-Date.now();
  setTimeout(()=>{
    if('Notification' in window&&Notification.permission==='granted'){
      new Notification('APEX — Time to Post on LinkedIn',{
        body:'It\'s the optimal posting time. Open APEX LinkedIn Engine → Post.',tag:'li-post-time'
      });
    }
  },msUntil);
  alert('&#10003; Reminder set for '+timeStr+'. Make sure notifications are enabled.');
}
